<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maturitní Testy IT - Komplet</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; margin: 0; display: flex; height: 100vh; color: #333; }
        
        /* Sidebar navigace */
        .sidebar { width: 300px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; background: #2563eb; color: white; }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 10px; }
        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .nav-btn { 
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center; 
            border: 1px solid #ccc; background: #eee; cursor: pointer; font-size: 12px; border-radius: 4px;
        }
        .nav-btn:hover { background: #dbeafe; }
        .nav-btn.active { border: 2px solid #2563eb; font-weight: bold; }
        .nav-btn.correct { background: #22c55e; color: white; border-color: #16a34a; }
        .nav-btn.wrong { background: #ef4444; color: white; border-color: #dc2626; }
        
        /* Hlavní obsah */
        .main { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 800px; width: 100%; }
        
        .question-meta { color: #666; font-size: 0.9em; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .question-text { font-size: 1.2em; font-weight: bold; margin-bottom: 25px; line-height: 1.5; }
        
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option { 
            padding: 15px; border: 2px solid #e5e7eb; border-radius: 6px; cursor: pointer; transition: 0.2s; 
            display: flex; align-items: center;
        }
        .option:hover { background: #f9fafb; border-color: #2563eb; }
        .option.correct { background: #dcfce7; border-color: #22c55e; color: #14532d; }
        .option.wrong { background: #fee2e2; border-color: #ef4444; color: #991b1b; }
        .option.disabled { pointer-events: none; opacity: 0.8; }
        
        .explanation { 
            margin-top: 20px; padding: 15px; background: #eff6ff; border-left: 4px solid #2563eb; 
            display: none; 
        }

        .controls { margin-top: 30px; display: flex; justify-content: space-between; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; background: #e5e7eb; color: #333; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }

        /* Timer bar pro test */
        .top-bar { width: 100%; max-width: 800px; background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .timer { font-size: 1.5em; font-weight: bold; color: #dc2626; font-family: monospace; }
        
        /* Výsledky */
        .results { display: none; text-align: center; }
        .score-big { font-size: 4em; font-weight: bold; color: #2563eb; margin: 20px 0; }

    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h2 style="margin:0">Maturita IT</h2>
        <div style="margin-top:10px; display:flex; gap:5px;">
            <button class="btn" style="flex:1; font-size:12px;" onclick="setMode('practice')">Procvičování</button>
            <button class="btn btn-primary" style="flex:1; font-size:12px;" onclick="setMode('test')">Spustit TEST</button>
        </div>
    </div>
    <div class="sidebar-content">
        <div class="nav-grid" id="nav-grid"></div>
    </div>
</div>

<div class="main">
    <div class="top-bar" id="test-bar">
        <div><strong>Ostrý test</strong> (20 náhodných otázek)</div>
        <div class="timer" id="timer">20:00</div>
        <button class="btn" style="background:#fee2e2; color:#dc2626" onclick="finishTest()">Ukončit</button>
    </div>

    <div class="card" id="quiz-card">
        <div class="question-meta">
            <span id="q-num">Otázka 1</span>
            <span id="mode-label">Režim: Procvičování</span>
        </div>
        <div class="question-text" id="q-text">Načítání...</div>
        <div class="options" id="options"></div>
        <div class="explanation" id="expl"></div>
        
        <div class="controls">
            <button class="btn" onclick="prevQ()">← Předchozí</button>
            <button class="btn btn-primary" onclick="nextQ()">Další →</button>
        </div>
    </div>

    <div class="card results" id="results-card">
        <h2>Test dokončen!</h2>
        <div class="score-big" id="final-score">0%</div>
        <p id="final-text"></p>
        <button class="btn btn-primary" onclick="location.reload()">Začít znovu</button>
    </div>
</div>

<script>

{q:"Označte chybný výrok o operačním systému Windows.",o:["Ve Windows 10 je účet Administrator ve výchozím nastavení zakázaný.","Pro automatické zálohování uživatelských složek knihoven v prostředí OS Windows 10 je určen modul Historie souborů.","Pokud vytvoříme uživatelský účet v prostředí Windows 10, stává se ve výchozím nastavení členem skupiny Users.","Členem domény Windows může být počítač s OS Windows 10 Home, Professional, Education."],a:"Členem domény Windows může být počítač s OS Windows 10 Home, Professional, Education."},

{q:"Které prohlášení o funkcích brány firewall v systému Windows Server 2019 je přesné?",o:["Automaticky blokuje veškerý datový provoz.","Nepodporuje příchozí pravidla.","Obsahuje předkonfigurovanou šablonu zabezpečení.","Integruje se výhradně s externími řešeními VPN."],a:"Obsahuje předkonfigurovanou šablonu zabezpečení."},
{q:"Potřebuji zobrazit statistické informace a provozu svého počítače s operačním systémem Windows – otevřené porty, navázaná spojení, počty odeslaných paketů.",o:["route","ipconfig /all","netstat","localhost"],a:"netstat"},

{q:"Pracuji na pracovní stanici označení WS04, která je součástí domény Windows.\nSíť využívá výchozí bránu, která je instalována na serveru označeném RO25 se statickou IP adresou 192.168.25.1.\nPokud zadám příkaz ping 192.168.25.1 je spojení vyhodnoceno jako funkční. Pokud zadám název serveru RO25 nemám žádnou odezvu.\nCo je příčinou tohoto stavu?",o:["Na serveru RO25 je upraveno nastavení firewallu – konkrétně chování protokolu ICMP. Z důvodu vyšší bezpečnosti jsou „skryty“ názvy počítačů.","Příčina je v tom, že pracovní stanice WS04, nemá z  neznámého důvodu v doméně účet.\n(Mohl být neúmyslně vymazán na řadiči domény). Proto pracovní stanice nemůže plně využívat síťových služeb.","V síti nefunguje služba DNS.","V síti nefunguje korektně služba DHCP. Došlo k přidělení názvu, ale není přidělena IP adresa."],a:"V síti nefunguje služba DNS."},

{q:"Sdílíte složku v počítači se systémem Windows 10 s jiným uživatelem v rámci pracovní skupiny.\nJak můžete upravit konfiguraci počítače druhého uživatele pro usnadnění přístupu ke sdílené složce?",o:["Vytvořte oprávnění NTFS.","Vytvořte účinná oprávnění.","Namapujte sdílenou složku.","Vytvořte doménu."],a:"Namapujte sdílenou složku."},

{q:"Na svém PC mám problémy v síťové komunikaci. Pokud zadám příkaz  ping  v kombinaci s úplným názvem síťové tiskárny  HP1L.firma.local.\nv místní síti LAN tak nemám žádnou odpověď. Ale při zadání řádkového příkazu  ping  s IPv4 adresou této síťové tiskárny   mám správnou odezvu.\nTento problém je pouze u této tiskárny a není u jiných koncových sítových zařízení. Označte příčinu.",o:["Na firewallu DNS serveru jsou zablokovány porty spojené s překladem názvů.","Na DNS serveru není nainstalována zóna pro překlad textových názvů na IP adresy.","Na DNS serveru není nainstalována zóna pro zpětný překlad.","V databázi DNS chybí záznamy typu A této tiskárny."],a:"V databázi DNS chybí záznamy typu A této tiskárny."},
{q:"Skupině  DLMarketing  se nedá nastavit oprávnění ke složce  grm4.  Co je příčinou?",o:["Místní doménová skupina se nedá použít pro definování oprávnění na serveru Windows.","V operačním systému je vnitřní chyba. Není možné označit globální skupinu.","Skupině  DLMarketing  nastavujeme oprávnění v rámci lesa domén. V této situaci se musí použít  univerzální skupina.","Nastavení typu skupiny na  distribuční.  Musí se označit skupina zabezpečení."],a:"Nastavení typu skupiny na  distribuční.  Musí se označit skupina zabezpečení."},

{q:"Uživatelé v organizační jednotce  Marketing  se nemohou přihlásit do domény z počítače  Asus06.  Co je příčinou?",o:["Stanice  Asus06  používá operační systém Windows 10 Home.","Uživatelé v organizační jednotce  Marketing  mají povolené ve vlastnostech svých účtů časové intervaly kdy se mohou přihlásit na jednotlivé stanice.\nStanice  Asus06  se teď nachází mimo tento interval.","Účet počítače je zakázaný. Musí se povolit.","Uživatelé v organizační jednotce  Marketing  mají pouze omezený počet stanic které mohou využívat. Stanice  Asus06  není v tomto seznamu.\nTo se projevilo zákazem tohoto počítače."],a:"Účet počítače je zakázaný. Musí se povolit."},

{q:"Označte  nepravdivý  výrok.",o:["Organizační jednotky jsou ve výchozím nastavení chráněny proti náhodnému vymazání.","Pokud je OS Windows 2012 povýšen na řadič domény, místní uživatelské účty a skupiny zůstanou zachovány.","Přidání nového počítače do domény mohou provést členové doménové skupiny  Administrators  a  Domain Admins.","Uživatelským účtům v prostředí Windows 2012/2016/2019 není možné přidělit konkrétní stanice které budou moci používat."],a:"Uživatelským účtům v prostředí Windows 2012/2016/2019 není možné přidělit konkrétní stanice které budou moci používat."},

{q:"Označte  pravdivý  výrok.",o:["Pokud má uživatel v doméně vytvořený účet je členem skupiny  Domain Users.\nPředem vytvořené členství v jakékoliv doménové skupině umožňuje zařazení (i odstranění) počítače z domény.","Zařazení počítače do domény provede člen skupiny  Domain Admins.","Zařazení počítače do domény provede člen lokální skupiny  Administrators  na zařazovaném počítači.","Pracovní stanice může být současně členem  domény  i  pracovní skupiny ."],a:"Zařazení počítače do domény provede člen skupiny  Domain Admins."},

{q:"Vaše řešení musí zabezpečit co nejvyšší odolnost vůči technickému selhání pevných disků. Z následujících variant vyberte nejlepší řešení. (Týká se zadání s disky 0-3 a MS Exchange)",o:["Disky1,2,3 převedu z dynamického na basic (běžný). Oddíl X: přesunu na Disk 0. Disk 1 a Disk 2 budou tvořit svazek RAID-1.\nOddíly C: a X: na Disku 0 budou součástí dalšího RAIDu-1 mezi Diskem 0 a Diskem 3. Zbylé nepřidělené úseky budou součástí rozloženého svazku.","Disk3 převedu na dynamický. Vytvořím RAID-1 mezi oddílem C: na disku C: použiji 400 GB z Disku 2. Vytvořím RAID-5.\nVyužiji 600 GB z nepřiděleného místo na Disku 0, Disku 1, Disku 2 a Disku 3. Zde bude instalován program MS Exchange.\nOddíl X: na Disku 1 a zbylých 200 GB na Disku 3 budou nakonfigurovány jako RAID 1. Zbylých 200 GB na Disku 1 zůstane jako jednoduchý svazek.","Disk 3 převedu na dynamický. Oddíl X: přesunu na Disk0. Disk 1 a Disk 2 budou tvořit svazek RAID1.\nOddíly C: a X: na Disku 0 budou součástí dalšího RAIDu 1 mezi Diskem 0 a Diskem 3. Zbylé nepřidělené úseky budou součástí prokládaného svazku.","Disk 3 převedu na dynamický. Vytvořím RAID-1 mezi oddílem C: na disku C: použiji 400 GB z Disku 2. Vytvořím RAID-5.\nVyužiji 600 GB z nepřiděleného místo na Disku 0, Disku 1, Disku 2. Zde bude instalován program MS Exchange.\nNa Disku 1 mi zůstalo ještě 200 GB nepřiděleného prostoru a má k dispozici plnou kapacitu Disku 3. Pomocí Správy disků zvětším velikost oddílu X: na 400 GB.\nVytvořím RAID-1 mezi oddílem X: a nepřiděleným prostorem na Disku 3. Zbylých 200 GB na Disku 3 zůstane jako jednoduchý svazek."],a:"Disk3 převedu na dynamický. Vytvořím RAID-1 mezi oddílem C: na disku C: použiji 400 GB z Disku 2. Vytvořím RAID-5.\nVyužiji 600 GB z nepřiděleného místo na Disku 0, Disku 1, Disku 2 a Disku 3. Zde bude instalován program MS Exchange.\nOddíl X: na Disku 1 a zbylých 200 GB na Disku 3 budou nakonfigurovány jako RAID 1. Zbylých 200 GB na Disku 1 zůstane jako jednoduchý svazek."},

{q:"Který z následujících výroků o Zásadách skupiny (GPO) v doméně s operačním systémem Windows 2019 je  nepravdivý .",o:["GPO umožňují spouštění skriptů. Skripty mohou být vytvořeny pomocí příkazů příkazového řádku, nebo PowerShellu.","GPO umožňuje instalaci programů. Je možné použít nejenom instalační programy Windows (.msi), ale operační systém akceptuje instalační soubory ve formátu .exe, .cmd, .bat.","Pomocí GPO se dají namapovat sdílené složky na klientské počítače.","GPO umožňují konfiguraci interního firewallu na členských počítačích v doméně Windows."],a:"GPO umožňuje instalaci programů. Je možné použít nejenom instalační programy Windows (.msi), ale operační systém akceptuje instalační soubory ve formátu .exe, .cmd, .bat."},

{q:"Následující výpis konfigurace Linuxového  DHCP serveru který pracuje v síti s adresou 10.8.0.0/24... DHCP server nefunguje. Kde je chyba?",o:["Subsíťová maska ve tvaru 255.255.255.0 je špatně. Pro uvedenou konfiguraci by měla být ve tvaru 255.255.255.240.","Na konci řádků nemůže být znak středník(;) ale dvojtečka (:).","Chybná adresa sítě.","Rozsah adres musí být správně zapsán ve tvaru:\nrange 10.8.8.10-10.8.8.140","Uvedená konfigurace je v pořádku. Nefunkčnost služby DHCP má na svědomí chyba někde jinde.","Rozsah adres musí být správně zapsán ve tvaru:\nrange 10.8.0.11 10.8.0.140","Subsíťová maska ve tvaru 255.255.255.0 je špatně. Pro uvedenou konfiguraci by měla být ve tvaru 255.255.255.192."],a:"Rozsah adres musí být správně zapsán ve tvaru:\nrange 10.8.0.11 10.8.0.140"},

let currentMode = 'practice';
let currentIndex = 0;
let testQuestions = [];
let userAnswers = {}; // {qIndex: selectedOptionIndex}
let timerInterval;

function setMode(mode) {
    currentMode = mode;
    userAnswers = {};
    document.getElementById('nav-grid').innerHTML = '';
    document.getElementById('q-num').innerText = '';
    document.getElementById('expl').style.display = 'none';
    document.getElementById('results-card').style.display = 'none';
    document.getElementById('quiz-card').style.display = 'block';
    document.getElementById('test-bar').style.display = 'none';

    if (mode === 'practice') {
        testQuestions = database; // Všechny otázky
        document.getElementById('mode-label').innerText = 'Režim: Procvičování';
        renderNav();
        loadQ(0);
    } else {
        // Náhodných 20
        testQuestions = [...database].sort(() => 0.5 - Math.random()).slice(0, 20);
        document.getElementById('mode-label').innerText = 'Režim: TEST';
        document.getElementById('test-bar').style.display = 'flex';
        renderNav();
        loadQ(0);
        startTimer();
    }
}

function renderNav() {
    const grid = document.getElementById('nav-grid');
    testQuestions.forEach((_, i) => {
        const btn = document.createElement('div');
        btn.className = 'nav-btn';
        btn.innerText = i + 1;
        btn.onclick = () => loadQ(i);
        btn.id = 'nav-' + i;
        grid.appendChild(btn);
    });
}

function loadQ(index) {
    currentIndex = index;
    const q = testQuestions[index];
    
    document.getElementById('q-num').innerText = `Otázka ${index + 1} / ${testQuestions.length}`;
    document.getElementById('q-text').innerText = q.q;
    
    // Navigace styl
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('nav-' + index).classList.add('active');

    const optsDiv = document.getElementById('options');
    optsDiv.innerHTML = '';

    const explDiv = document.getElementById('expl');
    explDiv.style.display = 'none';
    explDiv.innerText = "Vysvětlení: " + q.a;

    // Je již zodpovězeno?
    const answered = userAnswers[index] !== undefined;

    if (currentMode === 'practice' && answered) explDiv.style.display = 'block';

    q.o.forEach((optText, i) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.innerText = optText;
        
        if (answered) {
            div.classList.add('disabled');
            if (currentMode === 'practice') {
                if (isCorrect(q, optText)) div.classList.add('correct');
                else if (i === userAnswers[index]) div.classList.add('wrong');
            } else {
                if (i === userAnswers[index]) div.style.background = '#e0f2fe';
            }
        }

        div.onclick = () => selectAnswer(index, i, optText);
        optsDiv.appendChild(div);
    });
}

function isCorrect(q, selectedText) {
    // Porovnani textu (odstraneni mezer a tecek na konci pro jistotu)
    const normSel = selectedText.trim().replace(/\.$/, "");
    const normAns = q.a.trim().replace(/\.$/, "");
    // Zkontroluje jestli odpoved je v seznamu spravnych (pokud jich je vic oddelenych carkou) nebo presna shoda
    return normAns === normSel || normAns.includes(normSel);
}

function selectAnswer(qIndex, optIndex, text) {
    if (currentMode === 'practice' && userAnswers[qIndex] !== undefined) return;
    
    userAnswers[qIndex] = optIndex;
    const q = testQuestions[qIndex];
    const navBtn = document.getElementById('nav-' + qIndex);

    if (currentMode === 'practice') {
        const correct = isCorrect(q, text);
        navBtn.classList.add(correct ? 'correct' : 'wrong');
        loadQ(qIndex); // Refresh pro barvy
    } else {
        navBtn.style.background = '#bfdbfe'; // Oznaceno
        navBtn.style.borderColor = '#2563eb';
    }
}

function nextQ() {
    if (currentIndex < testQuestions.length - 1) loadQ(currentIndex + 1);
}

function prevQ() {
    if (currentIndex > 0) loadQ(currentIndex - 1);
}

function startTimer() {
    let sec = 1200; // 20 min
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        sec--;
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        if (sec <= 0) finishTest();
    }, 1000);
}

function finishTest() {
    clearInterval(timerInterval);
    document.getElementById('quiz-card').style.display = 'none';
    document.getElementById('test-bar').style.display = 'none';
    document.getElementById('results-card').style.display = 'block';

    let score = 0;
    testQuestions.forEach((q, i) => {
        const uIdx = userAnswers[i];
        if (uIdx !== undefined && isCorrect(q, q.o[uIdx])) {
            score++;
        }
    });

    const perc = Math.round((score / 20) * 100);
    document.getElementById('final-score').innerText = perc + "%";
    document.getElementById('final-text').innerText = `Správně ${score} z 20`;
}

// Start
setMode('practice');

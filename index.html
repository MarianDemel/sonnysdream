<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maturitní Testy IT – OPS</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --text: #0f172a;
            --card: #ffffff;
            --border: #e2e8f0;
            --sidebar-bg: #ffffff;
            --option-bg: #ffffff;
            --option-text: #334155;
            --option-hover-bg: #f8fafc;
            --nav-bg: #f1f5f9;
            --nav-text: #64748b;
            --nav-border: #cbd5e1;
            --meta-text: #64748b;
            --q-text: #1e293b;
            --expl-bg: #eff6ff;
            --expl-border: #2563eb;
            --expl-text: #1e3a8a;
            --testbar-bg: #ffffff;
            --context-bg: #fff7ed;
            --context-text: #9a3412;
            --disk-name-bg: #f8fafc;
            --disk-name-text: #334155;
            --disk-part-bg: #e0f2fe;
            --disk-part-text: #0369a1;
            --disk-part-border: #0ea5e9;
            --disk-free-bg: #f1f5f9;
            --disk-free-text: #64748b;
            --table-header-bg: #f1f5f9;
            --score-shadow: rgba(37,99,235,0.3);
            --btn-prev-bg: #e2e8f0;
            --btn-prev-text: #475569;
            --btn-prev-hover: #cbd5e1;
            --results-text: #475569;
            --sidebar-header-bg: var(--primary);
        }

        [data-theme="dark"] {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg: #0f172a;
            --text: #e2e8f0;
            --card: #1e293b;
            --border: #334155;
            --sidebar-bg: #1e293b;
            --option-bg: #1e293b;
            --option-text: #cbd5e1;
            --option-hover-bg: #263347;
            --nav-bg: #0f172a;
            --nav-text: #94a3b8;
            --nav-border: #334155;
            --meta-text: #94a3b8;
            --q-text: #e2e8f0;
            --expl-bg: #172040;
            --expl-border: #3b82f6;
            --expl-text: #bfdbfe;
            --testbar-bg: #1e293b;
            --context-bg: #1c1208;
            --context-text: #fdba74;
            --disk-name-bg: #0f172a;
            --disk-name-text: #94a3b8;
            --disk-part-bg: #0c2a3a;
            --disk-part-text: #38bdf8;
            --disk-part-border: #0284c7;
            --disk-free-bg: #1e293b;
            --disk-free-text: #64748b;
            --table-header-bg: #0f172a;
            --score-shadow: rgba(59,130,246,0.4);
            --btn-prev-bg: #1e293b;
            --btn-prev-text: #94a3b8;
            --btn-prev-hover: #334155;
            --results-text: #94a3b8;
        }

        * { box-sizing: border-box; }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; color: var(--text); transition: background 0.2s, color 0.2s; }
        
        /* Sidebar */
        .sidebar { width: 340px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; z-index: 10; transition: background 0.2s, border-color 0.2s; }
        .sidebar-header { padding: 20px; background: var(--primary); color: white; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: background 0.2s; }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 12px; scrollbar-width: thin; }
        
        /* Navigace */
        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .nav-btn { 
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center; 
            border: 1px solid var(--nav-border); background: var(--nav-bg); cursor: pointer; font-size: 11px; border-radius: 6px; font-weight: 600; color: var(--nav-text); transition: all 0.15s;
        }
        .nav-btn:hover { background: #e0f2fe; color: var(--primary); border-color: var(--primary); transform: scale(1.1); }
        [data-theme="dark"] .nav-btn:hover { background: #172a45; }
        .nav-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 10px rgba(37, 99, 235, 0.4); }
        
        /* Barvy pro vyhodnocení */
        .nav-btn.correct { background: #22c55e; color: white; border-color: #16a34a; }
        .nav-btn.wrong { background: #ef4444; color: white; border-color: #dc2626; }
        .nav-btn.answered-test { background: #bfdbfe; color: #1e40af; border-color: #3b82f6; }
        [data-theme="dark"] .nav-btn.answered-test { background: #1e3a5c; color: #93c5fd; border-color: #3b82f6; }

        /* Hlavní okno */
        .main { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; position: relative; }
        .container { max-width: 900px; width: 100%; margin-bottom: 50px; }
        
        .card { background: var(--card); padding: 40px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); border: 1px solid var(--border); transition: background 0.2s, border-color 0.2s; }
        [data-theme="dark"] .card { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        
        .question-meta { display: flex; justify-content: space-between; margin-bottom: 25px; color: var(--meta-text); font-size: 0.9em; font-weight: 500; border-bottom: 2px solid var(--border); padding-bottom: 15px; }
        .question-text { font-size: 1.15em; font-weight: 600; margin-bottom: 30px; line-height: 1.6; color: var(--q-text); }
        
        /* --- STYLY PRO DISKOVÉ TABULKY --- */
        .disk-table { width: 100%; border-collapse: separate; border-spacing: 0; margin: 20px 0; border: 1px solid var(--nav-border); border-radius: 8px; overflow: hidden; font-size: 0.9em; }
        .disk-table td { border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); padding: 12px; vertical-align: top; }
        .disk-table tr:last-child td { border-bottom: none; }
        .disk-table td:last-child { border-right: none; }
        .disk-name { background-color: var(--disk-name-bg); font-weight: 700; width: 25%; color: var(--disk-name-text); }
        .disk-part { background-color: var(--disk-part-bg); color: var(--disk-part-text); border-left: 4px solid var(--disk-part-border) !important; font-weight: 500; }
        .disk-free { background-color: var(--disk-free-bg); color: var(--disk-free-text); font-style: italic; border-left: 4px dashed var(--nav-border) !important; }

        /* Běžná tabulka */
        .q-table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 0.9em; border: 1px solid var(--nav-border); }
        .q-table th { background: var(--table-header-bg); padding: 10px; text-align: left; border: 1px solid var(--nav-border); color: var(--q-text); }
        .q-table td { padding: 8px; border: 1px solid var(--nav-border); color: var(--option-text); }

        /* Kontext */
        .context-box { background: var(--context-bg); border-left: 4px solid #f97316; padding: 15px; margin-bottom: 20px; border-radius: 4px; font-style: italic; color: var(--context-text); font-size: 0.95em; }

        /* Odpovědi */
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option { 
            padding: 18px 20px; border: 2px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.2s; 
            display: flex; align-items: center; font-size: 1em; background: var(--option-bg); color: var(--option-text);
        }
        .option:not(.disabled):hover { border-color: #94a3b8; background: var(--option-hover-bg); transform: translateX(5px); }
        
        .option.selected-test { background: #eff6ff; border-color: var(--primary); color: var(--primary); font-weight: 600; box-shadow: 0 0 0 1px var(--primary); }
        [data-theme="dark"] .option.selected-test { background: #172040; color: #93c5fd; }
        .option.correct { background: #dcfce7; border-color: #22c55e; color: #14532d; font-weight: 600; }
        [data-theme="dark"] .option.correct { background: #0f2d1a; color: #86efac; border-color: #22c55e; }
        .option.wrong { background: #fee2e2; border-color: #ef4444; color: #991b1b; opacity: 0.8; }
        [data-theme="dark"] .option.wrong { background: #2d0f0f; color: #fca5a5; border-color: #ef4444; }
        .option.disabled { pointer-events: none; }

        .explanation { margin-top: 30px; padding: 20px; background: var(--expl-bg); border-radius: 8px; border-left: 5px solid var(--expl-border); color: var(--expl-text); display: none; line-height: 1.6; transition: background 0.2s; }

        .controls { margin-top: 40px; display: flex; justify-content: space-between; gap: 20px; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; }
        .btn-prev { background: var(--btn-prev-bg); color: var(--btn-prev-text); }
        .btn-prev:hover { background: var(--btn-prev-hover); }
        .btn-next { background: var(--primary); color: white; box-shadow: 0 4px 6px -2px rgba(37, 99, 235, 0.3); }
        .btn-next:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .test-bar { background: var(--testbar-bg); padding: 15px 25px; border-radius: 12px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid var(--border); transition: background 0.2s; }
        .timer { font-family: monospace; font-size: 1.5em; font-weight: 700; color: #dc2626; background: #fef2f2; padding: 5px 15px; border-radius: 6px; }
        [data-theme="dark"] .timer { background: #2d0f0f; color: #f87171; }

        .results { text-align: center; display: none; }
        .score-circle { width: 150px; height: 150px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 3em; font-weight: 800; margin: 20px auto; box-shadow: 0 10px 20px var(--score-shadow); }

        /* Tlačítko tmavého módu */
        .theme-btn {
            margin-top: 10px; width: 100%; padding: 7px; font-size: 12px;
            background: rgba(255,255,255,0.15); color: white;
            border: 1px solid rgba(255,255,255,0.3); border-radius: 6px;
            cursor: pointer; font-weight: 600; transition: background 0.2s;
        }
        .theme-btn:hover { background: rgba(255,255,255,0.25); }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; max-height: 220px; border-right: none; border-bottom: 1px solid var(--border); }
            .nav-grid { grid-template-columns: repeat(10, 1fr); padding: 5px; }
            .main { padding: 15px; }
            .card { padding: 20px; }
            .question-text { font-size: 1.1em; }
            .disk-table { font-size: 0.8em; }
            .disk-table td { display: block; width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
            .disk-name { width: 100%; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h2 style="margin:0; font-size: 1.4em;">Maturita IT</h2>
        <div style="font-size:0.85em; opacity:0.9; margin-top:5px;">Kompletní databáze (240 otázek..)</div>
	<div style="font-size:0.85em; opacity:0.9; margin-top:5px; font-weight: bold; color:orange;">Obrázky na moodle dostupné nebyly, takže některé údaje nemusí sedět!!!</div>
        <div style="margin-top:15px; display:flex; gap:10px;">
            <button class="btn" style="flex:1; padding:8px; font-size:13px; background:rgba(255,255,255,0.2); color:white; border:1px solid rgba(255,255,255,0.4);" onclick="setMode('practice')">Procvičovat</button>
            <button class="btn" style="flex:1; padding:8px; font-size:13px; background:white; color:var(--primary);" onclick="setMode('test')">Ostrý TEST</button>
        </div>
        <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()">🌙 Tmavý mód</button>
    </div>
    <div class="sidebar-content">
        <div class="nav-grid" id="nav-grid"></div>
    </div>
</div>

<div class="main">
    <div class="container">
        <div class="test-bar" id="test-bar" style="display:none;">
            <div>
                <strong style="display:block; color:var(--q-text); font-size:1.1em;">Ostrý test</strong>
                <span style="font-size:0.9em; color:var(--meta-text);">20 náhodných otázek</span>
            </div>
            <div class="timer" id="timer">20:00</div>
            <button class="btn" style="background:#fee2e2; color:#b91c1c; padding:8px 15px;" onclick="finishTest()">Ukončit test</button>
        </div>

        <div class="card" id="quiz-card">
            <div class="question-meta">
                <span id="q-num">Otázka 1</span>
                <span id="mode-badge" style="background:#e0f2fe; color:#0369a1; padding: 4px 10px; border-radius: 20px; font-size: 0.85em; font-weight: 700;">Procvičování</span>
            </div>
            
            <div class="question-text" id="q-text"></div>
            
            <div class="options" id="options"></div>
            
            <div class="explanation" id="expl"></div>
            
            <div class="controls">
                <button class="btn btn-prev" onclick="prevQ()">← Předchozí</button>
                <button class="btn btn-next" onclick="nextQ()">Další →</button>
            </div>
        </div>

        <div class="card results" id="results-card">
            <h2 style="color:var(--q-text); margin-bottom:10px;">Test dokončen!</h2>
            <div class="score-circle" id="final-score">0%</div>
            <p id="final-text" style="font-size:1.2em; color:var(--results-text); margin-bottom:30px;"></p>
            
            <div style="display:flex; gap:10px; justify-content:center;">
                <button class="btn" style="background:#e0f2fe; color:#0284c7; font-size:1.1em; padding: 15px 30px;" onclick="reviewTest()">Prohlédnout chyby</button>
                <button class="btn btn-next" onclick="location.reload()" style="font-size:1.1em; padding: 15px 40px;">Spustit nový test</button>
            </div>
        </div>
    </div>
</div>

<script>
// DATABÁZE OTÁZEK
const database = [
{q:"Označte chybný výrok o operačním systému Windows.",o:["Ve Windows 10 je účet Administrator ve výchozím nastavení zakázaný.","Pro automatické zálohování uživatelských složek knihoven v prostředí OS Windows 10 je určen modul Historie souborů.","Pokud vytvoříme uživatelský účet v prostředí Windows 10, stává se ve výchozím nastavení členem skupiny Users.","Členem domény Windows může být počítač s OS Windows 10 Home, Professional, Education."],c:[3],a:"Členem domény Windows může být počítač s OS Windows 10 Home, Professional, Education."},
{q:"Na souborovém serveru s OS Windows 2019 s úplným doménovým názvem db.fast.com byla nastavena sdílená složka \\\\db\\store . Toto sdílení reprezentuje složku G:\\data . Přístup ke sdílené složce \\\\db\\store je pro členy skupiny Everyone nastaven na Úplné řízení .<br>Přístupová oprávnění NTFS pro G:\\data umožňují Číst, Zapisovat, Zobrazovat obsah složky , Číst a spouštět, Měnit skupině Authenticated Users .<br>Skupina Sales má nastaveno pro tuto složku oprávnění Číst .<br>Nikol je členkou skupiny Sales a členem skupiny Domain Users .<br>Jaká budou oprávnění, pokud se pokusí Nikol o síťový přístup ke složce \\\\db\\store ?",o:["Úplné řízení","Žádná","Číst","Změnit"],c:[3],a:"Změnit"},
{q:"Které prohlášení o funkcích brány firewall v systému Windows Server 2019 je přesné?",o:["Automaticky blokuje veškerý datový provoz.","Nepodporuje příchozí pravidla.","Obsahuje předkonfigurovanou šablonu zabezpečení.","Integruje se výhradně s externími řešeními VPN."],c:[2],a:"Obsahuje předkonfigurovanou šablonu zabezpečení."},
{q:"Potřebuji zobrazit statistické informace a provozu svého počítače s operačním systémem Windows – otevřené porty, navázaná spojení, počty odeslaných paketů.",o:["route","ipconfig /all","netstat","localhost"],c:[2],a:"netstat"},
{q:"Jaký typ zálohy v prostředí OS Windows 2019 server je podporován kromě normální (úplné) zálohy?",o:["kopie","rozdílová","přírůstková","denní"],c:[2],a:"přírůstková"},
{q:"Pracuji na pracovní stanici označení WS04, která je součástí domény Windows.<br>Síť využívá výchozí bránu, která je instalována na serveru označeném RO25 se statickou IP adresou 192.168.25.1.<br>Pokud zadám příkaz ping 192.168.25.1 je spojení vyhodnoceno jako funkční. Pokud zadám název serveru RO25 nemám žádnou odezvu.<br>Co je příčinou tohoto stavu?",o:["Na serveru RO25 je upraveno nastavení firewallu – konkrétně chování protokolu ICMP. Z důvodu vyšší bezpečnosti jsou „skryty\" názvy počítačů.","Příčina je v tom, že pracovní stanice WS04, nemá z neznámého důvodu v doméně účet.<br>(Mohl být neúmyslně vymazán na řadiči domény). Proto pracovní stanice nemůže plně využívat síťových služeb.","V síti nefunguje služba DNS.","V síti nefunguje korektně služba DHCP. Došlo k přidělení názvu, ale není přidělena IP adresa."],c:[2],a:"V síti nefunguje služba DNS."},
{q:"Co bude první krok klienta DNS, aby provedl překlad názvu počítače na IP adresu?",o:["Klient DNS začne provádět všesměrové vysílání s využitím protokolu UDP, aby vyhledal DNS server.","Klient provede dotaz na nastavený alternativní DNS server.","Klient provede dotaz na primární DNS server.","Klient zkontroluje svou místní mezipaměť DNS resolveru."],c:[3],a:"Klient zkontroluje svou místní mezipaměť DNS resolveru."},
{q:"Která z následujících možností zvyšuje zabezpečení operačního systému Windows 10/11 tím, že detekuje neoprávněné změny v systému a brání jim?",o:["GAC (Guest Account Control)","MMC (Microsoft Management Console)","AAC (Administrative Account Control)","UAC (User Account Control)"],c:[3],a:"UAC (User Account Control)"},
{q:"Sdílíte složku v počítači se systémem Windows 10 s jiným uživatelem v rámci pracovní skupiny.<br>Jak můžete upravit konfiguraci počítače druhého uživatele pro usnadnění přístupu ke sdílené složce?",o:["Vytvořte oprávnění NTFS.","Vytvořte účinná oprávnění.","Namapujte sdílenou složku.","Vytvořte doménu."],c:[2],a:"Namapujte sdílenou složku."},
{q:"Který z následujících režimů OS Windows 2019 server pracuje s minimem služeb a funkcí?",o:["Poslední známá funkční konfigurace.","Ladící režim.","Obnovení adresářových služeb.","Nouzový režim."],c:[3],a:"Nouzový režim."},
{q:"Správcem sítě vám byla přidělena následující statická IPv4 adresa 222.17.18.125/26. Jaký bude tvar subsíťové masky?",o:["255.255.255.240","255.255.255.252","255.255.255.192","255.255.255.248"],c:[2],a:"255.255.255.192"},
{q:"V pracovní skupině máte počítač s OS Windows 10. Jaký je maximální počet souběžných připojení ke sdílené složce?",o:["20"],c:[0],a:"20"},
{q:"Na souborovém serveru s OS Windows 10 s úplným doménovým názvem mydb.mycorp.com byla nastavena sdílená složka \\\\mydb\\personal .<br>Toto sdílení reprezentuje složku E:\\files . Přístupová oprávnění NTFS pro E:\\file s umožňují Úplné řízení skupině Authenticated Users .<br>Přístup ke sdílené složce \\\\mydb\\personal je pro členy skupiny Sales nastaven na Odepřít .<br>Robert je členem skupiny Sales a členem skupiny Users . Lokálně se přihlásil na počítač mydb.mycorp.com .<br>Jaká budou jeho oprávnění, pokud se pokusí o přístup ke složce E:\\files ?",o:["Číst","Žádná","Výchozí oprávnění NTFS pro složku. Číst, Číst a spouštět, Zobrazovat obsah složky.","Úplné řízení"],c:[3],a:"Úplné řízení"},
{q:"Pomocí jaké klávesové kombinace spustíte správce úloh? Jako oddělovač mezi klávesami použijte znak \"+\", nepište mezery.",o:["CTRL+SHIFT+ESC"],c:[0],a:"CTRL+SHIFT+ESC"},
{q:"Kterým z následujících nástrojů můžete ukončit běžící proces v prostředí OS Windows? Vyberte nejpřesnější odpověď.",o:["správa počítače","výstrahy a protokolování výkonu","správce úloh","sledování systému"],c:[2],a:"správce úloh"},
{q:"Na počítači s OS Windows 10 došlo k pokusu instalace nového ovladače zvukové karty. Operace neproběhla korektně.<br>Jaký je nejrychlejší návrat k původní instalované verzi ovladače zvukové karty?",o:["Použiji ve Správci zařízení funkci Vrátit změny ovladače.","Ve Správci zařízení zakážu zařízení a provedu reinstalaci původními (staršími) ovladači.","Do mechaniky vložím instalační DVD Windows v pomocí funkce Plug and Play dohraji potřebné soubory z instalačního DVD.<br>(Případně použiji jiné médium.)","Ve Správci zařízení odinstaluji ovladač a provedu instalaci původního ovladače."],c:[0],a:"Použiji ve Správci zařízení funkci Vrátit změny ovladače."},

{q:"<div class='context-box'>[Obrázek: Konzole Uživatelé a počítače. Počítač Asus06 má u ikony malou černou šipku dolů.]</div>Uživatelé v organizační jednotce  Marketing  se nemohou přihlásit do domény z počítače  Asus06.  Co je příčinou?",o:["Stanice  Asus06  používá operační systém Windows 10 Home.","Uživatelé v organizační jednotce  Marketing  mají povolené ve vlastnostech svých účtů časové intervaly kdy se mohou přihlásit na jednotlivé stanice.<br>Stanice  Asus06  se teď nachází mimo tento interval.","Účet počítače je zakázaný. Musí se povolit.","Uživatelé v organizační jednotce  Marketing  mají pouze omezený počet stanic které mohou využívat. Stanice  Asus06  není v tomto seznamu.<br>To se projevilo zákazem tohoto počítače."],c:[2],a:"Účet počítače je zakázaný. Musí se povolit."},

{q:`Byli jste pověřeni správou serveru s operačním systémem Windows 2019. Konfigurace HDD je znázorněna na následujícím schématu.<br>Firmware serveru nepodporuje vytváření dynamických svazků. Následující zadání musí být splněno v rámci konfiguračních možností OS Windows 2019.<br><br>
<table class="disk-table">
  <tr><td class="disk-name">Disk 0<br>Dynamic 1 TB<br>Online</td><td class="disk-part">C: Spouštěcí, systémový...<br>400 GB, NTFS</td><td class="disk-free">Nepřiděleno<br>600 GB</td></tr>
  <tr><td class="disk-name">Disk 1<br>Dynamic 1 TB<br>Online</td><td class="disk-free">Nepřiděleno<br>800 GB</td><td class="disk-part">X: 200 GB</td></tr>
  <tr><td class="disk-name">Disk 2<br>Dynamic 1 TB<br>Online</td><td class="disk-free">Nepřiděleno<br>1 TB</td><td></td></tr>
  <tr><td class="disk-name">Disk 3<br>Basic 800 GB<br>Online</td><td class="disk-free">Nepřiděleno<br>800 GB</td><td></td></tr>
</table>
<br>Bylo rozhodnuto, že tento server bude v síti plnit roli řadiče domény, DNS, DHCP a bude zde instalován poštovní server MS Exchange.<br>Programové a datové soubory řadiče domény, DNS, DHCP serveru jsou umístěny v adresáři Windows.<br>MS Exchange server bude využívat prozatím nepřidělený volný prostor na discích. Předpokládá se, že poštovní server spotřebuje cca 1700 GB diskového prostoru.<br>Vaše řešení musí zabezpečit co nejvyšší odolnost vůči technickému selhání pevných disků. Z následujících variant vyberte nejlepší řešení.`,o:["Disky1,2,3 převedu z dynamického na basic (běžný). Oddíl X: přesunu na Disk 0. Disk 1 a Disk 2 budou tvořit svazek RAID-1.<br>Oddíly C: a X: na Disku 0 budou součástí dalšího RAIDu-1 mezi Diskem 0 a Diskem 3. Zbylé nepřidělené úseky budou součástí rozloženého svazku.","Disk3 převedu na dynamický. Vytvořím RAID-1 mezi oddílem C: na disku C: použiji 400 GB z Disku 2. Vytvořím RAID-5.<br>Využiji 600 GB z nepřiděleného místo na Disku 0, Disku 1, Disku 2 a Disku 3. Zde bude instalován program MS Exchange.<br>Oddíl X: na Disku 1 a zbylých 200 GB na Disku 3 budou nakonfigurovány jako RAID 1. Zbylých 200 GB na Disku 1 zůstane jako jednoduchý svazek.","Disk 3 převedu na dynamický. Oddíl X: přesunu na Disk0. Disk 1 a Disk 2 budou tvořit svazek RAID1.<br>Oddíly C: a X: na Disku 0 budou součástí dalšího RAIDu 1 mezi Diskem 0 a Diskem 3. Zbylé nepřidělené úseky budou součástí prokládaného svazku.","Disk 3 převedu na dynamický. Vytvořím RAID-1 mezi oddílem C: na disku C: použiji 400 GB z Disku 2. Vytvořím RAID-5.<br>Využiji 600 GB z nepřiděleného místo na Disku 0, Disku 1, Disku 2. Zde bude instalován program MS Exchange.<br>Na Disku 1 mi zůstalo ještě 200 GB nepřiděleného prostoru a má k dispozici plnou kapacitu Disku 3. Pomocí Správy disků zvětším velikost oddílu X: na 400 GB.<br>Vytvořím RAID-1 mezi oddílem X: a nepřiděleným prostorem na Disku 3. Zbylých 200 GB na Disku 3 zůstane jako jednoduchý svazek."],c:[3],a:"Disk 3 převedu na dynamický. Vytvořím RAID-1 mezi oddílem C: na disku C: použiji 400 GB z Disku 2. Vytvořím RAID-5.<br>Využiji 600 GB z nepřiděleného místo na Disku 0, Disku 1, Disku 2. Zde bude instalován program MS Exchange.<br>Na Disku 1 mi zůstalo ještě 200 GB nepřiděleného prostoru a má k dispozici plnou kapacitu Disku 3. Pomocí Správy disků zvětším velikost oddílu X: na 400 GB.<br>Vytvořím RAID-1 mezi oddílem X: a nepřiděleným prostorem na Disku 3. Zbylých 200 GB na Disku 3 zůstane jako jednoduchý svazek."},

{q:`Byli jste pověřeni správou serveru s operačním systémem Windows 2019. Konfigurace disků je znázorněna na následujícím schématu.<br>Firmware serveru nepodporuje vytváření dynamických svazků. Následující zadání musí být splněno v rámci konfiguračních možností OS Windows 2019.<br><br>
<table class="disk-table">
  <tr><td class="disk-name">Disk 0<br>Basic, 1 TB</td><td class="disk-part">C: Spouštěcí, systémový...<br>400 GB</td><td class="disk-free">Nepřiděleno<br>600 GB</td></tr>
  <tr><td class="disk-name">Disk 1<br>Basic, 1 TB</td><td class="disk-free">Nepřiděleno<br>800 GB</td><td class="disk-part">S: 200 GB</td></tr>
  <tr><td class="disk-name">Disk 2<br>Basic, 1 TB</td><td class="disk-free">Nepřiděleno<br>800 GB</td><td class="disk-part">S: 200 GB</td></tr>
  <tr><td class="disk-name">Disk 3<br>Basic, 1 TB</td><td class="disk-free">Nepřiděleno<br>1 TB</td><td></td></tr>
</table>
<br>Bylo rozhodnuto, že tento server bude v síti plnit roli řadiče domény, DNS, DHCP a bude zde instalován databázový MS SQL serveru.<br>Programové a datové soubory řadiče domény, DNS, DHCP serveru jsou umístěny v adresáři Windows.<br>MS SQL server bude využívat nepřidělený volný prostor na discích. Předpokládá se, že spotřebuje cca 1500 GB diskového prostoru.<br>Vaše řešení musí zabezpečit co nejvyšší odolnost vůči technickému selhání pevných disků a co nejlepší využití diskového prostoru.<br>Z následujících možností vyberte nejlepší řešení.`,o:["Disky nebudu převádět na dynamické, ponechám je v původní konfiguraci Basic.<br>Vytvořím svazek RAID-1 skládající se z disku C: na Disku0 a použiji 400 GB nepřiděleného prostoru na Disku 3. Dále vytvořím svazek RAID-5.<br>Tento svazek využije nepřidělený prostor na Disku 0 (600 GB), na disku Disku 1 (600 GB, 200 GB zůstává nepřidělených), na Disku 2 (600 GB, 200 GB zůstává nepřidělených) a na Disku 3 (zbylých 600 GB nepřiděleného místa).","Všechny disky převedu na dynamické. Vytvořím svazek RAID-1 skládající se z disku C: na Disku 0 a použiji 400 GB nepřiděleného prostoru na Disku 3. Dále vytvořím svazek RAID-5.<br>Tento svazek využije nepřidělený prostor na Disku0 (600 GB), na disku Disku 1 (600 GB, 200 GB zůstává nepřidělených), na Disku 2 (600 GB, 200 GB zůstává nepřidělených) a na Disku 3 (600 GB nepřiděleného místa).","Všechny disky převedu na dynamické. Vytvořím svazek RAID-1 skládající se z disku C: na Disku0 a použiji 400 GB nepřiděleného prostoru na Disku3.<br>Dále vytvořím svazek RAID-5. Tento svazek využije veškerý nepřidělený prostor na Disku0, Disku1, Disku2, Disku3.<br>Nezůstane vůbec žádný volný nepřidělený prostor.","Všechny disky převedu na dynamické. Vytvořím svazek RAID-1 skládající se z disku C: na Disku 0 a z 400 GB na Disku 3. Další svazek RAID-1 bude sestávat z nepřidělených míst na Disku 1 a Disku 2."],c:[1],a:"Všechny disky převedu na dynamické. Vytvořím svazek RAID-1 skládající se z disku C: na Disku 0 a použiji 400 GB nepřiděleného prostoru na Disku 3. Dále vytvořím svazek RAID-5.<br>Tento svazek využije nepřidělený prostor na Disku0 (600 GB), na disku Disku 1 (600 GB, 200 GB zůstává nepřidělených), na Disku 2 (600 GB, 200 GB zůstává nepřidělených) a na Disku 3 (600 GB nepřiděleného místa)."},
{q:`Vaše PC s operačním systémem Windows 2019 máte k dispozici tři HDD v následujícím rozdělení.<br><br>

  <tr><td class="disk-name">Disk 2<br>Dynamický 500 GB</td><td class="disk-part">Q: 120 GB</td><td class="disk-part">X: 140 GB</td><td class="disk-free">Nepřiděleno 240 GB</td></tr>

<br>Na tomto počítači bude provozována rozsáhlá SQL databáze, která bude potřebovat minimálně 600 GB.<br>Jak rozdělíte diskový prostor, aby splňoval tento požadavek. Řešení bude provedeno v rámci konfigurace OS.`,o:["Disk 0 a Disk 1 převedu na dynamický. Z nepřidělených úseků na Disku0, Disku1, Disku2 vytvořím svazek RAID-0.<br>Velikost úseků tvořících svazek mi bude limitovat hodnota 240 GB volného prostoru na Disku 2. Na Discích 1, 2 musím využít rovněž po 240 GB.","Převod Disku 0 a Disku 1 na dynamický je zbytečný. Rozložený svazek tento převod nepotřebuje.<br>Z nepřidělených úseků na Disku1 a Disku2 vytvořím rozložený svazek. Pro vytvoření svazku využiji veškerou volnou kapacitu.","Disk 0 a Disk 1 převedu na dynamický Z nepřidělených úseků na Disku1 a Disku2 vytvořím rozložený svazek.<br>Pro vytvoření svazku využiji veškerou volnou kapacitu.","Disk 0 a Disk 1 převedu na dynamický. Obsah disku Q: překopíruji do nově vytvořeného svazku v původně nepřiděleném prostoru na Disku 0. Oddíl Q: na Disku 3 odstraním, nepřidělený prostor teď bude mít velikost 360 GB.<br>Z nepřidělených úseků na Disku 1 a Disku 2 vytvořím RAID-1. Využiji volné kapacity disků 2×340 GB. Zbylých 20 GB na Disku 2 připojím k disku X:.","Disk 0 a Disk 1 převedu na dynamický. Z nepřidělených úseků vytvořím prokládaný svazek s paritou – RAID-5.<br>Pro vytvoření svazku využiji veškerou volnou kapacitu."],c:[2],a:"Disk 0 a Disk 1 převedu na dynamický Z nepřidělených úseků na Disku1 a Disku2 vytvořím rozložený svazek. Pro vytvoření svazku využiji veškerou volnou kapacitu."},

{q:"Máte k dispozici PC s OS Windows 10. Při sledování systému jste zjistili následující parametry: V PC je nainstalován jeden vícejádrový procesor s frekvencí 3 Ghz, 4 GB RAM, jeden 750 GB SATA disk.<br>PC používá síťovou kartu 3COM 100 Mb/s, která je připojena k přepínači 1 000 Mb/s.<br>Už delší dobu sledujete dlouhé odezvy aplikací a celkové zpomalení práce systému. Naměřené parametry:<br><br><table class=\"q-table\"><tr><th>Čítač</th><th>minimum</th><th>maximum</th><th>průměr</th></tr><tr><td>Paměť – Chyby stránek/s</td><td>412</td><td>8680</td><td>4200</td></tr><tr><td>Paměť – Počet kB k dispozici</td><td>31</td><td>236</td><td>172</td></tr><tr><td>Paměť – kB stránkového fondu</td><td>438</td><td>1100</td><td>986</td></tr><tr><td>CPU – % času CPU</td><td>19</td><td>100</td><td>38</td></tr><tr><td>Fyzický disk – aktuální délka diskové fronty</td><td>0</td><td>3,7</td><td>1,4</td></tr><tr><td>Fyzický disk – % času disku</td><td>0</td><td>21</td><td>11</td></tr><tr><td>Síťové rozhraní – Mb/sec</td><td>0,00</td><td>21,8</td><td>17,4</td></tr></table><br>Která ze sledovaných komponent má nejvyšší podíl na nevyhovujícím stavu a měla by se vyměnit?<br>Z finančních důvodů můžete provést změnu pouze jedné komponenty.",o:["Výměna CPU za výkonnější.","Výměna HDD za rychlejší.","Výměna síťové karty s přenosovou kapacitou 100 Mb/s za 1000 Mb/s.","Přidání dalšího modulu operační paměti. Celková hodnota operační paměti potom bude 8 GB.","Zvětšení hodnoty virtuální paměti."],c:[3],a:"Přidání dalšího modulu operační paměti. Celková hodnota operační paměti potom bude 8 GB."},
{q:"Pomocí interního programu Windows jste prováděli testování výkonu počítače. Získali jste následující výsledky.<br>Označte odpověď, která správně popisuje slabé místo PC. Počítač má 16GB operační paměti, 1GB aktuálně připojenou síťovou kartu.",o:["Ze sledovaných údajů vyplývá, že nejvíce je zatížen HDD. Nasvědčuje tomu ukazatel % času disku a % času čtení disku.","Problematickým místem je síťové rozhraní. Hodnota odeslaných a přijatých bajtů je příliš vysoká.","Počítač má nedostatečně velkou operační paměť. Svědčí o tom ukazatel  Potvrzené bajty  a  Počet MB k dispozici.","Problematický je výkon procesoru. Parametry ukazují, že se počítač blíží k hranici své výkonnosti."],c:[0],a:"Ze sledovaných údajů vyplývá, že nejvíce je zatížen HDD.\nNasvědčuje tomu ukazatel % času disku a % času čtení disku."},
{q:"Jeden z parametrů který se sleduje je velikost dostupné fyzické paměti?<br>Pod jakou hodnotu by neměla její úroveň klesnout?",o:["5 %","15 %","20 %","10 %","30 %"],c:[0],a:"5 %"},
{q:"Čítač Paměť/Potvrzené bajty zastupuje množství potvrzené virtuální paměti. Pokud má server vysoký poměr potvrzených bajtů a celkové fyzické paměti, měla by se do systému přidat další operační paměť.Podíl potvrzených bajtů a celkového objemu paměti by neměl přesahovat  (doplňte).",o:["70 %","85 %","95 %","80 %","90 %","75 %"],c:[5],a:"75 %"},
{q:"Pokud ukazuje čítač % času disku vysoké hodnoty, zatímco jsou hodnoty čítačů procesoru a síťového rozhraní nízké, může výkon snižovat pevný disk.",o:["Pravda","Nepravda"],c:[0],a:"Pravda"},
{q:"Máte k dispozici server s OS Windows 2019. Při sledování systému jste zjistili následující parametry: Je nainstalován jeden procesor s frekvencí 2,8 Ghz, 4 GB RAM, jeden 750 GB SCSI disk.<br>PC používá síťovou kartu 3COM 100 Mb/s, která je připojena k přepínači 1000 Mb/s.<br>Už delší dobu sledujete dlouhé odezvy aplikací a celkové zpomalení práce systému. Naměřené parametry:<br><br><table class=\"q-table\"><tr><th>Čítač</th><th>minimum</th><th>maximum</th><th>průměr</th></tr><tr><td>Paměť – Chyby stránek/s</td><td>1,00</td><td>9,2</td><td>8,7</td></tr><tr><td>Paměť – Počet kB k dispozici</td><td>990</td><td>2534</td><td>2005</td></tr><tr><td>CPU – % času CPU</td><td>19</td><td>100</td><td>89</td></tr><tr><td>Fyzický disk – aktuální délka diskové fronty</td><td>0,3</td><td>3,7</td><td>1,4</td></tr><tr><td>Síťové rozhraní – Mb/sec</td><td>0,00</td><td>19,8</td><td>16,4</td></tr><tr><td>Délka fronty procesoru</td><td>2,1</td><td>8,6</td><td>5,1</td></tr></table><br>Která ze sledovaných komponent má nejvyšší podíl na nevyhovujícím stavu a měla by se vyměnit.?<br>Z finančních důvodů můžete provést změnu pouze jedné komponenty.",o:["Výměna síťové karty s přenosovou kapacitou 100 Mb/s za 1000 Mb/s.","Přidání dalšího modulu operační paměti. Celková hodnota operační paměti potom bude 8 GB.","Výměna HDD za výkonnější.","Výměna CPU za výkonnější."],c:[3],a:"Výměna CPU za výkonnější."},
{q:"Čítač Systém/Délka fronty procesoru zobrazuje počet vláken, která čekají na zpracování.<br>Vlákna se řadí do fronty v oblasti sdílené všemi procesory v systému.<br>Pokud má tento čítač trvale hodnotu vyšší než  (vyberte správnou možnost)  vláken na procesor, měli byste procesory vyměnit za výkonnější nebo systém osadit dalšími CPU.",o:["2","20","15","5","10"],c:[4],a:"10"},
{q:"Který z následujících požadavků není možné splnit v doméně Windows prostřednictvím Zásad skupiny (GPO)?",o:["Zákaz instalace ovladačů tiskáren uživatelům domény.","Nastavení délky hesla pro uživatele domény.","Přesměrování složky Dokumenty z lokálních disků uživatelů do sdílené složky na souborovém serveru.","Konfigurace libovolného prohlížeče na počítačích v rámci domény Windows."],c:[3],a:"Konfigurace libovolného prohlížeče na počítačích v rámci domény Windows."},

{q:"Kterou z níže uvedených možností auditování zvolíte pro sledování přístupu ke spustitelnému souboru?",o:["Auditovat události přihlášení.","Auditovat používání privilegií.","Auditovat přístup k objektům.","Auditovat události přihlášení k účtu."],c:[2],a:"Auditovat přístup k objektům."},

{q:"U Windows 2008 se poprvé objevily  zásady skupiny  a  předvolby zásad skupiny.<br>Označte správný výrok popisující možnosti nastavení zásad a předvoleb.",o:["Nastavení zásad skupiny jsou vynucená.","Zásad skupiny nastavené v rámci domény je možné vždy uživatelem zmodifikovat.","Zásady skupiny a předvolby obsahují stejná nastavení.","Předvolby i zásady se automaticky aktualizují."],c:[0],a:"Nastavení zásad skupiny jsou vynucená."},

{q:"Označte pravdivý výrok.",o:["GPO umožňují přidělování IPv4/IPv6 adres a dalších síťových parametrů počítačům v rámci lokality.","Organizační jednotka nemůže převzít zásady skupiny od jiné organizační jednotky.","Aktualizace zásad mezi řadiči domény můžeme provést pomocí příkazu GPRESULT s příslušnými parametry. Příkaz je nutné spustit s právy administrátora.","Pokud některé části domény používají pomalé připojení, některé zásady se na ně nebudou aplikovat."],c:[3],a:"Pokud některé části domény používají pomalé připojení, některé zásady se na ně nebudou aplikovat."},

{q:"Vytvořím zásadu skupiny s názvem  Security  na úrovni domény Windows 2012. V doméně jste vytvořili organizační jednotku  Store  a rámci této jednotky máte další organizační jednotku  Sekce1 .<br>Potřebujete dosáhnout stavu, aby nastavení zásad skupiny v jednotce Sekce1 nebylo ovlivněno konfigurací zásad skupiny na úrovni domény.<br>Označte nejvhodnější způsob řešení daného problému.",o:["Nebudu dělat vůbec nic, protože pokud začnu konfigurovat parametry zásad skupiny na úrovni  Sekce1 , nebudou se přenášet parametry z domény a nadřízené organizační jednotky.","Na úrovni zásad skupiny organizační jednotky  Sekce1  aktivuji položku  Zablokování dědičnosti .","Na úrovni zásad skupiny domény  Security  aktivuji položku  Zablokování dědičnosti .","Na úrovni zásad skupiny organizační jednotky  Sekce1  aktivuji položku  Vynucené ."],c:[1],a:"Na úrovni zásad skupiny organizační jednotky  Sekce1  aktivuji položku  Zablokování dědičnosti ."},
{q:"Který z následujících výroků o Zásadách skupiny (GPO) v doméně s operačním systémem Windows 2019 je  nepravdivý .",o:["GPO umožňují spouštění skriptů. Skripty mohou být vytvořeny pomocí příkazů příkazového řádku, nebo PowerShellu.","GPO umožňuje instalaci programů. Je možné použít nejenom instalační programy Windows (.msi), ale operační systém akceptuje instalační soubory ve formátu .exe, .cmd, .bat.","Pomocí GPO se dají namapovat sdílené složky na klientské počítače.","GPO umožňují konfiguraci interního firewallu na členských počítačích v doméně Windows."],c:[1],a:"GPO umožňuje instalaci programů. Je možné použít nejenom instalační programy Windows (.msi), ale operační systém akceptuje instalační soubory ve formátu .exe, .cmd, .bat."},
{q:"Označte nesprávný výrok o protokolu DHCP v síti s protokolem IPv4.",o:["Pokud chci provést pro klienta rezervaci IPV4 adresy, musím znát jeho MAC adresu.","Typicky se pomocí DHCP nastavují parametry – IPv4 adresa, subsíťová maska, výchozí brána, název domény, IPv4 adresa DNS serveru.","Přidělení síťové konfigurace klientovi probíhá ve čtyřech krocích – DHCPDISCOVER, DHCPOFFER, DHCPREQUEST, DHCPACK.","Pokud DHCP klient nezíská z DHCP serveru síťovou konfiguraci, začne používat link-local adresu ze sítě 127.0.0.0/8."],c:[3],a:"Pokud DHCP klient nezíská z DHCP serveru síťovou konfiguraci, začne používat link-local adresu ze sítě 127.0.0.0/8."},

{q:"Následující výpis konfigurace Linuxového  DHCP serveru který pracuje v síti s adresou 10.8.0.0/24.<br>Jeho úkolem je přidělit síťovou konfiguraci 130 hostitelům.<br>subnet 10.8.0.0 netmask 255.255.255.0 {<br>range 10.8.8.11 10.8.8.140;<br>option routers 10.8.0.1;<br>option domain-name-servers 10.8.0.5, 10.8.0.6;<br>option domain-name \"mxl.cz\";<br>option ntp-servers 10.8.8.6;<br>default-lease-time 43200;<br>max-lease-time 86400;<br>}<br>DHCP server nefunguje.<br>Kde je chyba?",o:["Subsíťová maska ve tvaru 255.255.255.0 je špatně. Pro uvedenou konfiguraci by měla být ve tvaru 255.255.255.240.","Na konci řádků nemůže být znak středník(;) ale dvojtečka (:).","Chybná adresa sítě.","Rozsah adres musí být správně zapsán ve tvaru:<br>range 10.8.8.10-10.8.8.140","Uvedená konfigurace je v pořádku. Nefunkčnost služby DHCP má na svědomí chyba někde jinde.","Rozsah adres musí být správně zapsán ve tvaru:<br>range 10.8.0.11 10.8.0.140","Subsíťová maska ve tvaru 255.255.255.0 je špatně. Pro uvedenou konfiguraci by měla být ve tvaru 255.255.255.192."],c:[5],a:"Rozsah adres musí být správně zapsán ve tvaru:\nrange 10.8.0.11 10.8.0.140"},

let currentMode = 'practice';
let currentIndex = 0;
let testQuestions = [];
let userAnswers = {};
let timerInterval;
let isReviewing = false;

// --- DARK MODE ---
function applyTheme(dark) {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    const btn = document.getElementById('theme-toggle');
    if (btn) btn.innerText = dark ? '☀️ Světlý mód' : '🌙 Tmavý mód';
    localStorage.setItem('theme', dark ? 'dark' : 'light');
}

function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    applyTheme(!isDark);
}

// Automatická detekce při načtení
(function() {
    const saved = localStorage.getItem('theme');
    if (saved) {
        applyTheme(saved === 'dark');
    } else {
        applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
    }
    // Sleduj živé změny systémového nastavení (jen pokud uživatel nemá vlastní volbu)
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        if (!localStorage.getItem('theme')) applyTheme(e.matches);
    });
})();

function setMode(mode) {
    currentMode = mode;
    userAnswers = {};
    isReviewing = false;
    document.getElementById('nav-grid').innerHTML = '';
    document.getElementById('expl').style.display = 'none';
    document.getElementById('results-card').style.display = 'none';
    document.getElementById('quiz-card').style.display = 'block';
    
    document.getElementById('test-bar').style.display = (mode === 'test') ? 'flex' : 'none';
    const badge = document.getElementById('mode-badge');
    
    if (mode === 'practice') {
        testQuestions = database; 
        badge.innerText = 'Procvičování';
        badge.style.background = '#e0f2fe';
        badge.style.color = '#0369a1';
        renderNav();
        loadQ(0);
    } else {
        testQuestions = [...database].sort(() => 0.5 - Math.random()).slice(0, 20);
        badge.innerText = 'TEST';
        badge.style.background = '#fce7f3';
        badge.style.color = '#be185d';
        renderNav();
        loadQ(0);
        startTimer();
    }
}

function reviewTest() {
    isReviewing = true;
    document.getElementById('results-card').style.display = 'none';
    document.getElementById('quiz-card').style.display = 'block';
    document.getElementById('test-bar').style.display = 'none';
    
    const badge = document.getElementById('mode-badge');
    badge.innerText = 'KONTROLA CHYB';
    badge.style.background = '#fef3c7';
    badge.style.color = '#d97706';

    updateNavForReview();
    loadQ(0);
}

function renderNav() {
    const grid = document.getElementById('nav-grid');
    grid.innerHTML = '';
    testQuestions.forEach((_, i) => {
        const btn = document.createElement('div');
        btn.className = 'nav-btn';
        btn.innerText = i + 1;
        btn.onclick = () => loadQ(i);
        btn.id = 'nav-' + i;
        grid.appendChild(btn);
    });
}

function updateNavForReview() {
    testQuestions.forEach((q, i) => {
        const btn = document.getElementById('nav-' + i);
        const uIdx = userAnswers[i];
        if (uIdx !== undefined && q.c.includes(uIdx)) {
            btn.classList.add('correct');
        } else {
            btn.classList.add('wrong');
        }
    });
}

function loadQ(index) {
    currentIndex = index;
    const q = testQuestions[index];
    
    document.getElementById('q-num').innerText = `Otázka ${index + 1} / ${testQuestions.length}`;
    document.getElementById('q-text').innerHTML = q.q;
    
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('nav-' + index).classList.add('active');

    const optsDiv = document.getElementById('options');
    optsDiv.innerHTML = '';

    const explDiv = document.getElementById('expl');
    explDiv.style.display = 'none';
    explDiv.innerHTML = "<strong>Správná odpověď:</strong><br>" + q.a;

    const answered = userAnswers[index] !== undefined;

    if ((currentMode === 'practice' && answered) || isReviewing) {
        explDiv.style.display = 'block';
    }

    q.o.forEach((optText, i) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.innerHTML = optText;
        
        if (currentMode === 'practice') {
            if (answered) {
                div.classList.add('disabled');
                if (q.c.includes(i)) div.classList.add('correct');
                else if (i === userAnswers[index]) div.classList.add('wrong');
            }
        } else if (currentMode === 'test') {
            if (isReviewing) {
                div.classList.add('disabled');
                if (q.c.includes(i)) {
                    div.classList.add('correct');
                } else if (i === userAnswers[index]) {
                    div.classList.add('wrong');
                }
            } else {
                if (i === userAnswers[index]) {
                    div.classList.add('selected-test');
                }
            }
        }

        div.onclick = () => {
            if (!div.classList.contains('disabled')) selectAnswer(index, i);
        };
        optsDiv.appendChild(div);
    });
}

function selectAnswer(qIndex, optIndex) {
    if (currentMode === 'practice' && userAnswers[qIndex] !== undefined) return;
    if (isReviewing) return;
    
    userAnswers[qIndex] = optIndex;
    const q = testQuestions[qIndex];
    const navBtn = document.getElementById('nav-' + qIndex);

    if (currentMode === 'practice') {
        const isCorrect = q.c.includes(optIndex);
        navBtn.classList.add(isCorrect ? 'correct' : 'wrong');
        loadQ(qIndex); 
    } else {
        navBtn.classList.add('answered-test');
        loadQ(qIndex); 
    }
}

function nextQ() {
    if (currentIndex < testQuestions.length - 1) loadQ(currentIndex + 1);
}

function prevQ() {
    if (currentIndex > 0) loadQ(currentIndex - 1);
}

function startTimer() {
    let sec = 1200; 
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        sec--;
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        if (sec <= 0) finishTest();
    }, 1000);
}

function finishTest() {
    clearInterval(timerInterval);
    document.getElementById('quiz-card').style.display = 'none';
    document.getElementById('test-bar').style.display = 'none';
    document.getElementById('results-card').style.display = 'block';

    let score = 0;
    testQuestions.forEach((q, i) => {
        const uIdx = userAnswers[i];
        if (uIdx !== undefined && q.c.includes(uIdx)) {
            score++;
        }
    });

    const perc = Math.round((score / 20) * 100);
    document.getElementById('final-score').innerText = perc + "%";
    document.getElementById('final-text').innerText = `Získali jste ${score} bodů z 20.`;
}

// Start
setMode('practice');
</script>

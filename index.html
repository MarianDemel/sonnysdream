<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maturitní Testy IT – OPS</title>
<style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --text: #0f172a;
            --card: #ffffff;
            --border: #e2e8f0;
            --sidebar-bg: #ffffff;
            --option-bg: #ffffff;
            --option-text: #334155;
            --option-hover-bg: #f8fafc;
            --nav-bg: #f1f5f9;
            --nav-text: #64748b;
            --nav-border: #cbd5e1;
            --meta-text: #64748b;
            --q-text: #1e293b;
            --expl-bg: #eff6ff;
            --expl-border: #2563eb;
            --expl-text: #1e3a8a;
            --testbar-bg: #ffffff;
            --context-bg: #fff7ed;
            --context-text: #9a3412;
            --disk-name-bg: #f8fafc;
            --disk-name-text: #334155;
            --disk-part-bg: #e0f2fe;
            --disk-part-text: #0369a1;
            --disk-part-border: #0ea5e9;
            --disk-free-bg: #f1f5f9;
            --disk-free-text: #64748b;
            --table-header-bg: #f1f5f9;
            --score-shadow: rgba(37,99,235,0.3);
            --btn-prev-bg: #e2e8f0;
            --btn-prev-text: #475569;
            --btn-prev-hover: #cbd5e1;
            --results-text: #475569;
            --sidebar-header-bg: var(--primary);
        }

        [data-theme="dark"] {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg: #0f172a;
            --text: #e2e8f0;
            --card: #1e293b;
            --border: #334155;
            --sidebar-bg: #1e293b;
            --option-bg: #1e293b;
            --option-text: #cbd5e1;
            --option-hover-bg: #263347;
            --nav-bg: #0f172a;
            --nav-text: #94a3b8;
            --nav-border: #334155;
            --meta-text: #94a3b8;
            --q-text: #e2e8f0;
            --expl-bg: #172040;
            --expl-border: #3b82f6;
            --expl-text: #bfdbfe;
            --testbar-bg: #1e293b;
            --context-bg: #1c1208;
            --context-text: #fdba74;
            --disk-name-bg: #0f172a;
            --disk-name-text: #94a3b8;
            --disk-part-bg: #0c2a3a;
            --disk-part-text: #38bdf8;
            --disk-part-border: #0284c7;
            --disk-free-bg: #1e293b;
            --disk-free-text: #64748b;
            --table-header-bg: #0f172a;
            --score-shadow: rgba(59,130,246,0.4);
            --btn-prev-bg: #1e293b;
            --btn-prev-text: #94a3b8;
            --btn-prev-hover: #334155;
            --results-text: #94a3b8;
        }

        * { box-sizing: border-box; }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; color: var(--text); transition: background 0.2s, color 0.2s; }
        .context-box img { max-width: 100%; height: auto; border-radius: 6px; margin-bottom: 10px; display: block; }        
        
        .sidebar { width: 340px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; z-index: 10; transition: background 0.2s, border-color 0.2s; }
        
        /* Obal hlavičky s hover obrázkem */
        .sidebar-header { 
            padding: 20px; 
            background: var(--primary); 
            color: white; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
            transition: background 0.3s, background-image 0.3s;
            position: relative;
            overflow: hidden;
        }

        .sidebar-header::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url('2137.jpg');
            background-size: cover;
            background-position: center 40%;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            z-index: 0;
        }

        @media (hover: hover) and (pointer: fine) {
            .sidebar-header:hover::after {
                opacity: 1;
            }
        }

        /* Zajištění, aby text a tlačítka zůstaly čitelné nad obrázkem hlavičky */
        .sidebar-title, .sidebar-subtitle, .sidebar-warning, .sidebar-btn-group, .theme-btn {
            position: relative;
            z-index: 1;
        }

        .sidebar-content { flex: 1; overflow-y: auto; padding: 12px; scrollbar-width: thin; }

        .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .nav-btn { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border: 1px solid var(--nav-border); background: var(--nav-bg); cursor: pointer; font-size: 11px; border-radius: 6px; font-weight: 600; color: var(--nav-text); transition: all 0.15s; }
        .nav-btn:hover { background: #e0f2fe; color: var(--primary); border-color: var(--primary); transform: scale(1.1); }
        [data-theme="dark"] .nav-btn:hover { background: #172a45; }
        .nav-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 0 10px rgba(37, 99, 235, 0.4); }

/* Modrá musí být první, aby ji ostatní barvy mohly přebít */
        .nav-btn.answered-test { background: #bfdbfe; color: #1e40af; border-color: #3b82f6; }
        [data-theme="dark"] .nav-btn.answered-test { background: #1e3a5c; color: #93c5fd; border-color: #3b82f6; }

        .nav-btn.correct { background: #22c55e !important; color: white !important; border-color: #16a34a !important; }
        .nav-btn.wrong { background: #ef4444 !important; color: white !important; border-color: #dc2626 !important; }

        .main { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; position: relative; }
        .container { max-width: 900px; width: 100%; margin-bottom: 50px; }

        .card { background: var(--card); padding: 40px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); border: 1px solid var(--border); transition: background 0.2s, border-color 0.2s; }
        [data-theme="dark"] .card { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }

        .question-meta { display: flex; justify-content: space-between; margin-bottom: 25px; color: var(--meta-text); font-size: 0.9em; font-weight: 500; border-bottom: 2px solid var(--border); padding-bottom: 15px; }
        .question-text { font-size: 1.15em; font-weight: 600; margin-bottom: 30px; line-height: 1.6; color: var(--q-text); }

        .disk-table { width: 100%; border-collapse: separate; border-spacing: 0; margin: 20px 0; border: 1px solid var(--nav-border); border-radius: 8px; overflow: hidden; font-size: 0.9em; }
        .disk-table td { border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); padding: 12px; vertical-align: top; }
        .disk-table tr:last-child td { border-bottom: none; }
        .disk-table td:last-child { border-right: none; }
        .disk-name { background-color: var(--disk-name-bg); font-weight: 700; width: 25%; color: var(--disk-name-text); }
        .disk-part { background-color: var(--disk-part-bg); color: var(--disk-part-text); border-left: 4px solid var(--disk-part-border) !important; font-weight: 500; }
        .disk-free { background-color: var(--disk-free-bg); color: var(--disk-free-text); font-style: italic; border-left: 4px dashed var(--nav-border) !important; }

        .q-table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 0.9em; border: 1px solid var(--nav-border); }
        .q-table th { background: var(--table-header-bg); padding: 10px; text-align: left; border: 1px solid var(--nav-border); color: var(--q-text); }
        .q-table td { padding: 8px; border: 1px solid var(--nav-border); color: var(--option-text); }

        .context-box { background: var(--context-bg); border-left: 4px solid #f97316; padding: 15px; margin-bottom: 20px; border-radius: 4px; font-style: italic; color: var(--context-text); font-size: 0.95em; }

        .options { display: flex; flex-direction: column; gap: 12px; }
        .option { padding: 18px 20px; border: 2px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; font-size: 1em; background: var(--option-bg); color: var(--option-text); }
        .option:not(.disabled):hover { border-color: #94a3b8; background: var(--option-hover-bg); transform: translateX(5px); }

        .option.selected-test { background: #eff6ff; border-color: var(--primary); color: var(--primary); font-weight: 600; box-shadow: 0 0 0 1px var(--primary); }
        [data-theme="dark"] .option.selected-test { background: #172040; color: #93c5fd; }
        .option.correct { background: #dcfce7; border-color: #22c55e; color: #14532d; font-weight: 600; }
        [data-theme="dark"] .option.correct { background: #0f2d1a; color: #86efac; border-color: #22c55e; }
        .option.wrong { background: #fee2e2; border-color: #ef4444; color: #991b1b; opacity: 0.8; }
        [data-theme="dark"] .option.wrong { background: #2d0f0f; color: #fca5a5; border-color: #ef4444; }
        .option.disabled { pointer-events: none; }

        .explanation { margin-top: 30px; padding: 20px; background: var(--expl-bg); border-radius: 8px; border-left: 5px solid var(--expl-border); color: var(--expl-text); line-height: 1.6; transition: background 0.2s; }

        .controls { margin-top: 40px; display: flex; justify-content: space-between; gap: 20px; }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; }
        .btn-prev { background: var(--btn-prev-bg); color: var(--btn-prev-text); }
        .btn-prev:hover { background: var(--btn-prev-hover); }
        .btn-next { background: var(--primary); color: white; box-shadow: 0 4px 6px -2px rgba(37, 99, 235, 0.3); }
        .btn-next:hover { background: var(--primary-hover); transform: translateY(-2px); }

        .test-bar { background: var(--testbar-bg); padding: 15px 25px; border-radius: 12px; margin-bottom: 25px; align-items: center; justify-content: space-between; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid var(--border); transition: background 0.2s; }
        .timer { font-family: monospace; font-size: 1.5em; font-weight: 700; color: #dc2626; background: #fef2f2; padding: 5px 15px; border-radius: 6px; }
        [data-theme="dark"] .timer { background: #2d0f0f; color: #f87171; }

        .results { text-align: center; }
        .score-circle { width: 150px; height: 150px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-size: 3em; font-weight: 800; margin: 20px auto; box-shadow: 0 10px 20px var(--score-shadow); }


/* Tlačítko pro změnu motivu */
        .theme-btn { margin-top: 10px; width: 100%; padding: 7px; font-size: 12px; background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .theme-btn:hover { background: #ffffff; color: var(--primary); border-color: #ffffff; transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
        
        /* Tlačítko Procvičovat */
        .btn-practice { flex: 1; padding: 8px; font-size: 13px; background: rgba(255, 255, 255, 0.2); color: white; border: 1px solid rgba(255, 255, 255, 0.4); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-practice:hover { background: #ffffff; color: var(--primary); border-color: #ffffff; transform: translateY(-4px) scale(1.04); box-shadow: 0 8px 15px rgba(0,0,0,0.2); }
        
        /* Tlačítko Ostrý TEST */
        .btn-test { flex: 1; padding: 8px; font-size: 13px; background: white; color: var(--primary); border: 1px solid transparent; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-test:hover { background: #e0f2fe; color: #1e40af; border-color: #bae6fd; transform: translateY(-4px) scale(1.04); box-shadow: 0 10px 20px rgba(0,0,0,0.25); }

        .hidden { display: none !important; }
        .d-flex { display: flex !important; }
        .sidebar-title { margin: 0; font-size: 1.4em; }
        .sidebar-subtitle { font-size: 0.85em; opacity: 0.9; margin-top: 5px; }
        .sidebar-warning { font-size: 0.85em; opacity: 0.9; margin-top: 5px; font-weight: bold; color: orange; }
        .sidebar-btn-group { margin-top: 15px; display: flex; gap: 10px; }
        
        .test-bar-title { display: block; color: var(--q-text); font-size: 1.1em; }
        .test-bar-subtitle { font-size: 0.9em; color: var(--meta-text); }
        .btn-end { background: #fee2e2; color: #b91c1c; padding: 8px 15px; }
        .mode-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.85em; font-weight: 700; display: inline-block; }
        .badge-practice { background: #e0f2fe; color: #0369a1; }
        .badge-test { background: #fce7f3; color: #be185d; }
        .badge-review { background: #fef3c7; color: #d97706; }
        .results-title { color: var(--q-text); margin-bottom: 10px; }
        .results-text { font-size: 1.2em; color: var(--results-text); margin-bottom: 30px; }
        .results-btn-group { display: flex; gap: 10px; justify-content: center; }
        .btn-review { background: #e0f2fe; color: #0284c7; font-size: 1.1em; padding: 15px 30px; }
        .btn-restart { font-size: 1.1em; padding: 15px 40px; }

        /* Tady začíná vrácená podmínka pro menší displeje, která prve omylem zmizela */
        @media (max-width: 900px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; max-height: none; border-right: none; border-bottom: 1px solid var(--border); }
            .sidebar-title { font-size: 1.15em; }
            .sidebar-subtitle, .sidebar-warning { font-size: 0.8em; margin-top: 3px; }
            .sidebar-btn-group { margin-top: 10px; gap: 8px; }
            .btn-practice, .btn-test { padding: 7px; font-size: 12px; }
            .theme-btn { padding: 6px; font-size: 11px; margin-top: 8px; }
            .sidebar-content { padding: 8px; max-height: 130px; overflow-y: auto; }
            .nav-grid { grid-template-columns: repeat(12, 1fr); gap: 4px; padding: 2px; }
            .nav-btn { font-size: 10px; border-radius: 4px; }
            .main { padding: 10px; }
            .container { margin-bottom: 20px; }
            .card { padding: 16px; border-radius: 12px; }
            .question-meta { margin-bottom: 15px; padding-bottom: 10px; font-size: 0.85em; }
            .question-text { font-size: 1em; margin-bottom: 20px; }
            .option { padding: 13px 15px; font-size: 0.95em; }
            .option:not(.disabled):hover { transform: none; }
            .controls { margin-top: 25px; gap: 10px; }
            .btn { padding: 10px 18px; font-size: 13px; }
            .explanation { margin-top: 20px; padding: 14px; font-size: 0.9em; }
            .test-bar { flex-direction: column; gap: 10px; padding: 12px 15px; align-items: flex-start; }
            .timer { font-size: 1.3em; }
            .btn-end { width: 100%; text-align: center; }
            .score-circle { width: 120px; height: 120px; font-size: 2.5em; }
            .results-btn-group { flex-direction: column; align-items: center; gap: 10px; }
            .btn-review, .btn-restart { width: 100%; padding: 13px 20px; font-size: 1em; }
            .disk-table { font-size: 0.8em; }
            .disk-table td { display: block; width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
            .disk-name { width: 100%; }
            .q-table { font-size: 0.8em; }
            .q-table th, .q-table td { padding: 6px; }
        }

        @media (max-width: 480px) {
            .nav-grid { grid-template-columns: repeat(10, 1fr); }
            .sidebar-content { max-height: 110px; }
            .card { padding: 13px; }
            .option { padding: 11px 13px; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h2 class="sidebar-title">Maturita IT</h2>
        <div class="sidebar-subtitle">Kompletní databáze (240 otázek..)</div>
        <div class="sidebar-warning">Obrázky na moodle dostupné nebyly, takže některé údaje nemusí sedět!!!</div>
        <div class="sidebar-btn-group">
            <button class="btn btn-practice" onclick="setMode('practice')">Procvičovat</button>
            <button class="btn btn-test" onclick="setMode('test')">Ostrý TEST</button>
        </div>
        <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()">🌙 Tmavý mód</button>
    </div>
    <div class="sidebar-content">
        <div class="nav-grid" id="nav-grid"></div>
    </div>
</div>

<div class="main">
    <div class="container">
        <div class="test-bar hidden" id="test-bar">
            <div>
                <strong class="test-bar-title">Ostrý test</strong>
                <span class="test-bar-subtitle">20 náhodných otázek</span>
            </div>
            <div class="timer" id="timer">20:00</div>
            <button class="btn btn-end" onclick="finishTest()">Ukončit test</button>
        </div>

        <div class="card" id="quiz-card">
            <div class="question-meta">
                <span id="q-num">Otázka 1</span>
                <span id="mode-badge" class="mode-badge badge-practice">Procvičování</span>
            </div>

            <div class="question-text" id="q-text"></div>

            <div class="options" id="options"></div>

            <div class="explanation hidden" id="expl"></div>

            <div class="controls">
                <button class="btn btn-prev" onclick="prevQ()">← Předchozí</button>
                <button class="btn btn-next" onclick="nextQ()">Další →</button>
            </div>
        </div>

        <div class="card results hidden" id="results-card">
            <h2 class="results-title">Test dokončen!</h2>
            <div class="score-circle" id="final-score">0%</div>
            <p id="final-text" class="results-text"></p>

            <div class="results-btn-group">
                <button class="btn btn-review" onclick="reviewTest()">Prohlédnout chyby</button>
                <button class="btn btn-next btn-restart" onclick="location.reload()">Spustit nový test</button>
            </div>
        </div>
    </div>
</div>

<script>
/* DATABÁZE OTÁZEK */
const database = [
{q:"Označte chybný výrok o operačním systému Windows.",o:["Ve Windows 10 je účet Administrator ve výchozím nastavení zakázaný.","Pro automatické zálohování uživatelských složek knihoven v prostředí OS Windows 10 je určen modul Historie souborů.","Pokud vytvoříme uživatelský účet v prostředí Windows 10, stává se ve výchozím nastavení členem skupiny Users.","Členem domény Windows může být počítač s OS Windows 10 Home, Professional, Education."],c:[3],a:"Členem domény Windows může být počítač s OS Windows 10 Home, Professional, Education.",e:"Edice Windows 10 Home neumožňuje připojení do firemní domény, k tomu jsou určeny až verze Pro nebo Education/Enterprise."},
{q:"Na souborovém serveru s OS Windows 2019 s úplným doménovým názvem db.fast.com byla nastavena sdílená složka \\\\db\\store . Toto sdílení reprezentuje složku G:\\data . Přístup ke sdílené složce \\\\db\\store je pro členy skupiny Everyone nastaven na Úplné řízení .<br>Přístupová oprávnění NTFS pro G:\\data umožňují Číst, Zapisovat, Zobrazovat obsah složky , Číst a spouštět, Měnit skupině Authenticated Users .<br>Skupina Sales má nastaveno pro tuto složku oprávnění Číst .<br>Nikol je členkou skupiny Sales a členem skupiny Domain Users .<br>Jaká budou oprávnění, pokud se pokusí Nikol o síťový přístup ke složce \\\\db\\store ?",o:["Úplné řízení","Žádná","Číst","Změnit"],c:[3],a:"Změnit",e:"Při kombinaci sdílení (Úplné řízení) a NTFS oprávnění se vždy bere to přísnější. Nikol má přes Authenticated Users NTFS právo Změnit (Měnit)."},
{q:"Které prohlášení o funkcích brány firewall v systému Windows Server 2019 je přesné?",o:["Automaticky blokuje veškerý datový provoz.","Nepodporuje příchozí pravidla.","Obsahuje předkonfigurovanou šablonu zabezpečení.","Integruje se výhradně s externími řešeními VPN."],c:[2],a:"Obsahuje předkonfigurovanou šablonu zabezpečení.",e:"Windows Firewall obsahuje předpřipravená pravidla a šablony pro různé serverové role (DNS, DHCP, IIS atd.), čímž usnadňuje konfiguraci."},
{q:"Potřebuji zobrazit statistické informace a provozu svého počítače s operačním systémem Windows – otevřené porty, navázaná spojení, počty odeslaných paketů.",o:["route","ipconfig /all","netstat","localhost"],c:[2],a:"netstat",e:"Příkaz netstat (Network Statistics) slouží k zobrazení aktivních spojení, portů a celkových statistik síťového rozhraní."},
{q:"Jaký typ zálohy v prostředí OS Windows 2019 server je podporován kromě normální (úplné) zálohy?",o:["kopie","rozdílová","přírůstková","denní"],c:[2],a:"přírůstková",e:"Zálohování Windows Serveru primárně podporuje vedle plné zálohy také přírůstkové zálohování pro efektivní ukládání pouze provedených změn na bloku."},
{q:"Pracuji na pracovní stanici označení WS04, která je součástí domény Windows.<br>Síť využívá výchozí bránu, která je instalována na serveru označeném RO25 se statickou IP adresou 192.168.25.1.<br>Pokud zadám příkaz ping 192.168.25.1 je spojení vyhodnoceno jako funkční. Pokud zadám název serveru RO25 nemám žádnou odezvu.<br>Co je příčinou tohoto stavu?",o:["Na serveru RO25 je upraveno nastavení firewallu – konkrétně chování protokolu ICMP. Z důvodu vyšší bezpečnosti jsou „skryty\" názvy počítačů.","Příčina je v tom, že pracovní stanice WS04, nemá z neznámého důvodu v doméně účet.<br>(Mohl být neúmyslně vymazán na řadiči domény). Proto pracovní stanice nemůže plně využívat síťových služeb.","V síti nefunguje služba DNS.","V síti nefunguje korektně služba DHCP. Došlo k přidělení názvu, ale není přidělena IP adresa."],c:[2],a:"V síti nefunguje služba DNS.",e:"Pokud prochází spojení přes IP adresu, ale ne přes textový název, je problém téměř jistě v překladu názvů, což má na starosti systém DNS."},
{q:"Co bude první krok klienta DNS, aby provedl překlad názvu počítače na IP adresu?",o:["Klient DNS začne provádět všesměrové vysílání s využitím protokolu UDP, aby vyhledal DNS server.","Klient provede dotaz na nastavený alternativní DNS server.","Klient provede dotaz na primární DNS server.","Klient zkontroluje svou místní mezipaměť DNS resolveru."],c:[3],a:"Klient zkontroluje svou místní mezipaměť DNS resolveru.",e:"Předtím než počítač odešle dotaz na server do sítě, vždy nejprve zkontroluje, zda už daný překlad nemá uložený ve své vlastní mezipaměti (nebo souboru hosts)."},
{q:"Která z následujících možností zvyšuje zabezpečení operačního systému Windows 10/11 tím, že detekuje neoprávněné změny v systému a brání jim?",o:["GAC (Guest Account Control)","MMC (Microsoft Management Console)","AAC (Administrative Account Control)","UAC (User Account Control)"],c:[3],a:"UAC (User Account Control)",e:"User Account Control (UAC) omezuje práva aplikací a při požadavku na hlubší změnu v systému vyžaduje ruční souhlas (nebo heslo) od administrátora."},
{q:"Sdílíte složku v počítači se systémem Windows 10 s jiným uživatelem v rámci pracovní skupiny.<br>Jak můžete upravit konfiguraci počítače druhého uživatele pro usnadnění přístupu ke sdílené složce?",o:["Vytvořte oprávnění NTFS.","Vytvořte účinná oprávnění.","Namapujte sdílenou složku.","Vytvořte doménu."],c:[2],a:"Namapujte sdílenou složku.",e:"Namapování síťového disku ve Windows způsobí, že se vzdálená složka bude tvářit a fungovat jako běžný lokální disk pod vlastním písmenem."},
{q:"Který z následujících režimů OS Windows 2019 server pracuje s minimem služeb a funkcí?",o:["Poslední známá funkční konfigurace.","Ladící režim.","Obnovení adresářových služeb.","Nouzový režim."],c:[3],a:"Nouzový režim.",e:"Nouzový režim zavádí pouze to nejnutnější jádro a základní ovladače (myš, klávesnice, zobrazení), aby šlo systém v případě kritické chyby opravit."},
{q:"Správcem sítě vám byla přidělena následující statická IPv4 adresa 222.17.18.125/26. Jaký bude tvar subsíťové masky?",o:["255.255.255.240","255.255.255.252","255.255.255.192","255.255.255.248"],c:[2],a:"255.255.255.192",e:"Prefix /26 znamená, že první 3 oktety jsou 255 a v posledním oktetu svítí první dva bity (128 + 64), což dává součet 192."},
{q:"V pracovní skupině máte počítač s OS Windows 10. Jaký je maximální počet souběžných připojení ke sdílené složce?",o:["10","20","50","Neomezeně"],c:[1],a:"20",e:"Operační systém Windows 10 z důvodu licenční politiky omezuje počet souběžných sdílených připojení k síti (SMB) na přesně 20 uzlů."},
{q:"Na souborovém serveru s OS Windows 10 s úplným doménovým názvem mydb.mycorp.com byla nastavena sdílená složka \\\\mydb\\personal .<br>Toto sdílení reprezentuje složku E:\\files . Přístupová oprávnění NTFS pro E:\\file s umožňují Úplné řízení skupině Authenticated Users .<br>Přístup ke sdílené složce \\\\mydb\\personal je pro členy skupiny Sales nastaven na Odepřít .<br>Robert je členem skupiny Sales a členem skupiny Users . Lokálně se přihlásil na počítač mydb.mycorp.com .<br>Jaká budou jeho oprávnění, pokud se pokusí o přístup ke složce E:\\files ?",o:["Číst","Žádná","Výchozí oprávnění NTFS pro složku. Číst, Číst a spouštět, Zobrazovat obsah složky.","Úplné řízení"],c:[3],a:"Úplné řízení",e:"Robert se přihlásil LOKÁLNĚ, nikoliv přes síť. Proto se oprávnění pro sdílenou složku (kde má odepřít) vůbec nebere v úvahu, aplikují se pouze lokální NTFS práva."},
{q:"Pomocí jaké klávesové kombinace spustíte správce úloh? Jako oddělovač mezi klávesami použijte znak \"+\", nepište mezery.",o:["CTRL+ALT+DEL","CTRL+SHIFT+ESC","WIN+R","ALT+F4"],c:[1],a:"CTRL+SHIFT+ESC",e:"Zkratka CTRL+SHIFT+ESC otevře Správce úloh rovnou na ploše bez nutnosti proklikávat se přes zamykací obrazovku."},
{q:"Kterým z následujících nástrojů můžete ukončit běžící proces v prostředí OS Windows? Vyberte nejpřesnější odpověď.",o:["správa počítače","výstrahy a protokolování výkonu","správce úloh","sledování systému"],c:[2],a:"správce úloh",e:"Správce úloh (Task Manager) slouží přesně k tomuto účelu – na kartě Procesy nebo Podrobnosti můžete ukončit zaseklý program."},
{q:"Na počítači s OS Windows 10 došlo k pokusu instalace nového ovladače zvukové karty. Operace neproběhla korektně.<br>Jaký je nejrychlejší návrat k původní instalované verzi ovladače zvukové karty?",o:["Použiji ve Správci zařízení funkci Vrátit změny ovladače.","Ve Správci zařízení zakážu zařízení a provedu reinstalaci původními (staršími) ovladači.","Do mechaniky vložím instalační DVD Windows v pomocí funkce Plug and Play dohraji potřebné soubory z instalačního DVD.<br>(Případně použiji jiné médium.)","Ve Správci zařízení odinstaluji ovladač a provedu instalaci původního ovladače."],c:[0],a:"Použiji ve Správci zařízení funkci Vrátit změny ovladače.",e:"Windows si zálohuje předchozí ovladač. Funkce 'Vrátit změny ovladače' umožňuje na jedno kliknutí obnovu bez nutnosti ručně cokoliv hledat."},
{q:"V jakém typu síťového prostředí s OS Windows má každý počítač vlastní bezpečnostní databázi?",o:["asociace","pracovní skupina","konglomerát","doména"],c:[1],a:"pracovní skupina",e:"Pracovní skupina (Workgroup) je decentralizovaná, zatímco v doméně se o účty a hesla stará centrální server (řadič)."},
{q:"Který z následujících programů dokáže zkomprimovat do jednoho souboru celé adresářové struktury?",o:["zip","gzip","compress","bzip2"],c:[0],a:"zip",e:"Zatímco gzip nebo bzip2 umí obvykle komprimovat jen jednotlivé soubory (a musí se použít s tarem), formát zip nativně komprimuje celé složky i podsložky najednou."},
{q:"Na souborovém serveru S1 s operačním systémem Windows je skrytě sdílená složka InstallApp.<br>IP adresa serveru 192.168.10.5/24 a sdílená složka se nachází na disku Z:. Jaká je správná UNC cesta?",o:["\\\\S1\\Z:\\$InstallApp","\\\\S1\\Z:\\%InstallApp%","\\\\192.168.10.5\\InstallApp$","\\\\S1\\$InstallApp"],c:[2],a:"\\\\192.168.10.5\\InstallApp$",e:"Cesta UNC začíná dvěma lomítky, následuje IP nebo název a pak název samotného sdílení. Dolar na konci znamená, že je sdílení skryté."},
{q:"Která z následujících možností přesně popisuje funkci Zálohování systému Windows v systému Windows Server?",o:["Zálohuje pouze soubory na externích zařízeních.","Automaticky aktualizuje veškerý systémový software.","Poskytuje synchronizaci souborů mezi servery v reálném čase.","Umožňuje obnovu dat po haváriích disku."],c:[3],a:"Umožňuje obnovu dat po haváriích disku.",e:"Windows Server Backup je primárně určen k vytvoření takzvané Bare Metal obnovy, tedy obnovení celého disku po katastrofickém selhání hardwaru."},
{q:"Správcem sítě vám byla přidělena následující statická IPv4 adresa 10.138.14.25/29. Jaký bude tvar subsíťové masky?",o:["255.255.255.252","255.255.255.240","255.255.255.248","255.255.255.192"],c:[2],a:"255.255.255.248",e:"Maska /29 znamená 29 jedniček. V posledním oktetu svítí 5 jedniček, jejichž hodnoty (128+64+32+16+8) dají dohromady 248."},
{q:"Která z následujících funkcí šifruje diskový svazek v prostředí OS Windows 10? Chrání obsah v případě ztráty nebo odcizení",o:["BitLocker","AppLocker","BranchCache","Credential Guard"],c:[0],a:"BitLocker",e:"Nástroj BitLocker šifruje kompletní data na disku, takže pokud vám někdo ukradne notebook a připojí disk jinam, bez klíče data nepřečte."},
{q:"Rozhodujete o nákup souborového serveru pro síť LAN. Označte položku, která má nejmenší důležitost pro správnou funkci.",o:["procesory","síťové rozhraní","diskový subsystém","operační paměť","monitor a grafický adaptér"],c:[4],a:"monitor a grafický adaptér",e:"Server je typicky takzvaný 'headless' stroj – po úvodním nastavení se na něj připojujete dálkově přes síť a fyzický monitor ani výkonnou grafiku na něm nikdo nevyužije."},
{q:"Jaký je minimální počet tiskových zařízení, abych mohl vytvořit v prostředí OS Windows fond tiskáren.",o:["1","2","3","Počet nehraje vůbec žádnou roli."],c:[1],a:"2",e:"Fond tiskáren slouží k rozdělování tiskových úloh (tzv. load balancing) mezi vícero strojů. Aby bylo co rozdělovat, musí tam být logicky alespoň dvě tiskárny."},
{q:"Označte doménu druhého řádu.",o:[".vs.clay.europa.com.",".hejkal.com.cz.",".co.uk.",".edu."],c:[2],a:".co.uk.",e:"V hierarchii DNS se počítá od konce. První úroveň je .uk, druhá úroveň (druhého řádu) je .co pod ní."},
{q:"Jaký  je nástroj příkazového řádku pro správu sítě dostupný v mnoha operačních systémech.<br>Slouží pro dotazování na doménové jméno, IP adresu mapování nebo pro jiné vlastnosti DNS záznamu.",o:["nslookup","ipconfig","netstat","ping"],c:[0],a:"nslookup",e:"Name Server Lookup (nslookup) se ptá výhradně DNS serverů na doménová jména a dokáže z nich vytáhnout specifické záznamy."},
{q:"Na svém PC mám problémy v síťové komunikaci. Pokud zadám příkaz  ping  v kombinaci s úplným názvem síťové tiskárny  HP1L.firma.local.<br>v místní síti LAN tak nemám žádnou odpověď. Ale při zadání řádkového příkazu  ping  s IPv4 adresou této síťové tiskárny   mám správnou odezvu.<br>Tento problém je pouze u této tiskárny a není u jiných koncových sítových zařízení. Označte příčinu.",o:["Na firewallu DNS serveru jsou zablokovány porty spojené s překladem názvů.","Na DNS serveru není nainstalována zóna pro překlad textových názvů na IP adresy.","Na DNS serveru není nainstalována zóna pro zpětný překlad.","V databázi DNS chybí záznamy typu A této tiskárny."],c:[3],a:"V databázi DNS chybí záznamy typu A této tiskárny.",e:"Ping po IP adrese funguje, takže síť žije. Nejde pouze převést konkrétní název, tudíž pro tento název chybí překladový A-záznam."},
{q:"<div class='context-box'><img src='Nastavení typu skupiny na distribuční. Musí se označit skupina zabezpečení..png' alt='Dialog vlastností skupiny DLMarketing'></div>Skupině  DLMarketing  se nedá nastavit oprávnění ke složce  grm4.  Co je příčinou?",o:["Místní doménová skupina se nedá použít pro definování oprávnění na serveru Windows.","V operačním systému je vnitřní chyba. Není možné označit globální skupinu.","Skupině  DLMarketing  nastavujeme oprávnění v rámci lesa domén. V této situaci se musí použít  univerzální skupina.","Nastavení typu skupiny na  distribuční.  Musí se označit skupina zabezpečení."],c:[3],a:"Nastavení typu skupiny na  distribuční.  Musí se označit skupina zabezpečení.",e:"Distribuční skupiny slouží primárně k rozesílání emailů na Exchange, nedají se použít pro přidělování složkových nebo NTFS práv. K tomu slouží typ Skupina zabezpečení."},
{q:"Jaké je doporučené jméno domény pro vnitřní privátní sítě?",o:[".com.",".org.",".local.",".net."],c:[2],a:".local.",e:"Přípona .local se historicky doporučovala právě proto, že nekoliduje s žádnými veřejnými doménami na reálném internetu."},
{q:"<div class='context-box'><img src='Účet počítače je zakázaný. Musí se povolit...png' alt='Konzole Uživatelé a počítače'></div>Uživatelé v organizační jednotce  Marketing  se nemohou přihlásit do domény z počítače  Asus06.  Co je příčinou?",o:["Stanice  Asus06  používá operační systém Windows 10 Home.","Uživatelé v organizační jednotce  Marketing  mají povolené ve vlastnostech svých účtů časové intervaly kdy se mohou přihlásit na jednotlivé stanice.<br>Stanice  Asus06  se teď nachází mimo tento interval.","Účet počítače je zakázaný. Musí se povolit.","Uživatelé v organizační jednotce  Marketing  mají pouze omezený počet stanic které mohou využívat. Stanice  Asus06  není v tomto seznamu.<br>To se projevilo zákazem tohoto počítače."],c:[2],a:"Účet počítače je zakázaný. Musí se povolit.",e:"Černá šipka dolů v nástroji Active Directory Users and Computers (ADUC) vizuálně znamená, že objekt (počítač nebo uživatel) je zakázaný (Disabled)."},
{q:"Chtěl bych si otestovat spojení na webový server  www.alfa.com . Navíc potřebuji zjistit uzly, přes které procházejí pakety.<br>Označte vhodný příkaz v prostředí OS Windows.",o:["route","arp","tracert","ping"],c:[2],a:"tracert",e:"Příkaz tracert (Trace Route) zjistí nejen dostupnost, ale ukáže vám všechny 'skoky' přes routery po cestě k cíli."},
{q:"Jaký typ záznamu se používá v DNS pro přiřazení IPv4 adresy hostiteli?",o:["A","AAAA","SOA","MX"],c:[0],a:"A",e:"Základní záznam pro překlad názvu na čtyřbytovou IPv4 adresu se značí písmenem A (Address)."},
{q:"Na vaší pracovní stanici s operačním systémem Windows se objevily chyby na disku. Odstranění je možné pomocí příkazu...",o:["chkdsk","defrag","fsck","fdisk","sfc"],c:[0],a:"chkdsk",e:"Nástroj chkdsk (Check Disk) zkontroluje logickou strukturu filesystému a umí pokusit se opravit vadné sektory."},
{q:"Služba DNS používá celou řadu záznamů. Napište označení záznamu s následujícími parametry:<br>*zahajující záznam zónového souboru,<br>*obsahuje jméno primárního serveru,<br>*je tam  adresa elektronické pošty správce,<br>*obsahuje časové parametry přenosu na sekundární server.",o:["A","SOA","MX","NS"],c:[1],a:"SOA",e:"Záznam SOA (Start Of Authority) nese základní provozní hlavičku celé zóny, včetně mailu na admina a pravidel pro replikace."},
{q:"Jaký typ záznamu se používá v DNS pro přiřazení IPv6 adresy hostiteli?",o:["AAAA","A","SOA","MX"],c:[0],a:"AAAA",e:"Protože má nová IPv6 adresa přesně 4x větší délku v bitech než klasická IPv4, pojmenoval se i záznam čtyřmi Áčky."},
{q:"Označte příkazy, které umožní vyexportování obsahu Active Directory do souboru.",o:["dsquery","csvde","ldifde","dsget"],c:[1,2],a:"csvde, ldifde",e:"Oba nástroje umožňují vypsat (exportovat) data uživatelů: csvde je hodí do tabulkové podoby (CSV) a ldifde do speciálního textového formátu."},
{q:"Označte  nepravdivý  výrok.",o:["Organizační jednotky jsou ve výchozím nastavení chráněny proti náhodnému vymazání.","Pokud je OS Windows 2012 povýšen na řadič domény, místní uživatelské účty a skupiny zůstanou zachovány.","Přidání nového počítače do domény mohou provést členové doménové skupiny  Administrators  a  Domain Admins.","Uživatelským účtům v prostředí Windows 2012/2016/2019 není možné přidělit konkrétní stanice které budou moci používat."],c:[3],a:"Uživatelským účtům v prostředí Windows 2012/2016/2019 není možné přidělit konkrétní stanice které budou moci používat.",e:"Naopak to možné je, ve vlastnostech účtu v Active Directory můžete v záložce Account nastavit 'Log On To' a vyjmenovat povolené stanice."},
{q:"Během spojování firem byly sloučeny původně samostatné organizace a jejich pobočky používající následující názvy –  cosi.eu, sever.cosi.eu, neco.com.<br>Pokud budou tyto domény propojeny, vznikne struktura označovaná v terminologii společnosti Microsoft jako  (doplňte) …",o:["strom","supersíť","trust","les"],c:[3],a:"les",e:"Strom zahrnuje jen domény sdílející stejný jmenný základ (cosi.eu). Protože je tu i neco.com (zcela jiný název), dohromady už to tvoří les (Forest)."},
{q:"Označte protokoly, které používají operační systémy řady Windows server pro správu objektů v rámci Active Directory a ověřování identity uživatelů.",o:["LDAP, IPSec","DAP, DNSSEC","DAP, Kerberos","LDAP, Kerberos"],c:[3],a:"LDAP, Kerberos",e:"Aktivní adresář čte svá data přes standardizovaný LDAP a bezpečně loguje a ověřuje identitu uživatelů pomocí ticketů z Kerberosu."},
{q:"Označte příkaz pomocí kterého přidáte v rámci Active Directory skupinu se zabezpečením.",o:["dsrm","dsmod","dsadd","dsget"],c:[2],a:"dsadd",e:"Příkaz pro vložení (Add) zcela nového objektu z příkazového řádku se logicky jmenuje dsadd."},
{q:"Označte  pravdivý  výrok.",o:["Pokud má uživatel v doméně vytvořený účet je členem skupiny  Domain Users.<br>Předem vytvořené členství v jakékoliv doménové skupině umožňuje zařazení (i odstranění) počítače z domény.","Zařazení počítače do domény provede člen skupiny  Domain Admins.","Zařazení počítače do domény provede člen lokální skupiny  Administrators  na zařazovaném počítači.","Pracovní stanice může být současně členem  domény  i  pracovní skupiny ."],c:[1],a:"Zařazení počítače do domény provede člen skupiny  Domain Admins.",e:"Užití účtu Domain Admin zaručuje bezproblémové připojení (překoná limit 10 stanic na uživatele) a má rovnou potřebná práva v Active Directory."},
{q:"Označte objekty, který  mohou  být součástí adresářové služby  Active Directory .",o:["sdílená složka","uživatel","kontakt","skupina","tiskárna/PC"],c:[0,1,2,3,4],a:"sdílená složka, skupina, uživatel,tiskárna,kontakt",e:"Active Directory ukládá naprosto vše ohledně prostředků firmy – účty, lidi, fyzické počítače i nasdílené zdroje pro snadné vyhledávání."},
{q:"Server s OS Windows 2019 povýším na řadič domény. Označte další roli, která se instaluje současně s rolí řadiče domény (AD).",o:["AD Federation Services","DHCP","DNS","IIS"],c:[2],a:"DNS",e:"Doména si na DNS vyloženě zakládá. Ukládá si do něj SRV záznamy o tom, kde klient najde přihlašovací servery. Bez něj nefunguje."},
{q:"Doménově lokální skupina může získávat oprávnění  (dokončete větu) ...",o:["pouze ve stromu domén kde byla vytvořena.","ve všech doménách kromě té kde byla vytvořena.","pouze ve vlastní doméně kde byla vytvořena.","v jakékoli doméně stromu nebo lesa Active Directory."],c:[2],a:"pouze ve vlastní doméně kde byla vytvořena.",e:"Její jméno to napovídá – Domain Local. Funguje jako konečný kontejner pro přidělení oprávnění čistě pro zdroje v její lokální doméně."},
{q:"Označte doporučený postup pro práce se skupinami v rámci  Active Directory.  (A=uživatel, G=globální skupina, DL=doménově lokální skupina, U=univerzální skupina, P=oprávnění.)",o:["A > DL >  U > P","A > DL > U < P","A > U > G < P","A > G > DL < P"],c:[3],a:"A > G > DL < P",e:"Zkratka IGDLA: User (A) jde do Globální (G) podle oddělení, a ta se vhodí do Doménově Lokální (DL), na které jsou zavěšena Oprávnění (P)."},
{q:"Označte skupinu, která musí být ověřena globálním katalogem.",o:["globální","doménově lokální","universální","lokální"],c:[2],a:"universální",e:"Protože univerzální skupiny fungují napříč všemi doménami v lese, jejich členství musí být cachováno přímo v Globálním katalogu, aby nedocházelo k chybám při ověřování v jiných doménách."},
{q:"Který z následujících příkazů mi umožní vyhledání počítače v rámci AD na řadiči domény?",o:["dsget","dsquery","dsmod","dsrm"],c:[1],a:"dsquery",e:"Vyhledávání = dotazování, anglicky 'query'. K vytažení seznamu existujících věcí z Active Directory se proto volá dsquery."},
{q:"Vyberte protokol, který využívá adresářová služba  Active Directory.",o:["OpenLDAP","DAP","LDAP","X.500"],c:[2],a:"LDAP",e:"Lightweight Directory Access Protocol (LDAP) tvoří páteřní jazyk pro komunikaci klientských počítačů s databází samotného adresáře AD."},
{q:"Který z následujících výroků o  globální skupině  je správný?",o:["Globální skupina může získat oprávnění ve všech doménách stromu nebo lesa  Active Directory .","Globální skupina může získávat členy ze všech doména stromu (lesa)  Active Directory  a rovněž může získávat oprávnění ve všech doménách stromu nebo lesa  Active Directory .","Globální skupina může získat oprávnění pouze v doméně, kde byla vytvořena.","Členem globální skupiny nemohou být účty počítačů."],c:[0],a:"Globální skupina může získat oprávnění ve všech doménách stromu nebo lesa  Active Directory .",e:"Na rozdíl od doménově lokální se dá Globální skupina takzvaně vzít a propůjčit (použít jako člena) kamkoliv v rámci celého lesa AD."},
{q:"Označte příkaz pomocí kterého můžete vytvořit v rámci  Active Directory  účet pro nového uživatele.",o:["dsmod","dsget","dsadd","dsrm"],c:[2],a:"dsadd",e:"Opět, pro vytvoření (přidání) nového profilu bez grafického klikání se použije slovíčko přidat: dsadd (Directory Services Add)."},
{q:"Označte doporučený postup pro práce se skupinami v rámci  Active Directory.  (A=uživatel, G=globální skupina, DL=doménově lokální skupina, U=univerzální skupina, P=oprávnění.)",o:["A > DL > G > U > P","A > G > U > DL < P","A > U > DL > G < P","A > G > DL > U < P"],c:[1],a:"A > G > U > DL < P",e:"Rozšíření základního modelu o vícedoménové prostředí. Globální skupiny se navíc agregují do Univerzálních, než se hodí pod práva DL."},
{q:"Máte síť LAN, kde byla vytvořena doména  vampire.eu . V rámci konfigurace domény byly nastaveny zásady a předvolby GPO.<br>Označte počítač s operačním systému, na který se budou zásady skupiny aplikovat.",o:["Dell 101 OS Windows 10 Home. Je členem pracovní skupiny  vampire.<br>Využívá síťové zdroje DNS, DHCP, sdílené programy a soubory v rámci domény.","FW1, OS Linux. Plní v doméně  vampire.eu  pro uživatele roli poštovního serveru.","Juno4, OS Windows 2019 Server. Funguje jako samostatný server .  Není členem domény  vampire.eu .<br>Slouží ale k zálohování pracovních dat v rámci domény  vampire.eu.","HP4C OS Windows 10 Prof. Je členem domény  vampire.eu."],c:[3],a:"HP4C OS Windows 10 Prof. Je členem domény  vampire.eu.",e:"Systém politik (GPO) Microsoftu lze logicky uplatnit a vynutit jen u strojů, které s ním plně spolupracují - musí být v edici Pro/Enterprise a hlavně řádně zapojené do domény."},
{q:"Označte pravdivý výrok.",o:["Pokud skupina počítačů sdílí společnou adresářovou databázi, jedná se doménu.","Člen místní skupiny  Users  může zařadit svůj počítač do domény.","Active Directory používá pro překlad názvů počítačů na IP adresy serverovou roli DHCP.","Pouze členové doménové skupiny   Administrators  mohou spravovat uživatelské účty v rámci domény."],c:[0],a:"Pokud skupina počítačů sdílí společnou adresářovou databázi, jedná se doménu.",e:"Doména v ekosystému Windows je definována tím, že počítače sdílejí jednu centrální přihlašovací databázi pro zjednodušení správy hesel."},
{q:"Kde může získat může získat oprávnění  globální skupina  ?",o:["Pouze ve stromu domén kde byla vytvořena.","Pouze ve vlastní doméně kde byla vytvořena.","V jakékoli doméně stromu nebo lesa Active Directory.","Ve všech doménách kromě té kde byla vytvořena."],c:[2],a:"V jakékoli doméně stromu nebo lesa Active Directory.",e:"Slovo globální tu znamená, že ačkoliv sbírá uživatele jen u sebe, uplatnit svá práva smí naprosto ve všech koutech a stromech AD lesa."},
{q:"Odstranění uživatelského účtu v rámci domény je možné příkazem ...  (doplňte)",o:["dsmod","dsrm","dsdel","dsget","dsquery"],c:[1],a:"dsrm",e:"Příkaz dsrm (Directory Services ReMove) natrvalo smaže zadaný záznam adresářové struktury z databáze."},
{q:"Jaký je účel služby Active Directory v systému Windows Server 2019/22?",o:["Správa uživatelských účtů a skupin.","Vytváření virtuálních počítačů.","Ukládání a správa dat.","Správa přístupu na internet."],c:[0],a:"Správa uživatelských účtů a skupin.",e:"Role ADDS neslouží jako uložiště pro excelovské tabulky, ani nedělá router, slouží výhradně pro obsluhu uživatelů, jejich hesel, politik a firemních struktur PC."},
{q:`Byli jste pověřeni správou serveru s operačním systémem Windows 2019. Konfigurace HDD je znázorněna na následujícím schématu.<br>Firmware serveru nepodporuje vytváření dynamických svazků. Následující zadání musí být splněno v rámci konfiguračních možností OS Windows 2019.<br><br>
<table class="disk-table">
  <tr><td class="disk-name">Disk 0<br>Dynamic 1 TB<br>Online</td><td class="disk-part">C: Spouštěcí, systémový...<br>400 GB, NTFS</td><td class="disk-free">Nepřiděleno<br>600 GB</td></tr>
  <tr><td class="disk-name">Disk 1<br>Dynamic 1 TB<br>Online</td><td class="disk-free">Nepřiděleno<br>800 GB</td><td class="disk-part">X: 200 GB</td></tr>
  <tr><td class="disk-name">Disk 2<br>Dynamic 1 TB<br>Online</td><td class="disk-free">Nepřiděleno<br>1 TB</td><td></td></tr>
  <tr><td class="disk-name">Disk 3<br>Basic 800 GB<br>Online</td><td class="disk-free">Nepřiděleno<br>800 GB</td><td></td></tr>
</table>
<br>Bylo rozhodnuto, že tento server bude v síti plnit roli řadiče domény, DNS, DHCP a bude zde instalován poštovní server MS Exchange.<br>Programové a datové soubory řadiče domény, DNS, DHCP serveru jsou umístěny v adresáři Windows.<br>MS Exchange server bude využívat prozatím nepřidělený volný prostor na discích. Předpokládá se, že poštovní server spotřebuje cca 1700 GB diskového prostoru.<br>Vaše řešení musí zabezpečit co nejvyšší odolnost vůči technickému selhání pevných disků. Z následujících variant vyberte nejlepší řešení.`,o:["Disky1,2,3 převedu z dynamického na basic (běžný). Oddíl X: přesunu na Disk 0. Disk 1 a Disk 2 budou tvořit svazek RAID-1.<br>Oddíly C: a X: na Disku 0 budou součástí dalšího RAIDu-1 mezi Diskem 0 a Diskem 3. Zbylé nepřidělené úseky budou součástí rozloženého svazku.","Disk3 převedu na dynamický. Vytvořím RAID-1 mezi oddílem C: na disku C: použiji 400 GB z Disku 2. Vytvořím RAID-5.<br>Využiji 600 GB z nepřiděleného místo na Disku 0, Disku 1, Disku 2 a Disku 3. Zde bude instalován program MS Exchange.<br>Oddíl X: na Disku 1 a zbylých 200 GB na Disku 3 budou nakonfigurovány jako RAID 1. Zbylých 200 GB na Disku 1 zůstane jako jednoduchý svazek.","Disk 3 převedu na dynamický. Oddíl X: přesunu na Disk0. Disk 1 a Disk 2 budou tvořit svazek RAID1.<br>Oddíly C: a X: na Disku 0 budou součástí dalšího RAIDu 1 mezi Diskem 0 a Diskem 3. Zbylé nepřidělené úseky budou součástí prokládaného svazku.","Disk 3 převedu na dynamický. Vytvořím RAID-1 mezi oddílem C: na disku C: použiji 400 GB z Disku 2. Vytvořím RAID-5.<br>Využiji 600 GB z nepřiděleného místo na Disku 0, Disku 1, Disku 2. Zde bude instalován program MS Exchange.<br>Na Disku 1 mi zůstalo ještě 200 GB nepřiděleného prostoru a má k dispozici plnou kapacitu Disku 3. Pomocí Správy disků zvětším velikost oddílu X: na 400 GB.<br>Vytvořím RAID-1 mezi oddílem X: a nepřiděleným prostorem na Disku 3. Zbylých 200 GB na Disku 3 zůstane jako jednoduchý svazek."],c:[3],a:"Disk 3 převedu na dynamický. Vytvořím RAID-1 mezi oddílem C: na disku C: použiji 400 GB z Disku 2. Vytvořím RAID-5.<br>Využiji 600 GB z nepřiděleného místo na Disku 0, Disku 1, Disku 2. Zde bude instalován program MS Exchange.<br>Na Disku 1 mi zůstalo ještě 200 GB nepřiděleného prostoru a má k dispozici plnou kapacitu Disku 3. Pomocí Správy disků zvětším velikost oddílu X: na 400 GB.<br>Vytvořím RAID-1 mezi oddílem X: a nepřiděleným prostorem na Disku 3. Zbylých 200 GB na Disku 3 zůstane jako jednoduchý svazek.",e:"Toto řešení splňuje vše: Převede disk na dynamický formát, spolehlivě zazrcadlí systém, uspokojí přesně požadovanou kapacitu na poštu v rámci pole RAID-5 (3x600 - 600 parita = 1200, zde znění nedodává přesně 1700 ale je to nejlogičtější varianta z nabídky) a navíc zrcadlí starý disk X."},
{q:`Jste správcem počítače se systémem Windows 2019, který obsahuje tři HDD. Aktuálně jsou na discích čtyři svazky.<br>Na Disku 0 a Disku 1 je nepřidělený prostor který chcete použít na vytvoření dalšího svazku. Jaký typ svazku můžete vytvořit?<br>Řešení bude provedeno v rámci konfigurace OS.<br>Použité typy svazků:<br>a. C: jednoduchý svazek<br>b. D: RAID-5 (prokládaný svazek s paritou)<br>c. G: rozložený svazek<br>d. F: RAID-1 (zrcadlený)<br><br>
<table class="disk-table">
  <tr><td class="disk-name">Disk 0<br>Dynamic 1 TB</td><td class="disk-part">C: 200 GB</td><td class="disk-part">D: 300 GB</td><td class="disk-part">G: 250 GB</td><td class="disk-free">Nepřiděleno 250 GB</td></tr>
  <tr><td class="disk-name">Disk 1<br>Dynamic 1 TB</td><td class="disk-part">D: 300 GB</td><td class="disk-part">G: 250 GB</td><td class="disk-part">F: 250 GB</td><td class="disk-free">Nepřiděleno 250 GB</td></tr>
  <tr><td class="disk-name">Disk 2<br>Dynamic 750 GB</td><td class="disk-part">D: 300 GB</td><td class="disk-part">F: 250 GB</td><td></td><td></td></tr>
</table>`,o:["Svazek typu RAID-1. Jeho kapacita bude 500 GB.","Svazek typu RAID-5. Jeho kapacita bude 250 GB.","Svazek typu RAID-0. Jeho kapacita bude 500 GB.","Svazek typu RAID-1. Jeho kapacita bude 250 GB.","Rozložený svazek. Jeho kapacita bude 500 GB."],c:[0,2,4],a:"Svazek typu RAID-1. Jeho kapacita bude 250 GB.,Svazek typu RAID-0. Jeho kapacita bude 500 GB.,Rozložený svazek.\nJeho kapacita bude 500 GB.",e:"Při 250 volných GB na každém ze dvou disků získáme 500 GB buď prostým spojením (rozložený), nebo prokládaným (RAID-0). Ale při zrcadlení získáme pro data sice bezpečnost, ale kapacitu pouze 250 GB."},
{q:"Označte typ RAID co střídavě a rovnoměrně umisťuje data do oblastí na jednotlivých discích. Navíc jsou data zrcadlena pomocí RAID-1.",o:["RAID-4","RAID-5","RAID 1 + 0","RAID 0 + 1"],c:[3],a:"RAID 0 + 1",e:"Tento typ (zvaný Mirror of Stripes) nejprve tvoří rychlé prokládané pole nula, a tato celá prokládaná struktura se pak bezpečně překlopí do zrcadla."},
{q:"Který typ diskových jednotek nabízí lepší výkon a obvykle se nachází na serverech?",o:["MFM","RLL","SCSI","IDE"],c:[2],a:"SCSI",e:"Rozhraní SCSI (Small Computer System Interface) zvládalo už historicky vysoce paralelní běh, fronty a obrovskou propustnost ideální pro náročné servery."},
{q:"Který z typů RAID používá tři nebo více disků k zajištění odolnosti proti chybám?",o:["RAID-1","RAID-5","RAID-3","RAID-0"],c:[1],a:"RAID-5",e:"RAID-5 počítá matematickou paritu ze zapsaných dat. Aby to mělo smysl a parita nebyla na stejném disku, vyžaduje k funkčnosti minimum tří fyzických disků."},
{q:"Investoval jsem peníze do domácího úložiště, kde chci umístit hudební nahrávky, filmy, fotografie, el. knihy.<br>Provádím konfiguraci a chci zvolit řešení, které zabezpečí odolnost vůči chybám disků. Označte typy svazků, které splňují tuto podmínku.",o:["jednoduchý svazek","RAID-0","rozložený svazek","RAID-5","RAID-1"],c:[3,4],a:"RAID-1, RAID-5",e:"Ochranu před fyzickým zničením harddisku nabízejí jen pole s redundancí: RAID-1 to drží na dalším disku jako kopii (zrcadlo) a RAID-5 díky rozeseté paritě."},
{q:"Které z následujících tvrzení platí pro diskové svazky v prostředí OS Windows?",o:["Zrcadlený svazek duplikuje data z jednoho disku na druhý disk pro redundanci a odolnost proti chybám.","Rozložený svazek využívá volné místo dostupné na jednom disku.","Jednoduchý svazek se rozprostírá na více discích, maximálně 32.","Všechny uvedené výroky."],c:[0],a:"Zrcadlený svazek duplikuje data z jednoho disku na druhý disk pro redundanci a odolnost proti chybám.",e:"Zrcadlení obnáší to, že to co se napíše na svazek fyzicky, operační řadič automaticky na bit stejně zkopíruje i na svazek disku druhého pro případ havárie."},

{q:"Kolik disků může maximálně obsahovat rozložený svazek při použití konfiguračních možností OS Windows?",o:["64","2","8","16","32"],c:[4],a:"32",e:"Z historického hardwarového návrhu a správy disků Windows nativně umí pospojovat kousky volných míst z maximálně 32 různých disků za sebe."},
{q:`Jste správcem počítače se systémem Windows 2012R2, který obsahuje tři HDD. Aktuálně jsou na discích čtyři svazky.<br>Na server budete ukládat asi 500 GB dat a chcete mít záruku, že data nebudou ztracena, pokud některý z disků selže.<br>Který se svazků byste měli použít. Řešení bude provedeno v rámci konfigurace OS.<br>Použité typy svazků:<br>a. C: jednoduchý svazek<br>b. D: RAID-5 (prokládaný svazek s paritou)<br>c. G: rozložený svazek<br>d. F: RAID-1 (zrcadlený)<br><br>

</table>`,o:["Svazek F:","Svazek G:","Svazek C:","Svazek D:"],c:[3],a:"Svazek D:",e:"Svazek D využívá odolný RAID-5 rozložený na 3 discích po 300 GB. S paritou to dá kapacitu 600 GB, což hravě a bezpečně pokryje žádaných 500 GB dat."},
{q:"Jak velký úložný prostor budeme mít, pokud použijeme 8 HDD každý o kapacitě 2 TB v konfiguraci prokládaného svazku (RAID-0)?",o:["12 TB","8 TB","16 TB","14 TB"],c:[2],a:"16 TB",e:"Prokládaný RAID 0 nenabízí pražádnou odolnost, takže se čistě využije plná kapacita všeho, co je k mání. 8 disků krát 2 TB je přesně 16 TB."},
{q:"Který z následujících svazků může sloužit jako bootovací? (Pokud je vytvořen softwarově v OS Windows.)",o:["rozložený svazek","prokládaný svazek","zrcadlený svazek","prokládaný svazek s paritou"],c:[2],a:"zrcadlený svazek",e:"K zavedení systému musí bootloader přečíst data plynule. Zcela mu vyhovuje jedno pevné zrcadlo. Složité dělené paritní pruhy u softwarového RAID bootloader neumí poskládat."},
{q:"Jak velký úložný prostor budeme mít, pokud použijeme čtyři HDD každý o kapacitě 2 TB v konfiguraci RAID-5?",o:["4 TB","6 TB","8 TB","2 TB"],c:[1],a:"6 TB",e:"Základní pravidlo RAID 5 je kapacita počtu všech disků mínus jeden disk padající na paritu ochrany. Takže 3 x 2 TB jsou rovných 6 TB."},
{q:`Byli jste pověřeni správou serveru s operačním systémem Windows 2019. Konfigurace disků je znázorněna na následujícím schématu.<br>Firmware serveru nepodporuje vytváření dynamických svazků. Následující zadání musí být splněno v rámci konfiguračních možností OS Windows 2019.<br><br>
<table class="disk-table">
  <tr><td class="disk-name">Disk 0<br>Basic, 1 TB</td><td class="disk-part">C: Spouštěcí, systémový...<br>400 GB</td><td class="disk-free">Nepřiděleno<br>600 GB</td></tr>
  <tr><td class="disk-name">Disk 1<br>Basic, 1 TB</td><td class="disk-free">Nepřiděleno<br>800 GB</td><td class="disk-part">S: 200 GB</td></tr>
  <tr><td class="disk-name">Disk 2<br>Basic, 1 TB</td><td class="disk-free">Nepřiděleno<br>800 GB</td><td class="disk-part">S: 200 GB</td></tr>
  <tr><td class="disk-name">Disk 3<br>Basic, 1 TB</td><td class="disk-free">Nepřiděleno<br>1 TB</td><td></td></tr>
</table>
<br>Bylo rozhodnuto, že tento server bude v síti plnit roli řadiče domény, DNS, DHCP a bude zde instalován databázový MS SQL serveru.<br>Programové a datové soubory řadiče domény, DNS, DHCP serveru jsou umístěny v adresáři Windows.<br>MS SQL server bude využívat nepřidělený volný prostor na discích. Předpokládá se, že spotřebuje cca 1500 GB diskového prostoru.<br>Vaše řešení musí zabezpečit co nejvyšší odolnost vůči technickému selhání pevných disků a co nejlepší využití diskového prostoru.<br>Z následujících možností vyberte nejlepší řešení.`,o:["Disky nebudu převádět na dynamické, ponechám je v původní konfiguraci Basic.<br>Vytvořím svazek RAID-1 skládající se z disku C: na Disku0 a použiji 400 GB nepřiděleného prostoru na Disku 3. Dále vytvořím svazek RAID-5.<br>Tento svazek využije nepřidělený prostor na Disku 0 (600 GB), na disku Disku 1 (600 GB, 200 GB zůstává nepřidělených), na Disku 2 (600 GB, 200 GB zůstává nepřidělených) a na Disku 3 (zbylých 600 GB nepřiděleného místa).","Všechny disky převedu na dynamické. Vytvořím svazek RAID-1 skládající se z disku C: na Disku 0 a použiji 400 GB nepřiděleného prostoru na Disku 3. Dále vytvořím svazek RAID-5.<br>Tento svazek využije nepřidělený prostor na Disku0 (600 GB), na disku Disku 1 (600 GB, 200 GB zůstává nepřidělených), na Disku 2 (600 GB, 200 GB zůstává nepřidělených) a na Disku 3 (600 GB nepřiděleného místa).","Všechny disky převedu na dynamické. Vytvořím svazek RAID-1 skládající se z disku C: na Disku0 a použiji 400 GB nepřiděleného prostoru na Disku3.<br>Dále vytvořím svazek RAID-5. Tento svazek využije veškerý nepřidělený prostor na Disku0, Disku1, Disku2, Disku3.<br>Nezůstane vůbec žádný volný nepřidělený prostor.","Všechny disky převedu na dynamické. Vytvořím svazek RAID-1 skládající se z disku C: na Disku 0 a z 400 GB na Disku 3. Další svazek RAID-1 bude sestávat z nepřidělených míst na Disku 1 a Disku 2."],c:[1],a:"Všechny disky převedu na dynamické. Vytvořím svazek RAID-1 skládající se z disku C: na Disku 0 a použiji 400 GB nepřiděleného prostoru na Disku 3. Dále vytvořím svazek RAID-5.<br>Tento svazek využije nepřidělený prostor na Disku0 (600 GB), na disku Disku 1 (600 GB, 200 GB zůstává nepřidělených), na Disku 2 (600 GB, 200 GB zůstává nepřidělených) a na Disku 3 (600 GB nepřiděleného místa).",e:"Při absenci hardwarového řadiče musíte nejdříve u Windows disk převést z módu Basic na Dynamic. V rámci toho pak můžete zrcadlit céčko (vzal 400 z volných 1000 na disku 3) a na databáze poskládat odolný RAID 5 pole ze čtyř x 600GB kusů volného zbytku."},
{q:`Vaše PC s operačním systémem Windows 2019 máte k dispozici tři HDD v následujícím rozdělení.<br><br>
<table class="disk-table">
  <tr><td class="disk-name">Disk 0<br>Základní 500 GB</td><td class="disk-part">C: 100 GB</td><td class="disk-free">Nepřiděleno 400 GB</td></tr>
  <tr><td class="disk-name">Disk 1<br>Základní 500 GB</td><td class="disk-free">Nepřiděleno 340 GB</td><td class="disk-part">S: 160 GB</td></tr>
  <tr><td class="disk-name">Disk 2<br>Dynamický 500 GB</td><td class="disk-part">Q: 120 GB</td><td class="disk-part">X: 140 GB</td><td class="disk-free">Nepřiděleno 240 GB</td></tr>
</table>
<br>Na tomto počítači bude provozována rozsáhlá SQL databáze, která bude potřebovat minimálně 600 GB.<br>Jak rozdělíte diskový prostor, aby splňoval tento požadavek. Řešení bude provedeno v rámci konfigurace OS.`,o:["Disk 0 a Disk 1 převedu na dynamický. Z nepřidělených úseků na Disku0, Disku1, Disku2 vytvořím svazek RAID-0.<br>Velikost úseků tvořících svazek mi bude limitovat hodnota 240 GB volného prostoru na Disku 2. Na Discích 1, 2 musím využít rovněž po 240 GB.","Převod Disku 0 a Disku 1 na dynamický je zbytečný. Rozložený svazek tento převod nepotřebuje.<br>Z nepřidělených úseků na Disku1 a Disku2 vytvořím rozložený svazek. Pro vytvoření svazku využiji veškerou volnou kapacitu.","Disk 0 a Disk 1 převedu na dynamický Z nepřidělených úseků na Disku1 a Disku2 vytvořím rozložený svazek.<br>Pro vytvoření svazku využiji veškerou volnou kapacitu.","Disk 0 a Disk 1 převedu na dynamický. Obsah disku Q: překopíruji do nově vytvořeného svazku v původně nepřiděleném prostoru na Disku 0. Oddíl Q: na Disku 3 odstraním, nepřidělený prostor teď bude mít velikost 360 GB.<br>Z nepřidělených úseků na Disku 1 a Disku 2 vytvořím RAID-1. Využiji volné kapacity disků 2×340 GB. Zbylých 20 GB na Disku 2 připojím k disku X:.","Disk 0 a Disk 1 převedu na dynamický. Z nepřidělených úseků vytvořím prokládaný svazek s paritou – RAID-5.<br>Pro vytvoření svazku využiji veškerou volnou kapacitu."],c:[2],a:"Disk 0 a Disk 1 převedu na dynamický Z nepřidělených úseků na Disku1 a Disku2 vytvořím rozložený svazek. Pro vytvoření svazku využiji veškerou volnou kapacitu.",e:"Chceme získat 600GB z roztroušených volných míst. Proto musíme nejdřív i staré placky hodit na Dynamický mód, z nichž Windows vezme libovolně velké úseky (zde disk1 340GB a disk2 240GB) a hloupě je poskládá do jedné dlouhé 'rozložené' hadice (Spanned volume), což dá 580. S použitím i 400 z disku 0 už získáme přes limit požadovaných 600."},
{q:"Je následující výrok pravdivý?<br>Pokud dochází ke krátkodobým výkyvům čítače %času procesoru na hodnotu 100 %, nepředstavuje to problém.",o:["Pravda","Nepravda"],c:[0],a:"Pravda",e:"Počítač občas potřebuje něco náročnějšího otevřít nebo načíst a procesor na malou chvilku vyskočí na sto procent – to je naprosto v normě a netřeba děsit poplachy."},
{q:"Označte položku kterou server nepotřebuje.",o:["grafická karta","síťové rozhraní","stránkovací soubor","operační paměť","diskový subsystém"],c:[0],a:"grafická karta",e:"Servery žijí v chladných sálech racků a nikdo u nich reálně v běžném provozu fyzicky nesedí. O grafické rozhraní je postaráno z dálky síťovou správou."},
{q:"Máte k dispozici PC s OS Windows 10. Při sledování systému jste zjistili následující parametry: V PC je nainstalován jeden vícejádrový procesor s frekvencí 3 Ghz, 4 GB RAM, jeden 750 GB SATA disk.<br>PC používá síťovou kartu 3COM 100 Mb/s, která je připojena k přepínači 1 000 Mb/s.<br>Už delší dobu sledujete dlouhé odezvy aplikací a celkové zpomalení práce systému. Naměřené parametry:<br><br><table class=\"q-table\"><tr><th>Čítač</th><th>minimum</th><th>maximum</th><th>průměr</th></tr><tr><td>Paměť – Chyby stránek/s</td><td>412</td><td>8680</td><td>4200</td></tr><tr><td>Paměť – Počet kB k dispozici</td><td>31</td><td>236</td><td>172</td></tr><tr><td>Paměť – kB stránkového fondu</td><td>438</td><td>1100</td><td>986</td></tr><tr><td>CPU – % času CPU</td><td>19</td><td>100</td><td>38</td></tr><tr><td>Fyzický disk – aktuální délka diskové fronty</td><td>0</td><td>3,7</td><td>1,4</td></tr><tr><td>Fyzický disk – % času disku</td><td>0</td><td>21</td><td>11</td></tr><tr><td>Síťové rozhraní – Mb/sec</td><td>0,00</td><td>21,8</td><td>17,4</td></tr></table><br>Která ze sledovaných komponent má nejvyšší podíl na nevyhovujícím stavu a měla by se vyměnit?<br>Z finančních důvodů můžete provést změnu pouze jedné komponenty.",o:["Výměna CPU za výkonnější.","Výměna HDD za rychlejší.","Výměna síťové karty s přenosovou kapacitou 100 Mb/s za 1000 Mb/s.","Přidání dalšího modulu operační paměti. Celková hodnota operační paměti potom bude 8 GB.","Zvětšení hodnoty virtuální paměti."],c:[3],a:"Přidání dalšího modulu operační paměti. Celková hodnota operační paměti potom bude 8 GB.",e:"Čísla nelžou: Paměť k dispozici průměrně ukazuje zoufalých 172 kB (to je pro moderní běh de facto nic) a generuje se obří počet chyb stránek, kdy procesor hledá data v RAM a nenajde. Je nutné posílit paměť."},
{q:"Pomocí interního programu Windows jste prováděli testování výkonu počítače. Získali jste následující výsledky.<br>Označte odpověď, která správně popisuje slabé místo PC. Počítač má 16GB operační paměti, 1GB aktuálně připojenou síťovou kartu.",o:["Ze sledovaných údajů vyplývá, že nejvíce je zatížen HDD. Nasvědčuje tomu ukazatel % času disku a % času čtení disku.","Problematickým místem je síťové rozhraní. Hodnota odeslaných a přijatých bajtů je příliš vysoká.","Počítač má nedostatečně velkou operační paměť. Svědčí o tom ukazatel  Potvrzené bajty  a  Počet MB k dispozici.","Problematický je výkon procesoru. Parametry ukazují, že se počítač blíží k hranici své výkonnosti."],c:[0],a:"Ze sledovaných údajů vyplývá, že nejvíce je zatížen HDD.\nNasvědčuje tomu ukazatel % času disku a % času čtení disku.",e:"Když už OS hlásí v grafu vytíženou RAM jen minimálně, ale procentuální zátěž diskového čtení neslezla z vysokých setin, limituje celý výkon plotnový pomalý přístup k datům."},
{q:"Jeden z parametrů který se sleduje je velikost dostupné fyzické paměti?<br>Pod jakou hodnotu by neměla její úroveň klesnout?",o:["5 %","15 %","20 %","10 %","30 %"],c:[0],a:"5 %",e:"Bezpečnostní hladina funkčnosti stroje Microsoft stanovil na 5% zbývající kapacity - odtud systém začíná enormně drhnout přesunem souborů do stránkovacího pole na disku."},
{q:"Čítač Paměť/Potvrzené bajty zastupuje množství potvrzené virtuální paměti. Pokud má server vysoký poměr potvrzených bajtů a celkové fyzické paměti, měla by se do systému přidat další operační paměť.Podíl potvrzených bajtů a celkového objemu paměti by neměl přesahovat  (doplňte).",o:["70 %","85 %","95 %","80 %","90 %","75 %"],c:[5],a:"75 %",e:"Optimálně by takzvané 'committed bytes' měly vždy držet čtvrtinovou zdravou rezervní úroveň pro stabilitu celkové operační paměti."},
{q:"Pokud ukazuje čítač % času disku vysoké hodnoty, zatímco jsou hodnoty čítačů procesoru a síťového rozhraní nízké, může výkon snižovat pevný disk.",o:["Pravda","Nepravda"],c:[0],a:"Pravda",e:"Klasický případ takzvaného 'úzkého hrdla'. Procesor nemá co dělat, síť propouští skvěle, jenom mechanický pomalý pevný disk to celé zpomaluje dole pod palubou."},
{q:"Máte k dispozici server s OS Windows 2019. Při sledování systému jste zjistili následující parametry: Je nainstalován jeden procesor s frekvencí 2,8 Ghz, 4 GB RAM, jeden 750 GB SCSI disk.<br>PC používá síťovou kartu 3COM 100 Mb/s, která je připojena k přepínači 1000 Mb/s.<br>Už delší dobu sledujete dlouhé odezvy aplikací a celkové zpomalení práce systému. Naměřené parametry:<br><br><table class=\"q-table\"><tr><th>Čítač</th><th>minimum</th><th>maximum</th><th>průměr</th></tr><tr><td>Paměť – Chyby stránek/s</td><td>1,00</td><td>9,2</td><td>8,7</td></tr><tr><td>Paměť – Počet kB k dispozici</td><td>990</td><td>2534</td><td>2005</td></tr><tr><td>CPU – % času CPU</td><td>19</td><td>100</td><td>89</td></tr><tr><td>Fyzický disk – aktuální délka diskové fronty</td><td>0,3</td><td>3,7</td><td>1,4</td></tr><tr><td>Síťové rozhraní – Mb/sec</td><td>0,00</td><td>19,8</td><td>16,4</td></tr><tr><td>Délka fronty procesoru</td><td>2,1</td><td>8,6</td><td>5,1</td></tr></table><br>Která ze sledovaných komponent má nejvyšší podíl na nevyhovujícím stavu a měla by se vyměnit.?<br>Z finančních důvodů můžete provést změnu pouze jedné komponenty.",o:["Výměna síťové karty s přenosovou kapacitou 100 Mb/s za 1000 Mb/s.","Přidání dalšího modulu operační paměti. Celková hodnota operační paměti potom bude 8 GB.","Výměna HDD za výkonnější.","Výměna CPU za výkonnější."],c:[3],a:"Výměna CPU za výkonnější.",e:"Tady je průměrný čas obíhání zátěže na procesoru šílených 89% a před ním mu stojí dlouhatánská fronta na propočty. Tento CPU je vyřízený a slabý a potřebuje zrychlit."},
{q:"Čítač Systém/Délka fronty procesoru zobrazuje počet vláken, která čekají na zpracování.<br>Vlákna se řadí do fronty v oblasti sdílené všemi procesory v systému.<br>Pokud má tento čítač trvale hodnotu vyšší než  (vyberte správnou možnost)  vláken na procesor, měli byste procesory vyměnit za výkonnější nebo systém osadit dalšími CPU.",o:["2","20","15","5","10"],c:[4],a:"10",e:"Jakmile se u výkonných řešení srotí řada instrukcí na číslo 10 a výše pro jedno jádro, pro klienta už to znamená silné viditelné drhnutí celé logiky na monitoru."},
{q:"Který z následujících požadavků není možné splnit v doméně Windows prostřednictvím Zásad skupiny (GPO)?",o:["Zákaz instalace ovladačů tiskáren uživatelům domény.","Nastavení délky hesla pro uživatele domény.","Přesměrování složky Dokumenty z lokálních disků uživatelů do sdílené složky na souborovém serveru.","Konfigurace libovolného prohlížeče na počítačích v rámci domény Windows."],c:[3],a:"Konfigurace libovolného prohlížeče na počítačích v rámci domény Windows.",e:"Group policy umí přikázat chování jen programům s plnou integrací šablon k Microsoftu (Edge apod). Starý neznámý cizí prohlížeč si v GPO prostě přes registry z ničeho nic neohnete."},
{q:"Zásady skupiny se nedají samostatně zálohovat. Musí se provést záloha celého počítače.<br>Je to pravda?",o:["Pravda","Nepravda"],c:[1],a:"Nepravda",e:"Nástroj Group Policy Management (GPMC) na správu doménových politik má speciální kontextové tlačítko pro rychlou přímou zálohu jen a pouze objektů politik, celý PC se kvůli tomu nezálohuje."},
{q:"Kterou z níže uvedených možností auditování zvolíte pro sledování přístupu ke spustitelnému souboru?",o:["Auditovat události přihlášení.","Auditovat používání privilegií.","Auditovat přístup k objektům.","Auditovat události přihlášení k účtu."],c:[2],a:"Auditovat přístup k objektům.",e:"Jakákoliv interakce se souborem na Filesystému (otevření složky, smazání texťáku, přečtení excelu) podléhá vnitřně takzvanému 'Pravidlu přístupu k samotným objektům'."},
{q:"Je následující výrok pravdivý?<br>Pokud dojde k odstranění předvoleb GPO  je obnovena původní konfigurace.",o:["Pravda","Nepravda"],c:[1],a:"Nepravda",e:"To je rozdíl mezi Policy a Preference. Preference jen navrhla uživateli po spuštění změnu plochy. Když zrušíte GPO preferenci, systém dál běží se starou plochou a nevyresetuje ji do původního stavu, dokud to nepříkáže nová zásada."},
{q:"Filtry rozhraní WMI umožňují aplikovat zásady skupiny na počítače dle jejich hardwarových parametrů. Je to správně?",o:["Pravda","Nepravda"],c:[0],a:"Pravda",e:"Windows Management Instrumentation umí proklepnout cílový počítač pod povrchem, zjistit zda má v sobě např. SSD disk pro tu či onu instalaci a až pak dovolit instalaci GPO na stanici."},
{q:"Která z níže uvedených skupin uživatelů  může  nastavovat zásady skupiny v rámci domény.",o:["Backup Operators","Enterprise Admins","Power Users","Server Operators","Account Operators"],c:[1],a:"Enterprise Admins",e:"Editace politiky zasahující a obměňující všechny stávající restrikce pro koncové stanice stovek uživatelů si vyžaduje profil na vrcholové úrovni lesa, případně rovnou plné Administrátory domény."},
{q:"U Windows 2008 se poprvé objevily  zásady skupiny  a  předvolby zásad skupiny.<br>Označte správný výrok popisující možnosti nastavení zásad a předvoleb.",o:["Nastavení zásad skupiny jsou vynucená.","Zásad skupiny nastavené v rámci domény je možné vždy uživatelem zmodifikovat.","Zásady skupiny a předvolby obsahují stejná nastavení.","Předvolby i zásady se automaticky aktualizují."],c:[0],a:"Nastavení zásad skupiny jsou vynucená.",e:"Nativní Zásada (Group policy) uživateli napevno přepíše klíč v registrech OS sítě a pole zešedne. Uživatel ho sám prostě modifikovat z panelu nesmí."},
{q:"Pomocí jakého příkazu mohu spustit  program na modifikaci místních zásad skupiny v prostředí OS Windows?",o:["gpedit.exe","gpedit.msc","cmd","gpedit.msi","mmc","msconfig"],c:[1],a:"gpedit.msc",e:"Příkaz pro spuštění lokálního editoru na izolovaném počítači se jmenuje gpedit a jelikož sídlí v klasické Microsoft konzoli tak i příslušně pod koncovkou .msc."},
{q:"Očíslujte, v jakém pořadí se uplatňují doménové a místní zásady GPO.",o:["GPO pro podřízenou organizační jednotku -> 5, místní objekty GPO definované lokálně na PC -> 1, objekty GPO pro lokalitu -> 2, GPO pro organizační jednotku -> 4, objekty GPO pro doménu -> 3"],c:[0],a:"GPO pro podřízenou organizační jednotku -> 5, místní objekty GPO definované lokálně na PC -> 1, objekty GPO pro lokalitu -> 2, GPO pro organizační jednotku -> 4, objekty GPO pro doménu -> 3",e:"Načítačka jede systémem L-S-D-O-U. Lokální pravidla stroje jedou první a pak se přemazávají čím dál podrobnější doménovou politikou sestupující směrem dolu po větvi až k poslední nejnižší OU jednotce, která nakonec přebije dříve řečené."},
{q:"U Windows 2008 se poprvé objevily  zásady skupiny  a  předvolby zásad skupiny.<br>Označte správný výrok popisující možnosti nastavení zásad a předvoleb.",o:["Zásady skupiny a předvolby obsahují stejná nastavení.","Ovlivnění zásad skupiny je možné vždy uživatelem zmodifikovat.","Nastavení zásad skupiny jsou vynucená.","U zásad skupiny nedochází k automatické aktualizaci."],c:[2],a:"Nastavení zásad skupiny jsou vynucená.",e:"Jako bylo řečeno dříve, předvolby vám to navrhnou s možností editace, pevná Zásada (Policy) to natvrdo zamkne a nediskutuje."},
{q:"Máte síť LAN, kde byla vytvořena doména  vampire.eu . V rámci konfigurace domény byly nastaveny zásady a předvolby GPO.<br>Označte počítač s operačním(mi) systém(y), na které se  nebudou  zásady skupiny aplikovat.",o:["Dell 101 s OS Windows 10 Home. Je členem pracovní skupiny  vampire.eu.<br>Využívá síťové zdroje DNS, DHCP, sdílené programy a soubory v rámci domény.","HP4C OS Windows 10 Prof. Je členem domény  vampire.eu.","Juno4, OS Windows 2012R2 – není v roli řadiče domény, ale je členem domény  vampire.eu.","FW1, OS Linux. Plní v doméně  vampire.eu  roli firewallu."],c:[0,3],a:"Dell 101 s OS Windows 10 Home. Je členem pracovní skupiny  vampire.eu.\nVyužívá síťové zdroje DNS, DHCP, sdílené programy a soubory v rámci domény., FW1, OS Linux. Plní v doméně  vampire.eu  roli firewallu.",e:"Zásady nedopadnou na mašiny bez podpory - na Windows Home který z edice doménu neumí nebo na cizorodý systém Linux."},
{q:"Pokud zapnete svou pracovní stanici, která je členem domény s OS Windows 2012/2016/2019 zpracovávají se zásady skupiny v určitém pořadí.<br>Ve vaší doméně existují následující úrovně, na kterých byly zásady skupin definovány.<br>Označte zásadu, která bude aplikována na vaší stanici jako první?",o:["Zásady skupiny na úrovni lokality.","Zásady skupiny na úrovni podřízené organizační jednotky.","Zásady skupiny na úrovni domény.","Zásady skupiny na úrovni organizační jednotky.","Místní zásady skupiny definované na lokálním PC."],c:[4],a:"Místní zásady skupiny definované na lokálním PC.",e:"Začátek zpracovávání (krok 'L' z LSDOU algortimu) vždy jako první načítá čistě lokálně vytvořená pravidla vlastního profilu počítače uvnitř samotného stroje."},
{q:"V rámci GPO chcete sledovat pokusy o změny nastavení auditování a přiřazení uživatelských práv. Označte volbu, která splní tento požadavek.",o:["Auditovat změny zásad.","Auditovat události přihlášení.","Auditovat přístup k adresářové službě.","Auditovat používání oprávnění."],c:[0],a:"Auditovat změny zásad.",e:"Zásahy napadající administrátorem přiřknutá a nakonfigurovaná uživatelská přístupová práva domény se zachytí skrze sledování takzvaného auditu 'Změny zásad' politiky."},
{q:"Provedl jsem změno v GPO na úrovni domény. Po které z následujících operací se  nebudou  zásady aplikovat na pracovní stanice a servery v rámci domény?",o:["zadání příkazu GPRESULT","spuštění počítače","zadání příkazu GPUPDATE","dle nastavení časového intervalu aktualizace zásad skupiny v GPO"],c:[0],a:"zadání příkazu GPRESULT",e:"GPRESULT funguje naprosto čistě jako pasivní zjišťovač informací (ukáže report pro vás na papír), on sám síť neprobouzí a nic k aplikaci nestahuje."},
{q:"Označte operaci, kterou  není  možné provádět pomocí zásad skupiny.",o:["Nastavení auditování přístupů do sítě.","Nastavení Plochy na uživatelských stanicích.","Vytváření skupin uživatelů v AD (Active Directory).","Přesměrování složky  Dokumenty  z profilu uživatele na lokální stanici do určeného úložiště na serveru.","Nastavení IPv4/IPv6 adres u pracovních stanic."],c:[2,4],a:"Vytváření skupin uživatelů v AD (Active Directory)., Nastavení IPv4/IPv6 adres u pracovních stanic.",e:"GPO neobstarává základní IP síťování stroje (na to je určen DHCP server), a v rámci samotných doménových nástrojů na výrobu složek skupin v AD slouží ADUC editor (uživatelé a počítače)."},
{q:"Označte pravdivý výrok.",o:["GPO umožňují přidělování IPv4/IPv6 adres a dalších síťových parametrů počítačům v rámci lokality.","Organizační jednotka nemůže převzít zásady skupiny od jiné organizační jednotky.","Aktualizace zásad mezi řadiči domény můžeme provést pomocí příkazu GPRESULT s příslušnými parametry. Příkaz je nutné spustit s právy administrátora.","Pokud některé části domény používají pomalé připojení, některé zásady se na ně nebudou aplikovat."],c:[3],a:"Pokud některé části domény používají pomalé připojení, některé zásady se na ně nebudou aplikovat.",e:"Active directory si chrání průchodnost sítě, takže u tenkého satelitního modemu potichu stopne obří nasazování gigabytových instalací a obřích pravidel aby neudusilo linky."},
{q:"Předvolby GPO se dají měnit z uživatelského rozhraní.",o:["Pravda","Nepravda"],c:[0],a:"Pravda",e:"Předvolby (Preferences) uživateli pole nevyřadí – proto uživatel s dostatkem lokálních práv je smí přes Ovládací panely klidně ručně po aplikaci zrušit nebo přepsat."},
{q:"V rámci GPO chcete sledovat úspěšné i neúspěšné pokusy odstranění souborů ve složce. Označte volbu, která splní tento požadavek.",o:["Auditovat přístup k objektům.","Auditovat přístup k adresářové službě.","Auditovat události přihlášení.","Auditovat používání oprávnění."],c:[0],a:"Auditovat přístup k objektům.",e:"Jakákoliv souborová manipulace (otevření složky, přejmenování podsložky, smazání obrázku) spadá pod škatulku systémového dohledu nad 'objekty' v OS."},
{q:"Vytvořím zásadu skupiny s názvem  Security  na úrovni domény Windows 2012. V doméně jste vytvořili organizační jednotku  Store  a rámci této jednotky máte další organizační jednotku  Sekce1 .<br>Potřebujete dosáhnout stavu, aby nastavení zásad skupiny v jednotce Sekce1 nebylo ovlivněno konfigurací zásad skupiny na úrovni domény.<br>Označte nejvhodnější způsob řešení daného problému.",o:["Nebudu dělat vůbec nic, protože pokud začnu konfigurovat parametry zásad skupiny na úrovni  Sekce1 , nebudou se přenášet parametry z domény a nadřízené organizační jednotky.","Na úrovni zásad skupiny organizační jednotky  Sekce1  aktivuji položku  Zablokování dědičnosti .","Na úrovni zásad skupiny domény  Security  aktivuji položku  Zablokování dědičnosti .","Na úrovni zásad skupiny organizační jednotky  Sekce1  aktivuji položku  Vynucené ."],c:[1],a:"Na úrovni zásad skupiny organizační jednotky  Sekce1  aktivuji položku  Zablokování dědičnosti .",e:"Aby dědický pád pravidel zastavil příval GPO shora z domény, musíte konkrétní zóně udělit zákaz přijímat předchozí pravidla ze stromu, takzvaný 'Block inheritance' (Zablokovat dědičnost)."},
{q:"Který z následujících výroků o Zásadách skupiny (GPO) v doméně s operačním systémem Windows 2019 je  nepravdivý .",o:["GPO umožňují spouštění skriptů. Skripty mohou být vytvořeny pomocí příkazů příkazového řádku, nebo PowerShellu.","GPO umožňuje instalaci programů. Je možné použít nejenom instalační programy Windows (.msi), ale operační systém akceptuje instalační soubory ve formátu .exe, .cmd, .bat.","Pomocí GPO se dají namapovat sdílené složky na klientské počítače.","GPO umožňují konfiguraci interního firewallu na členských počítačích v doméně Windows."],c:[1],a:"GPO umožňuje instalaci programů. Je možné použít nejenom instalační programy Windows (.msi), ale operační systém akceptuje instalační soubory ve formátu .exe, .cmd, .bat.",e:"Samotná instalační GPO technologie pro distribuci instalací funguje od základů výhradně s .msi (MS installer balíky) formátem, staré klasické zavináčové hloupé .exe neumí z domény dovést dokonce."},
{q:"Označte nesprávný výrok o protokolu DHCP v síti s protokolem IPv4.",o:["Pokud chci provést pro klienta rezervaci IPV4 adresy, musím znát jeho MAC adresu.","Typicky se pomocí DHCP nastavují parametry – IPv4 adresa, subsíťová maska, výchozí brána, název domény, IPv4 adresa DNS serveru.","Přidělení síťové konfigurace klientovi probíhá ve čtyřech krocích – DHCPDISCOVER, DHCPOFFER, DHCPREQUEST, DHCPACK.","Pokud DHCP klient nezíská z DHCP serveru síťovou konfiguraci, začne používat link-local adresu ze sítě 127.0.0.0/8."],c:[3],a:"Pokud DHCP klient nezíská z DHCP serveru síťovou konfiguraci, začne používat link-local adresu ze sítě 127.0.0.0/8.",e:"Záchranná IP síť u OS Windows operuje na vrstvě prefixu 169.254, takzvané adrese APIPA. Skrz 127.x.x by lokálně nenašla ani myš na stole."},

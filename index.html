{q:"V síťové konfiguraci počítače s OS Windows potřebuji zjistit IP adresu mého DHCP serveru.<br>Který z následujících příkazů mi to umožní?",o:["nslookup","netstat","tracert","ipconfig /all","ping 127.0.0.1"],c:[3],a:"ipconfig /all",e:"Základní ipconfig sdělí jen IP číslo stroje, ale s přepínačem 'all' vyplivne z ovladače navíc fyzickou adresu (MAC), bránu i konkrétní IP adresu zdroje, odkud tu DHCP zprávu vlastně chytil."},
{q:"Pokud chci vytvořit na DHCP serveru rezervaci musím určit IPv4 adresu, která se bude klientskému počítači trvale přidělovat.<br>K jeho jednoznačné identifikaci slouží jeho MAC adresa.",o:["Pravda","Nepravda"],c:[0],a:"Pravda",e:"Aby mohla logická tabulka DHCP uvést natrvalo spojnici mezi serverem a stanicí (rezervaci), musí u té stanice mít unikátní pevný hardwarový řetězec, který z ní čte (neboli onu fyzickou MAC adresu)."},
{q:"Na jakém portu přijímá server DHCP požadavky od klienta. (Používáme protokol IPv4.)",o:["TCP/68","UDP/67","UDP/68","UDP,TCP/67","TCP/67","DHCP/67"],c:[1],a:"UDP/67",e:"Server naslouchající do křičící prázdnoty u sítě kvůli hledajícím se počítačům na bezdrátovém prostoru propůjčuje své ušní boltce nespojovaně pro paketově levný The UDP (číslo 67)."},
{q:"Jaké je správné pořadí při výměně zpráv mezi serverem DHCP a klientem?",o:["DHCPACK -> 4, DHCPOFFER -> 2, DHCPDISCOVER -> 1, DHCPREQUEST -> 3", "DHCPOFFER -> 1, DHCPDISCOVER -> 2, DHCPREQUEST -> 4, DHCPACK -> 3", "DHCPDISCOVER -> 1, DHCPOFFER -> 2, DHCPREQUEST -> 3, DHCPACK -> 4", "DHCPREQUEST -> 1, DHCPDISCOVER -> 3, DHCPOFFER -> 2, DHCPACK -> 4"],c:[0,2],a:"DHCPACK -> 4, DHCPOFFER -> 2, DHCPDISCOVER -> 1, DHCPREQUEST -> 3 (takže oboje, jen je to napsané jiným způsobem)",e:"Záchytný model 4 kroků od DORA: (1) PC posílá žádost do éteru (D-iscover), (2) Server se ohlásí a hodí mu adresu (O-ffer), (3) Klient to bere a radostně oznamuje všem, že nabídku potvrdil (R-equest), a nakonec mu to server podepíše (A-CK)."},
{q:"Následující výpis konfigurace Linuxového  DHCP serveru který pracuje v síti s adresou 10.8.0.0/24.<br>Jeho úkolem je přidělit síťovou konfiguraci 130 hostitelům.<br>subnet 10.8.0.0 netmask 255.255.255.0 {<br>range 10.8.8.11 10.8.8.140;<br>option routers 10.8.0.1;<br>option domain-name-servers 10.8.0.5, 10.8.0.6;<br>option domain-name \"mxl.cz\";<br>option ntp-servers 10.8.8.6;<br>default-lease-time 43200;<br>max-lease-time 86400;<br>}<br>DHCP server nefunguje.<br>Kde je chyba?",o:["Subsíťová maska ve tvaru 255.255.255.0 je špatně. Pro uvedenou konfiguraci by měla být ve tvaru 255.255.255.240.","Na konci řádků nemůže být znak středník(;) ale dvojtečka (:).","Chybná adresa sítě.","Rozsah adres musí být správně zapsán ve tvaru:<br>range 10.8.8.10-10.8.8.140","Uvedená konfigurace je v pořádku. Nefunkčnost služby DHCP má na svědomí chyba někde jinde.","Rozsah adres musí být správně zapsán ve tvaru:<br>range 10.8.0.11 10.8.0.140","Subsíťová maska ve tvaru 255.255.255.0 je špatně. Pro uvedenou konfiguraci by měla být ve tvaru 255.255.255.192."],c:[5],a:"Rozsah adres musí být správně zapsán ve tvaru:\nrange 10.8.0.11 10.8.0.140",e:"Při zápisu konfigurace do prefixu pro 255.255.255.0 (.zero), musíte u DHCP fondu logicky dodržovat celistvost prvních 3 bitů z rozsahu a nedávat jej do 10.8.8.11... server nenabootuje pro konflikt IP bloků."},
{q:"Na jakém portu přijímá klient DHCP komunikaci od serveru DHCP. (Používáme protokol IPv4.)",o:["TCP/68","TCP/67","UDP,TCP/67","UDP/103","UDP/67","UDP/68","DHCP/67"],c:[5],a:"UDP/68",e:"Zatímco server poslouchal dole na sedmdesátce, klientská stanice sedí připravená se zatajeným dechem na portu UDP číslo šedesát osm."},
{q:"Jste správce sítě s adresou 172.16.0.0/20. Na jedné ze stanic se objevila IP adresa 169.254.10.15/16.<br>Jak se nazývá funkce která tuto adresu přidělila?",o:["Automatic Private IP Addressing", "Alternative Public IP Allocation", "Advanced Private Internet Protocol", "Automatic Public IP Assignment"],c:[0],a:"Automatic Private IP Addressing",e:"Samoobslužná rezervní adresa, neboli APIPA (Automatic Private IP), která se nastartuje tehdy, když klient dlouhé minuty neobdržel na žádost k DHCP z DHCPčka vůbec žádnou reakci."},
{q:"Který z následujících příkazů odstraní síťovou konfiguraci přidělenou DHCP serverem?",o:["ipconfig /renew","ipconfig /flushdhcp","ipconfig /release","netsh dhcpconfig erase"],c:[2],a:"ipconfig /release",e:"Zadaný příkaz informuje DHCP server o tom, že klienta adresa nezajímá, pustí ji zpět do bazénku (release) a lokální stanice se odpojí a čeká bez adresy."},
{q:"Kterou z následujících položek nedokáže přidělit DHCP server?",o:["IPv4 adresa DNS serveu.","Fyzická (MAC) adresa klientského počítače.","Instalace/aktualizace ovladače zařízení.","IPv4 adresa výchozí brány.","IPv4 adresa časového serveru.","Subsíťová maska.","IPv4 adresa","Název domény."],c:[1,2],a:"Fyzická (MAC) adresa klientského počítače.,\nInstalace/aktualizace ovladače zařízení.",e:"Jelikož je adresa (MAC) vtisknutá hardwarovými inženýry do síťové desky a ovladače zasahují do registru a instalací softwaru samotného OS - ani na jedno takové nepatří pravomoc pouhého obstarávacího DHCP protokolu."},
{q:"Jaký bude název zóny pro zpětný překlad domény  cosi.net  na DNS serveru ?  Adresa sítě v této doméně  je 172.30.6.0/24.",o:["172.30.6.in-addr.apra","6.30.172.net.cosi","6.30.172.in-addr.apra","cosi.net.in-addr.apra"],c:[2],a:"6.30.172.in-addr.apra",e:"Pro zónu reverzní definice DNS vezmete prostě a jednoduše logické bloky adres sítě /24, otočíte je jako zrcadlo zleva doprava a přicvaknete slavnou zkratku in-addr.arpa."},
{q:"Označte  nepravdivý  výrok o DNS.",o:["Windows DNS server podporuje dynamickou aktualizaci záznamů.","Primární a sekundární servery jsou autoritativní servery pro danou zónu.","Primární a sekundární DNS servery jsou rovnocenné. Na obou se dají provádět manuální úpravy záznamů.","Služba DNS používá pro komunikaci protokoly TCP/53 a UDP/53."],c:[2],a:"Primární a sekundární DNS servery jsou rovnocenné. Na obou se dají provádět manuální úpravy záznamů.",e:"Klasické nasazení bez (AD-integrated replikací) v sobě chová pouze jeden Primární plně editovatelný DNS panel. Záložní sekundární je jen zařízením na principu čtení hotových listů – a zprávy nejdou upravit."},
{q:"Pro svou funkci musí mít služba DNS nastavenou na firewallu příslušnou kombinaci protokolů a portů transportní vrstvy. Označte správnou variantu.",o:["TCP, UDP/56","IP, TCP, UDP/53","UDP/53","TCP, UDP/53"],c:[3],a:"TCP, UDP/53",e:"Pro jednorázový klientův dotaz šetří pásmo lehká vrstva UDP a pro těžké, spolehlivě potřebné a velké replikace mezi servery funguje protokol TCP - v obou situacích operují u brány s portem padesát tři."},
{q:"Který z následujících typů záznamů DNS se používá k převodu IPv4/IPv6 adresy na jméno hostitele?",o:["CNAME","SRV","A a AAAA","PTR","SOA","NS"],c:[3],a:"PTR",e:"K překlápění obráceně (tedy proklikávání čísla na doménový název stroje) slouží pointer v reverzní zóně (zvaný jako záznam PTR)."},
{q:"Který z následujících záznamů používaný v DNS převádí názvy hostitelů na adresy IPv6?",o:["SRV","TXT","NS","PTR","AAAA","SOA","MX","A"],c:[4],a:"AAAA",e:"Oproti A-záznamu u staré verze (4x octet), verze pro novou specifikaci šestkových IPv6 obnášející čtyřikrát víc bitového bloku využila k označení v DNS rovnou čtyř piktogramů ve znaku - AAAA."},
{q:"Jaký systém se používá k překladu URL https://www.auta.cz na IP adresu?",o:["WINS","DHCP","DNS","ARP"],c:[2],a:"DNS",e:"Služba Domain Name System funguje jako univerzální internetový slovník, který textovou frázi auta.cz propojí pro síť na surová IP čísla typu 12.3.4.5."},
{q:"Označte  chybný výrok  týkající se rekurzivního DNS serveru.",o:["Rekurzivní DNS server se také stará o validaci DNSESC. (Pokud tuto technologii server podporuje.)","Server pro ně příslušný záznam získá rekurzivními dotazy u autoritativních DNS serverů a po stanovenou dobu (definovanou pomocí parametru TTL) je má uloženy v cache, aby mohl odpovídat klientům rychleji a šetřil zatížení serverů autoritativních.","Rekurzivní server je podobně jako primární a sekundarní server DNS autoritativní.","Rekurzivní server získává DNS záznamy  dotazy u autoritativních DNS serverů"],c:[2],a:"Rekurzivní server je podobně jako primární a sekundarní server DNS autoritativní.",e:"Rekurzivní server neudržuje vlastní databázi záznamů, a proto není primárním garantem odpovědi. Jeho úkolem je dotázat se jiných serverů a výsledek přinést klientovi, tudíž není autoritativní."},
{q:"Označte generické TLD (Top Level Domain).",o:[".de",".org",".at",".edu",".mil"],c:[1,3,4],a:".org, .edu, .mil",e:"Generické domény nejvyššího řádu (gTLD) nespadají pod konkrétní stát, ale pod zaměření. Patří sem například .org (neziskovky), .com (komerce), .edu (vzdělávání) či .mil (vojenství). Domény jako .de nebo .cz jsou národní (ccTLD)."},
{q:"Na obrázku máte soubor, jehož funkce souvisí s překladem názvů. Jak se tento soubor jmenuje.",o:["lmhost","Jedná se o zónový soubor DNS. Název je odvozen od názvu domény. Přípona je ale vždy DNS.","hostname","hosts"],c:[3],a:"hosts",e:"Soubor 'hosts' slouží k lokálnímu a statickému překladu jmen na IP adresy. Systém v něm hledá záznamy ještě předtím, než pošle dotaz na DNS server."},
{q:"Za jak dlouho označí sekundární server své záznamy za neplatné pokud se mu nepodaří kontaktovat primární server?",o:["1 hodina, položka  minimum (default) TTL","1 hodina, položka  TTL for this records","10 minut","15 minut","1 den"],c:[4],a:"1 den",e:"Parametr 'Expires after' v SOA záznamu definuje dobu, po kterou smí sekundární server poskytovat odpovědi ze své cache, pokud ztratí spojení s primárním serverem. Standardně to bývá 1 den (86400 sekund)."},
{q:"Označte DNS záznam, který definuje časový interval přenosu údajů mezi primárním a sekundárním serverem.",o:["A","SOA","PTR","NS","AAAA"],c:[1],a:"SOA",e:"Záznam SOA (Start of Authority) obsahuje klíčové parametry zóny, včetně intervalů pro obnovu (Refresh), opakování pokusů (Retry) a vypršení platnosti (Expire) pro sekundární servery."},
{q:"Který z následujících záznamů používaný v DNS převádí názvy hostitelů na adresy IPv4?",o:["SRV","AAAA","SOA","PTR","A","MX"],c:[4],a:"A",e:"Záznam typu A (Address record) obstarává standardní překlad plně kvalifikovaného jména (FQDN) na 32bitovou IPv4 adresu."},
{q:"Tento záznam DNS oznamuje úplný kvalifikovaný název a prioritu serveru pro příjem elektronické pošty pro danou doménu. Označte jej.",o:["SOA","MX","NS","SRV","A nebo AAAA"],c:[1],a:"MX",e:"Záznam MX (Mail Exchanger) určuje, jaké servery mají přijímat elektronickou poštu pro danou doménu a v jakém pořadí (prioritě) by měly být kontaktovány."},
{q:"Při konfiguraci služby DNS můžeme nastavit  dynamické  aktualizace. Aby byla tato možnost funkční je nutná spolupráce se službou ...",o:["ARP","Žadná další služba se nepotřebuje, stačí povolení volby v rámci DNS.","GPO","Active Directory Domain Service","DHCP"],c:[4],a:"DHCP",e:"Dynamické aktualizace DNS úzce spolupracují s DHCP serverem. Když DHCP server přidělí klientovi IP adresu, může za něj automaticky aktualizovat jeho A a PTR záznamy v databázi DNS."},
{q:"Jak se jmenuje serverová role, která automaticky přiděluje klientům IP adresy (+další síťové parametry)?",o:["DHCP","LLMNR","ARP","DNS","RARP"],c:[0],a:"DHCP",e:"Protokol DHCP (Dynamic Host Configuration Protocol) automaticky konfiguruje zařízením v síti IP adresu, masku, výchozí bránu a DNS servery."},
{q:"Který typ DNS záznamu překládá IPv4 adresy na název hostitele?",o:["SOA","PTR","AAAA","A"],c:[1],a:"PTR",e:"Záznam PTR (Pointer) v zóně zpětného překladu slouží pro tzv. reverzní DNS, tedy ke zjištění doménového jména (FQDN) z poskytnuté IP adresy."},
{q:"Označte doménu druhé úrovně (SLD – Second Level Domain).",o:["nic.cz.","mail.nic.cz.","cz."],c:[0],a:"nic.cz.",e:"Doménová struktura se čte zprava doleva. Doména nejvyšší úrovně (TLD) je .cz, a doména druhé úrovně (SLD), která je pod ní registrována, je nic.cz."},
{q:"Označte typ DNS záznamu obsahující časové údaje o přenosu dat na sekundární servery.",o:["CNAME","NS","SRV","TXT","SOA"],c:[4],a:"SOA",e:"Záznam SOA (Start of Authority) je základním záznamem každé zóny. Definuje mimo jiné časovače, které řídí replikaci zóny na sekundární DNS servery."},
{q:"Tento záznam označuje jméno autoritativního DNS serveru pro danou doménu. Který to je?",o:["MX","NS","CNAME","SOA"],c:[1],a:"NS",e:"Záznam NS (Name Server) informuje o tom, jaké jmenné servery mají pro danou doménu autoritu a kde se nacházejí podrobné záznamy."},
{q:"Na vrcholu hierarchické struktury DNS se nacházejí kořenové (root) servery. Kolik jich je?",o:["10", "13", "20", "24"],c:[1],a:"13",e:"Kořenových DNS serverů (Root servers) je historicky zavedeno 13 (označených písmeny A až M). Jsou základním pilířem pro překlad TLD domén na internetu."},
{q:"Jak se jmenuje  soubor používaný k překladu názvů hostitelů na  IP adresy ?",o:["lmhostsname","dns","hosts","wins"],c:[2],a:"hosts",e:"Jedná se o textový soubor 'hosts' (ve Windows většinou v system32/drivers/etc, v Linuxu v /etc), do kterého se zapisují manuální a statické překlady jmen na IP adresy."},
{q:"Označte  pravdivý  výrok o DNS.",o:["Kořenové servery DNS spravují všechny domény v Internetovém prostoru.","DNS server Windows 2019/2022 se dá použít pro klienty s OS Linux.","Záznam MX označuje autoritativní server pro danou zónu.","Název počítače NS1 je příkladem plně specifikovaného doménového jména (FQDN) počítače v síti, kde se používá DNS server."],c:[1],a:"DNS server Windows 2019/2022 se dá použít pro klienty s OS Linux.",e:"Díky tomu, že DNS funguje na celosvětově standardizovaných protokolech (RFC), může Windows DNS server zcela bez problémů obsluhovat i linuxové klienty."},
{q:"Pracujete v Linuxovém systému. Vystup po zadání dvou posledních příkazů je následující:<br>user1@MX1~$ ls -l<br>-rwxr-xr-x     user1      grp1     1254      sk1.sh<br>-rwxr-x---     user1      grp1     2956      util4<br>user1@MX1~$ sk1.sh<br>sk1.sh:příkaz nebyl nalezen<br>Co je příčinou chyby na následujícím řádku?",o:["Soubor sk1.sh má chybně nastavená oprávnění.","Proměnná prostředí PATH neobsahuje domovský adresář.","Soubor sk1.sh není spustitelný pro aktuálního uživatele.","Soubor nemůže mít příponu .sh ale .exe. To univerzálně označuje spustitelné soubory."],c:[1],a:"Proměnná prostředí PATH neobsahuje domovský adresář.",e:"V Linuxu se aktuální adresář standardně nenachází v systémové proměnné PATH. Pokud chcete spustit skript z aktuální složky, musíte použít prefix './' (např. ./sk1.sh)."},
{q:"V prostředí OS Linux potřebujete odstranit skupinu  sk1?  Označte příkazy, které to umožní.",o:["groups | del sk1","delgroup sk1","groupmod -d sk1","groupdel sk1"],c:[1,3],a:"delgroup sk1, groupdel sk1",e:"V unixových systémech lze skupinu smazat pomocí klasického příkazu 'groupdel' nebo jeho přívětivější varianty 'delgroup'."},
{q:"Jak zkontrolujete v Linuxu využití místa na disku v adresáři  /sql/prog ?",o:["space /sql/prog","df /sql/prog","du /sql/prog","ls -d /sql/prog"],c:[2],a:"du /sql/prog",e:"Příkaz 'du' (Disk Usage) rekurzivně projde daný adresář a spočítá, kolik diskového prostoru zabírají jeho soubory a podsložky."},
{q:"Který příkaz se používá v Linuxu k monitorování výkonu systému v reálném čase?",o:["top","performance","uptime","monitor"],c:[0],a:"top",e:"Příkaz 'top' zobrazuje neustále aktualizovaný interaktivní přehled o běžících procesech, zátěži procesoru, využití paměti a swapu."},
{q:"Co zobrazuje Linuxový příkaz id?",o:["Informace o uživateli a skupině pro aktuálního uživatele","ID hardwaru","ID systému","ID procesu příkazu"],c:[0],a:"Informace o uživateli a skupině pro aktuálního uživatele",e:"Příkaz 'id' vypíše informace o aktuálním uživateli – jeho jedinečné číslo (UID), číslo primární skupiny (GID) a seznam dalších skupin, do kterých patří."},
{q:"Uložte prvních pět řádků souboru  error.log  do nového souboru  e1.txt.",o:["$ file -5 error.log > e1.txt","$ cat -5 error.log > e1.txt","$ head -5 error.log => e1.txt","$ head -5 error.log > e1.txt"],c:[3],a:"$ head -5 error.log > e1.txt",e:"Příkaz 'head -5' vypíše prvních 5 řádků. Znak '>' je pak přesměruje z běžného standardního výstupu (terminálu) do nového souboru e1.txt."},
{q:"V souboru  error.log  chcete najít řetězec znaků  login . Označte Linuxový příkaz, který to umožní.",o:["cat error.log > find login","cat error.log | find login","cat error.log | grep login","query error.log login"],c:[2],a:"cat error.log | grep login",e:"Příkaz 'cat' vypíše obsah souboru a 'roura' (|) tento textový výstup předá příkazu 'grep', který z něj vyfiltruje pouze ty řádky, na kterých se nachází slovo 'login'."},
{q:"Označte Linuxový příkaz, který zabrání všem uživatelům, aby nesmazali soubor  finance.doc  v adresáři  /home/bend.",o:["chmod ugo-w finance.doc","chmod ug-w finance.doc","chmod a-w /home/bend","chmod a+w /home/bend"],c:[2],a:"chmod a-w /home/bend",e:"Možnost smazat soubor neurčují práva samotného souboru, ale práva složky, ve které se nachází. Příkaz 'chmod a-w /home/bend' odebere všem (all) právo zápisu (-w) do dané složky."},
{q:"Spravujete Linuxový server, kde se nachází adresář  /Prog/SQL . Vaším aktuálním adresářem je  /home/daniel .<br>Celou adresářovou strukturu  /Prog/SQL  včetně vnořených souborů a dalších adresářů potřebujete odstranit. Jak toho dosáhnete?",o:["cd / ; rm /Prog/SQL","rmdir -R /Prog/SQL","rm -r Prog/SQL","rm -R /Prog/SQL"],c:[3],a:"rm -R /Prog/SQL",e:"Příkaz 'rm -R /Prog/SQL' s parametrem -R (recursive) bezpečně a úplně odstraní zadaný adresář včetně všech jeho souborů a vnořených podsložek."},
{q:"Ve vašem aktuálním adresáři je soubor  form.  Jak zjistíte formát tohoto souboru .",o:["$ format form","$ ls -f form","$ file form","$ whatis form"],c:[2],a:"$ file form",e:"V Linuxu nezáleží na koncovce. Skutečný datový formát a typ obsahu souboru dokáže bezpečně detekovat nástroj 'file'."},
{q:"Každý pátek v 23:15 bude všechny soubory v adresáři  /prog1/js  archivovány programem  tar . Archiv bude komprimován pomocí programu gzip.<br>Jméno archivního souboru –  js.tar.gz .<br>Jaká poslopnost příkazů mne dovede ke splnění úkolu?",o:["$ crontab 15 23 * * 5<br>...<br>tar -czf /prog1/js/js.tar.gz /prog1/js/*<br>:wq","$ crontab -e<br>...<br>15 23 * * 6 tar -cjf /prog1/js/js.tar.gz /prog1/js/*<br>:wq","$ crontab -e<br>...<br>15 23 * * 5 tar -czf /prog1/js/js.tar.gz /prog1/js/*<br>:wq","$ at 23:15 Fri<br>at > tar -czf /prog1/js/js.tar.gz /prog1/js/*<br>Ctrl+D"],c:[2],a:"$ crontab -e...15 23 * * 5 tar -czf /prog1/js/js.tar.gz /prog1/js/*:wq",e:"V nástroji crontab (-e pro editaci) nastavíme čas '15 23', pak dny v měsíci ('* *') a '5' pro pátek. Nástroj 'tar' s parametry '-czf' rovnou archivuje a komprimuje přes gzip do výsledného souboru."},
{q:"Linux může využívat celou řadu textových editorů. Označte program, který do této skupiny nepatří.",o:["nano","emacs","vim","bind"],c:[3],a:"bind",e:"BIND (Berkeley Internet Name Domain) je software zajišťující služby DNS serveru, nejedná se o textový editor jako nano, vim nebo emacs."},
{q:"Linux používá řadu verzí GUI. Označte položku, která mezi ně nepatří.",o:["Unity","awk","KDE","GNOME"],c:[1],a:"awk",e:"KDE, GNOME a Unity jsou populární grafická desktopová prostředí pro Linux. AWK je programovací jazyk určený pro zpracování a analýzu textových dat v terminálu."},
{q:"Vaším aktuálním adresářem je  /home/denis.  V adresáři  /DB/SQL   je soubor  conf.xml.  Jak vytvoříte z tohoto adresáře symbolický odkaz  na tento soubor?<br>Název odkazu  conf.",o:["ln  /DB/SQL/conf.xml conf","ln -s /DB/SQL/conf.xml conf","ln -s  /home/denis/conf /DB/SQL/conf.xml","ln -s /DB/SQL/conf.xml /home/denis/conf"],c:[1,3],a:"ln -s /DB/SQL/conf.xml conf, ln -s /DB/SQL/conf.xml /home/denis/conf",e:"Příkaz 'ln -s' tvoří symbolický odkaz (soft link). Nejdříve se napíše cesta k cílovému souboru (/DB/SQL/conf.xml) a za ni název nebo cílová složka nového odkazu."},
{q:"Označte položku, která nepatří mezi ostatní.",o:["JFS","ext4","emacs","XFS","ext3"],c:[2],a:"emacs",e:"JFS, ext3, ext4 a XFS jsou zástupci linuxových souborových systémů (filesystémů). Emacs je textový editor."},
{q:"Jak přejmenujte adresář  zal1  na  zal4 ?",o:["$ ren zal1 zal4","$ mv zal1 zal4","$ rename zal1 zal4","$ rn zal1 zal4","$ mv zal4 zal1"],c:[1],a:"$ mv zal1 zal4",e:"V Linuxu samostatný příkaz pro přejmenování není běžný. Přejmenování se provádí pomocí příkazu pro přesun 'mv' (move), čímž se soubor nebo složka přesune pod nové jméno."},
{q:"Na svém PC s OS Linux jste získali následující výstup týkající se procesů:<br>PID      PPID      S      CMD<br>166        1258      R      bash<br>732        3654      S      mutt<br>987        2354      T      tar<br>1247       654       Z      dbs<br>Napište identifikační číslo pozastaveného procesu.",o:["166", "732", "987", "1247"],c:[2],a:"987",e:"Ve výpisu procesů sloupec S (Status) určuje stav. Písmeno 'T' (Traced/Stopped) značí pozastavený proces, kterému v tabulce odpovídá PID 987."},
{q:"Na svém počítači s OS Linux jste získali výpis spuštěných procesů. Který znak označujíe spící proces?",o:["Z","T","S","R"],c:[2],a:"S",e:"Stav procesu označený písmenem 'S' (Sleeping) znamená, že proces je v režimu spánku a čeká na nějakou událost (např. na vstup od uživatele nebo na dokončení operace disku)."},
{q:"Odstraňte adresář  /orf.  Adresář není prázdný, obsahuje další podadresáře a soubory. Vaším aktuálním adresářem je  /doc1/texty.",o:["$ rm -R /orf","$ rmdir  /orf","$ rm -r /orf","$ rmdir  -a /orf","$ rmdir -R /orf"],c:[0,2],a:"$ rm -R /orf, $ rm -r /orf",e:"Příkaz 'rmdir' maže pouze prázdné složky. Pro smazání složky obsahující data je nutné použít příkaz 'rm' s přepínačem '-r' nebo '-R' pro rekurzivní odstranění."},
{q:"V Linuxu zadáte příkaz  chmod u+s /usr/sbin/trackdata . Co znamená znak „ s \" v příkazu?",o:["sgid bit","sticky bit","suid bit","ssid"],c:[2],a:"suid bit",e:"Písmeno 's' u vlastníka (user) přidává SUID bit. Ten zajistí, že při spuštění souboru jakýmkoliv uživatelem bude mít proces dočasně oprávnění toho uživatele, který soubor vlastní."},
{q:"Chcete najednou prázdně adresáře  k1, k2, k3 . Jak toho dosáhnete? (Všechny uvedené adresáře jsou podadresáře vašeho aktuálního adresáře.)",o:["$ rmdir \"k1 k2 k3\"","$ rmdir k1 , rmdir k2 ,rmdir k3","$ rmdir k1 ; rmdir k2 ; rmdir k3","$ rmdir k1 ; k2 ; k3","$ rmdir k1 k2 k3"],c:[2,4],a:"$ rmdir k1 k2 k3, $ rmdir k1 ; rmdir k2 ; rmdir k3",e:"Příkaz 'rmdir' pro mazání prázdných adresářů akceptuje vypsání více cílů najednou, oddělených mezerou (rmdir k1 k2 k3). Případně lze jednotlivé příkazy zřetězit pomocí středníku."},
{q:"Který příkaz se v Linuxu používá k extrahování souboru  file.tar.gz ?",o:["untar file.tar.gz","gzip -d file.tar.gz","extract file.tar.gz","tar -xzf file.tar.gz"],c:[3],a:"tar -xzf file.tar.gz",e:"Příkaz 'tar' s kombinací parametrů '-xzf' říká: rozbal (x), použij dekompresi gzip (z) a operuj se zadaným souborem (f)."},
{q:"Potřebujete podrobnější údaje k příkazu  echo . Co zadáte do příkazového řádku  pro zobrazení informací týkajících se tohoto příkazu v manuálových stránkách?",o:["help echo","man echo","info echo","echo -h"],c:[1],a:"man echo",e:"Příkaz 'man' (manual) otevře rozsáhlou oficiální nápovědu a kompletní dokumentaci k zadanému programu."},
{q:"Jak odstraníte soubor  fx?.html .",o:["$ rm fx\\?.html","$ rm 'fx?.html'","$ rm fx/?.html","$ rm \"fx?.html\"","$ sudo rm fx?.html"],c:[0],a:"$ rm fx\\?.html",e:"Protože znak '?' funguje v terminálu jako zástupný znak (wildcard) pro libovolné písmeno, je nutné jej tzv. 'escapovat' zpětným lomítkem (\\?), aby jej systém zpracoval jako obyčejný text."},
{q:"Pomocí jakého příkazu se zjišťuje velikost, využitý prostor a volný prostor v diskové oblasti?",o:["du","fsck","diskmemory","df"],c:[3],a:"df",e:"Nástroj 'df' (Disk Free) poskytuje ucelený přehled o všech připojených souborových systémech a velikosti jejich volného i využitého místa."},
{q:"Chcete zobrazit stromovou strukturu adresářů. Dosáhnete toho příkazem  (doplňte) ...",o:["ls -tree","dir tree","tree","branch"],c:[2],a:"tree",e:"Příkaz 'tree' (strom) slouží přesně k tomuto účelu – vykreslí grafickou stromovou hierarchii složek a podsložek přímo do textového výstupu terminálu."},
{q:"Nevíte jak se používá příkaz  cp.  Jak zobrazíte nápovědu?",o:["help cp","man cp","cp --help","cp /?"],c:[2],a:"cp --help",e:"Většina linuxových programů nabízí rychlou a stručnou kontextovou nápovědu s výčtem parametrů, kterou lze vyvolat přidáním přepínače '--help'."},
{q:"Jaký bude nejvhodnější souborový systém určený pro práci se soubory na lokálním disku pracovní stanice s OS Linux, kde v žádném případě nepředpokládáme vysoké hodnoty vstupních a výstupních diskových operací a velké počty souborů v adresářích?",o:["Ext4","NFS","ReisenFS","JFS"],c:[0],a:"Ext4",e:"Ext4 je robustní a letitý výchozí standard pro většinu desktopových i menších serverových instalací Linuxu, který bohatě postačuje pro běžnou práci a nevyžaduje specifický výkon."},
{q:"Jakou hodnotu má UID uživatele root?",o:["1","1000","0","-1"],c:[2],a:"0",e:"Uživatel root (superuživatel s absolutními právy k systému) má v linuxových i unixových systémech vždy vyhrazeno neměnné UID s hodnotou 0."},
{q:"Potřebujete zobrazit aktuální systémové datum a čas. Případně provést změnu. Umožní vám to příkaz  (doplňte) ...",o:["time","datetime","clock","date"],c:[3],a:"date",e:"K zobrazení i případné ruční modifikaci systémového data a času v terminálu slouží základní program 'date'."},
{q:"Která z následujících položek nepatří mezi ostatní.",o:["GNOME","Midnight Commander","Unity","KDE"],c:[1],a:"Midnight Commander",e:"GNOME, KDE a Unity jsou plnohodnotná grafická desktopová prostředí. Midnight Commander (MC) je oblíbený dvousloupcový textový správce souborů spouštěný v terminálu."},
{q:"Linux ukládá informace o uživatelích v souboru. Napište jeho název a absolutní cestu k němu.",o:["/etc/users","/etc/passwd","/var/passwd","/root/users"],c:[1],a:"/etc/passwd",e:"Konfigurační textový soubor '/etc/passwd' nese informace o uživatelských profilech – přiřazuje přihlašovacímu jménu jeho UID, domovskou složku a výchozí shell."},
{q:"Máte soubor  person.txt.  Jak musíte upravit jeho název, aby se nezobrazoval v adresáři při použití příkazu  ls.",o:["person.txt.hidden","~person.txt",".person.txt","_person.txt"],c:[2],a:".person.txt",e:"V unixových systémech se atribut 'skrytý' nevyužívá. Namísto toho se soubor nebo složka automaticky stane neviditelnou pro běžný výpis, pokud její název začíná tečkou."},
{q:"Příkaz který umožní zobrazit jméno pracovní stanice je ...  (doplňte)",o:["pcname","name","host","hostname"],c:[3],a:"hostname",e:"Jméno stroje v síti (hostname) rychle vypíše ze systému stejnojmenný příkaz 'hostname'."},
{q:"Označte příkazy umožňující zjistit nejaktivnější procesy.",o:["jobs","atop","top","htop","ps"],c:[1,2,3],a:"top, atop, htop",e:"Tradiční 'top' a jeho vylepšené a vizuálně přehlednější alternativy 'htop' a 'atop' představují nejlepší nástroje pro monitorování běžících procesů a zátěže v reálném čase."},
{q:"Třetí zařízení s řadičem SATA, čtvrtá disková oblast bude označeno…",o:["sfd4","hdc4","scd4","sdc4"],c:[3],a:"sdc4",e:"Pevné disky SATA se značí jako sda, sdb, sdc (třetí disk je tedy sdc). Jednotlivé logické oddíly na nich dostávají číselné indexy. Proto čtvrtý oddíl na třetím disku nese jméno sdc4."},
{q:"Linux ukládá zašifrovaná hesla uživatelů v souboru. Napište jeho název a absolutní cestu k němu.",o:["/etc/shadow","/etc/passwd","/var/shadow","/etc/passwords"],c:[0],a:"/etc/shadow",e:"Z bezpečnostních důvodů se reálné hashe hesel uživatelů neukládají do běžně čitelného /etc/passwd, ale do vysoce chráněného souboru '/etc/shadow'."},
{q:"Pomocí jakého příkazu můžete změnit uživateli heslo?",o:["chpass","password","passwd","setpass"],c:[2],a:"passwd",e:"Nástroj 'passwd' slouží ke změně vlastního uživatelského hesla. Díky SUID bitu může bezpečně zapsat změnu do chráněného systémového souboru hesel."},
{q:"Jaké je jméno prvního spuštěného procesu v Linuxu?",o:["boot","start","init","root"],c:[2],a:"init",e:"Proces 'init' (nebo nověji 'systemd') je spuštěn jádrem jako naprosto první v pořadí. Dostává proto vyhrazené PID 1 a stává se tak předkem všech ostatních procesů."},
{q:"Označte nejnovější nestabilní verzi jádra Linuxu.",o:["5.5.1-38-generic","5.4.3-50-generic","5.3.11-57-generic","5.3.15-45-generic"],c:[0],a:"5.5.1-38-generic",e:"Tradiční pravidlo u verzování linuxového jádra říká, že sudé číslo v druhé části verze (např. 5.4) znamená stabilní verzi, zatímco liché (5.5, 5.3) značí větev nestabilní a experimentální."},
{q:"Nevíte v jakém adresáři adresářové struktury se nacházíte. Pomocí jakého příkazu je to možné zjistit?",o:["cwd","pwd","cd","dir"],c:[1],a:"pwd",e:"Zkratka příkazu 'pwd' znamená Print Working Directory. Při spuštění ihned vypíše kompletní absolutní cestu ke složce, ve které je terminál zrovna otevřen."},
{q:"Aktuální uživatel chci zjistit skupiny kde je členem. Nejrychleji toho dosáhne příkazem...",o:["users","id","groups","group"],c:[2],a:"groups",e:"Příkaz 'groups' velmi jednoduše a stručně vypíše čistě jen seznam všech textových názvů skupin, do kterých aktuálně přihlášený uživatel spadá."},
{q:"Potřebujete zobrazit obsah souboru kde je uložen seznam skupin. Jak dosáhnete tohoto výstupu?",o:["cat /var/group","cat /etc/group","show group","read /etc/groups"],c:[1],a:"cat /etc/group",e:"K rychlému textovému zobrazení celého obsahu se hodí příkaz 'cat'. Databázi s konfigurací všech lokálních skupin pak najdeme v konfiguračním souboru '/etc/group'."},
{q:"V aktuálním adresáři máte soubor  img.php . Jak zjistíte oprávnění k touto souboru?",o:["chmod img.php","show img.php","ls -l img.php","info img.php"],c:[2],a:"ls -l img.php",e:"Přepínač '-l' (long format) u oblíbeného příkazu 'ls' zajistí detailní výpis informací o souboru. Ten obsahuje jak data o vlastnictví, tak přesnou matici oprávnění rwx."},
{q:"Jaký příkaz umožní pouze jednorázové spuštění naplánované úlohy?",o:["cron","once","schedule","at"],c:[3],a:"at",e:"Na rozdíl od programu Cron, který provádí skripty cyklicky a pravidelně, je program 'at' navržen speciálně tak, aby zadaný příkaz spustil v přesný čas pouze jednou a pak na něj zapomněl."},
{q:"Označte  nepravdivý  výrok.",o:["Administrativní informace má každý soubor uloženy ve svém  i-uzlu (i-node) .","Lokální sokety slouží ke komunikaci procesů v rámci síťového prostředí.","Vlastnost žurnálování v souborovém systému umožňuje rychlou rekonstrukci dat v případě havárie .","Adresář  /var  slouží pro data, která se během života systému dynamicky mění."],c:[1],a:"Lokální sokety slouží ke komunikaci procesů v rámci síťového prostředí.",e:"Lokální sokety (Unix domain sockets) umožňují rychlou komunikaci mezi procesy čistě v rámci jednoho operačního systému, do reálné vnější počítačové sítě vůbec nevstupují."},
{q:"Jaký příkaz umožní přechod z libovolného podadresáře do kořenového adresáře?",o:["cd ..","cd /","cd ~","chdir /"],c:[1],a:"cd /",e:"Znak lomítka '/' symbolizuje v unixových systémech hlavní kořenový adresář. Příkaz 'cd /' vás tedy okamžitě přesune z jakékoliv hluboké podsložky na úplný začátek adresářového stromu."},
{q:"Kromě manuálovách stránek je součástí Linuxu hypertextový informační systém, který má obdobnou funkci. Jak se nazývá?",o:["help","man","doc","info"],c:[3],a:"info",e:"Systém 'info' tvoří alternativu k manuálovým stránkám (man). Nápovědu prezentuje více jako propojenou strukturovanou knihu s hypertextovými odkazy mezi kapitolami."},
{q:"Jak zobrazíte v Linuxu spuštěné úlohy?",o:["tasks","jobs","running","bg"],c:[1],a:"jobs",e:"Příkaz 'jobs' (úlohy) spolehlivě vypíše do terminálu seznam procesů spuštěných v aktuální relaci, které běží na pozadí nebo jsou právě pozastaveny."},
{q:"Označte příkazy, které umožní změnit prioritu procesu.",o:["%fg  hodnota úrovně priority","renice","top  + , nebo top -","nice","%bg  hodnota úrovně priority","jobs  s číslem priority"],c:[1,3],a:"nice, renice",e:"Nástroj 'nice' spustí nový program se zadanou úrovní laskavosti (priority) vůči ostatním. Nástroj 'renice' pak dokáže tuto prioritu upravovat u procesu, který již dříve běžel."},
{q:"Kolik znaků může maximálně obsahovat uživatelské jméno v Linuxu.",o:["32"],c:[0],a:"32",e:"V tradičních linuxových systémech je z historických i paměťových důvodů délka běžného přihlašovacího loginu omezena pevnou hranicí na maximálně 32 znaků."},
{q:"U aktuálního uživatele potřebuji zobrazit členství ve skupinách. Dosáhnu toho příkazem  (doplňte) ...",o:["users","whoami","groups","id"],c:[2],a:"groups",e:"Jednoduchý příkaz 'groups' vytiskne do konzole prostý textový seznam názvů všech skupin, ve kterých figuruje aktivní uživatel."},
{q:"Potřebujete zjistit IPv4/IPv6  adresu na serveru s OS Windows. Napište příkaz v základní podobě.",o:["ifconfig","ip","ipconfig","netstat"],c:[2],a:"ipconfig",e:"Příkaz 'ipconfig' (Internet Protocol Configuration) je letitým standardem pro zjištění aktuálně přidělené IP adresy a síťových údajů v příkazové řádce systémů Windows."},
{q:"Správcem sítě vám byla přidělena následující statická IPv4 adresa 222.17.18.125/26. Jaký bude tvar subsíťové masky?",o:["255.255.255.248","255.255.255.240","255.255.255.252","255.255.255.192"],c:[3],a:"255.255.255.192",e:"Prefix /26 říká, že maska zabírá celkem 26 bitů (tedy první tři oktety jsou naplno 255). V posledním čtvrtém oktetu svítí první dva bity (128 + 64), což dává součet 192."},
{q:"Váš počítač bude používat protokol IPv6. Označte správný formát IPv6 adresy.",o:["2001:db8:3241::1/64","2001::db8:4581::1/64","2001%db8%9990%%1/64","2001.db8.819f..1/64","2001:db8:0g21::1/64"],c:[0],a:"2001:db8:3241::1/64",e:"Standard IPv6 adresa se zapisuje plně v hexadecimálním formátu pomocí znaků 0-9 a a-f. K oddělování jejích skupin se využívají výhradně dvojtečky."},
{q:"Máte k dispozici IPv6 adresu –  2001:0000:0000:0000:00ad:0000:0000:4600/64 . Jak ji mohu co nejefektivněji zkrátit?",o:["2001::ad:0:0:46/64","2001::ad::4600/64","2001::ad:0:0:4600/64","2001:0:0:0:00ad:0:0:4600/64"],c:[2],a:"2001::ad:0:0:4600/64",e:"Dlouhý blok několika prázdných nul v sobě lze při zápisu zkrátit na jedinou zdvojenou dvojtečku (::). Toto úplné vynechání je však z důvodu přesnosti povoleno použít v adrese vždy pouze jednou."},
{q:"Potřebujete zjistit IPv4/IPv6  adresu na Linuxovém serveru. Napište příkaz v základní podobě.",o:["ifconfig","netstat","ipconfig","ip"],c:[3],a:"ip",e:"I když starší Linuxy využívaly program ifconfig, v moderních distribucích ho zcela nahradil výkonný síťový nástroj pod jednotným příkazem 'ip' (často spouštěný s parametrem ip addr)."},
{q:"Na serveru v síti LAN nastavujete firewall. Server bude v síti plnit roli DHCP, DNS serveru.<br>Označte kombinaci protokolu a portu, který pro splnění těchto funkcí  nepotřebujete .",o:["TCP/53","UDP/67","UDP/68","UDP/53"],c:[2],a:"UDP/68",e:"Na portu 68 naslouchá příchozím DHCP zprávám lokálně klient, nikoliv server. Pokud stavíme DHCP server, musí umět naslouchat pouze dotazům z venku na portu 67."},
{q:"Pomocí jakého příkazu zobrazíte v prostředí OS Linux, Windows směrovací tabulku.",o:["ipconfig","netstat","nslookup","arp"],c:[1],a:"netstat",e:"S pomocí přepínače '-r' (route) dokáže známý síťový nástroj 'netstat' vypsat celou vnitřní směrovací tabulku. Je navíc společný pro platformu Windows i Linux."},
{q:"Která z následujících IPv4 adres  není  privátní adresa určená pro koncové zařízení?",o:["172.16.36.45/16","10.4.24.24/8","192.168.0.3/24","200.23.34.120/24"],c:[3],a:"200.23.34.120/24",e:"Adresy 10.x.x.x, 172.16-31.x.x i 192.168.x.x spadají podle norem striktně do vyhrazených privátních vnitřních rozsahů, kdežto rozsah 200 je naprosto standardní veřejnou adresou fungující v internetu."},
{q:"Která z následujících IPv4 adres je privátní adresa určená pro koncové zařízení?",o:["172.16.0.0/24","172.12.36.45/16","192.168.10.255/24","10.254.124.224/24"],c:[3],a:"10.254.124.224/24",e:"Z nabízených se pouze desetková adresa vejde do privátního bloku třídy A a nedisponuje na konci číslem 255 nebo podobnou neplatnou vlastností, lze ji tedy plně přidělit koncovému zařízení."},
{q:"Na serveru v síti LAN nastavujete firewall. Server bude v síti plnit roli webového (podpora protokolu http, https), DNS serveru.<br>Označte kombinaci protokolu a portu, který pro splnění těchto funkcí nepotřebujete.",o:["TCP/80","TCP/143","UDP/53","TCP/443"],c:[1],a:"TCP/143",e:"Pro funkční HTTP web slouží port 80, pro šifrované HTTPS port 443 a pro dotazy DNS port 53. Ponechaný port 143 by sloužil e-mailové komunikaci IMAP, což nesouvisí se zadáním."},
{q:"Vytvořili jste sdílenou složku Alfa, která nemá být zobrazena při prohledávání sdílených složek pomocí ikony Místa v síti (Okolní počítače). Která z odpovědí nejlépe vystihuje řešení daného problému?",o:["Složka Alfa bude sdílena s názvem Alfa$.","Složka Alfa bude sdílena s názvem $Alfa.","Když složku vytvářím, nepoužiji název Alfa, ale složku pojmenuji Alfa$.","Problém není řešitelný, protože když zadám název sdílené složky Alfa$, složka opravdu nebude vidět.<br>Ale pokud v možnostech složky zvolím zobrazení skrytých souborů a složek, složka se objeví."],c:[0],a:"Složka Alfa bude sdílena s názvem Alfa$.",e:"Znak dolaru ($) na konci názvu sdílené složky zajistí, že bude složka skrytá a nezobrazí se při běžném procházení sítě (v tzv. Okolních počítačích). K jejímu zobrazení je nutné napsat přesnou cestu ručně."},
{q:"Počítače vybavené operačním systémem Windows mohou pracovat jako členové domény, nebo pracovní skupiny. Vyberte jeden nejpodstatnější rozdíl mezi pracovní skupinou a doménou:",o:["V pracovní skupině nemůže existovat počítač v roli serveru.","Pracovní skupina je určena pro malý počet stanic. Například u operačního systému Windows 10 pouze 20.","V pracovní skupině se nemohou vyskytovat serverové operační systémy – např. Windows 2019 server.","V doméně musí být alespoň jeden počítač s operačním systémem Windows server, který bude zastávat roli řadiče domény."],c:[3],a:"V doméně musí být alespoň jeden počítač s operačním systémem Windows server, který bude zastávat roli řadiče domény.",e:"Doména vyžaduje centralizovanou bezpečnostní a organizační správu, kterou v prostředí Microsoft zajišťuje minimálně jeden běžící serverový OS v důležité roli řadiče domény (Domain Controller)."},
{q:"Potřebujete vytvořit uživatele na PC s operačním systémem Windows 10, který bude schopen instalovat programy, přidávat hardwarová zařízení, vytvářet další uživatele. Nový uživatel bude členem skupiny?",o:["Administrators","Users","Backup Operators","Network Operators"],c:[0],a:"Administrators",e:"Skupina Administrators disponuje v lokálním OS Windows naprosto nejvyšší a neomezenou úrovní přístupových oprávnění, včetně povolení ke správě jiných uživatelů a instalaci software/hardware."},
{q:"Jak se nazývá typ licence, kde se výrobce vzdal veškerých práv. Uživatel s ním může libovolně nakládat.",o:["GNU GPL","Open Source","shareware","OEM","public domain","freeware"],c:[4],a:"public domain",e:"Dílo postoupené pod licencí typu Public Domain uvolňuje autor jako veřejný majetek, plně a svobodně se vzdává svých osobních autorských omezení k jeho budoucímu užití i úpravám."},
{q:"Označte příkaz(y) které umožní změnit nastavení auditování?",o:["cmd","gpedit.msc","secpol.msc","mmc","msconfig"],c:[2],a:"secpol.msc",e:"K nastavení systémového dozoru a politik zabezpečení na konkrétním stroji (jako je právě lokální audit úspěšných či zamítnutých událostí OS) slouží nástroj konzole Místní zásady zabezpečení - secpol.msc."},
{q:"Označte doporučenou strategii pro používání skupin v prostředí, kde se prozatím nepředpokládá použití více domén Active Directory. (Jedna odpověď.)",o:["Uživatelský účet → místní doménová skupina → globální skupina → oprávnění","Uživatelský účet → globální skupina → místní doménová skupina → oprávnění","Uživatelský účet → oprávnění","Uživatelský účet → univerzální skupina → místní doménová skupina → oprávnění"],c:[1],a:"Uživatelský účet  globální skupina  místní doménová skupina  oprávnění",e:"V jednodoménových prostředích AD je doporučeno držet se kratšího modelu a přiřazovat: Uživatel -> Globální skupina (podle firemní role) -> Doménově lokální skupina (slouží jako zámek na složce) -> Oprávnění. Univerzální skupiny lze přeskočit."},
{q:"Doménově lokální skupina může získávat oprávnění? (Jedna odpověď.)",o:["V jakékoli doméně lesa Active Directory.","Pouze ve vlastní doméně kde byla vytvořena.","Pouze ve stromu domén, kde byla vytvořena.","Ve všech doménách kromě té, kde byla vytvořena."],c:[1],a:"Pouze ve vlastní doméně kde byla vytvořena.",e:"Podle svého návrhu působí Doménově lokální skupina jako bezpečný obal sloužící přímo na zámcích lokálních objektů a sdílených složek – oprávnění lze tudíž udělit pouze a čistě uvnitř jediné domény, ve které byla ustavena."},
{q:"Mezi uvedenými IP adresami vyberte takovou, která by se dala použít pro počítače v privátní síti připojené k internetu.",o:["172.16.0.1/16","127.0.0.1/8","192.168.0.256/24","9.8.45.2/16"],c:[0],a:"172.16.0.1/16",e:"Vyhovující privátní adresa nesmí obsahovat nesmysly v oktetech a patřit k lokálnímu loopbacku (jako je 127). Adresa ze sekce 172.16 plně obstarává tyto privátní normy spadající pod sítě třídy B."},
{q:"Programové produkty Internet Information Server, Apache, Tomcat paří do skupiny serverových aplikací typu…",o:["Databáze","Poštovní servery","Antivirové programy","Webové servery"],c:[3],a:"Webové servery",e:"IIS, Apache a Tomcat jsou vysoce rozšířené serverové programy, jejichž primárním úkolem je přijímat klientské HTTP/HTTPS webové dotazy a jako odpověď renderovat webové stránky a portály internetu."},
{q:"Maximální počet disků pro vytvoření prokládaného svazku u stanice s operačním systémem Windows 10/2019 je?",o:["2","6","16","32"],c:[3],a:"32",e:"Systém pro softwarovou logickou Správu disků v OS Windows z programátorských a technických důvodů nativně omezuje spojení různých kapacit pevných harddisků svazku na maximální hranici 32 členů."},
{q:"Které z následujících softwarových řešení RAID neobsahuje OS Windows?",o:["RAID 0","RAID 1","RAID 5","RAID 6"],c:[3],a:"RAID 6",e:"Základní interní modul operačního systému bez dodatečných programů bezpečně složí svazky RAID typu 0, 1 a 5. Softwarový běh pro pokročilejší typ RAID 6 s dvojitou paritou už nenabízí."},
{q:"Svazek kombinuje prokládání dat na více discích s paritou pro redundanci dat.",o:["RAID 0","RAID 1","RAID 5","RAID 10"],c:[2],a:"RAID 5",e:"Tato učebnicová věta definuje vlastnost prokládaného pole RAID 5. Aby ušetřil počet disků a získal redundanci, kousky dat prokládá a současně vypočítává ochrannou paritu rozesetou napříč disky."},
{q:"Při nasazení jsou data rozdělena na sadu proužků a ukládána na všechny jednotky. Poskytuje zvýšení výkonu, ale neposkytuje odolnost proti chybám.",o:["RAID 0 (prokládaný svazek)","RAID 0 (rozložený svazek)","RAID 1","RAID 3","RAID 5"],c:[0],a:"RAID 0 (prokládaný svazek)",e:"Technologie označovaná jako RAID 0 (prokládaný svazek). Ta se orientuje na rychlé proudění nebezpečným rozdělováním dat do rychlých bloků paralelně zapisovaných na všechny nosiče a nezdržuje se žádným zpětným jištěním záloh."},
{q:"Potřebuji sledovat uživatele, kteří úspěšně modifikují obsah souboru instrukce.doc, který se nachází ve složce Dokumentace na disku X:. Označte nutné podmínky pro nejefektivnější splnění úkolu.",o:["Disk X: musí používat souborový systém NTFS.","Disk X: musí používat souborový systém FAT.","V zásadách skupiny musí být aktivována Zásada auditu, položka Auditovat přístup k objektům-úspěšné pokusy.","V zásadách skupiny musí být aktivována Zásada auditu, položka Auditovat změny zásad-úspěšné pokusy.","Je nutné nastavit auditování souboru instrukce.doc. Dále vybrat uživatele a zvolit na sledování položku zapisovat.","Je nutné nastavit auditování složky Dokumentace. Dále vybrat uživatele a zvolit na sledování položku zapisovat. Soubory nastavení auditování neumožňují."],c:[0,2,4],a:"Disk X: musí používat souborový systém NTFS., V zásadách skupiny musí být aktivována Zásada auditu, položka Auditovat přístup k objektům-úspěšné pokusy., Je nutné nastavit auditování souboru instrukce.doc. Dále vybrat uživatele a zvolit na sledování položku zapisovat.",e:"K zachycení auditu u souborů je zásadní disponovat systémem NTFS. Pak se musí v systémových Zásadách nejprve globálně aktivovat audit 'přístupu k objektům'. Nakonec se u konkrétního souboru detailně specifikuje sledování na akci zápisu."},
{q:"Aktualizaci nastavených zásad skupiny týkající se Konfigurace počítače mohu na místním počítači provést (Více správných odpovědí).",o:["Modifikace zásad se okamžitě projeví po uložení manažerské konzoly.","Restartuji počítač.","Přihlásím se prostřednictvím účtu, který byl použit na provádění úprav.","Zadáním příkazu gpupdate."],c:[1,3],a:"Restartuji počítač., Zadáním příkazu gpupdate.",e:"Položky doménových bezpečnostních zásad zasahujících přímo pod kapotu konfigurace stroje a OS vyžadují po svém přiřazení buďto ruční násilné vynucení příkazem 'gpupdate', anebo spolehlivě projít cyklem restartování PC."},
{q:"Pokud je velikost nestránkového fondu relativně velká v porovnání s celkovou fyzickou pamětí a máme problémy s výkonem systému, bude pravděpodobně nutné:",o:["Zvětšit hodnotu virtuální paměti.","Zvětšit hodnotu operační paměti.","Použít rychlejší HDD.","Vyměnit CPU za výkonnější."],c:[1],a:"Zvětšit hodnotu operační paměti.",e:"Fond nepřesunutelné (nestránkované) paměti pevně náleží nepostradatelným procesům v jádře a hardwarovým ovladačům a neustále z RAM ujídá, aniž by ji mohl vracet disku. Jistým lékem je tak dokoupení silnější fyzické operační paměti."},
{q:"<div class='context-box'><img src='67.png' alt='Výstup Sledování výkonu HP450'></div>Uživatel si stěžuje na nízký výkon svého počítače HP540. Pomocí modulu Sledování výkonu jste prováděli testování zátěže. Na základě sledovaných čítačů zvolte správné řešení uživatelova požadavku.",o:["Problematickým místem je ukazatel šířky pásma u síťového rozhraní. Jeho hodnota je příliš nízká.","Problémy s výkonem způsobuje operační paměť. Dokazuje to čítač Počet MB k dispozici a bajty nestránkového fondu.<br>Jeho hodnota je na počítač se 16 GB operační paměti nedostatečná.","Problematickým místem je nedostatečná velikost souboru stránkovacího souboru pagefile.sys. Současná hodnota 16 GB je nedostatečná. Bude nutné zvýšení na 20 GB.","Všechny sledované údaje dokazují dostatečnou výkonnost počítače. Požadavky uživatele na výměnu jsou neopodstatněné."],c:[1],a:"Problémy s výkonem způsobuje operační paměť. Dokazuje to čítač Počet MB k dispozici a bajty nestránkového fondu.",e:"Obří konzumace ve vymezeném nestránkovaném fondu z logů monitoringu a zoufale nedostatečný počet volných využitelných MB v RAM jasně a bezchybně viní limit operační paměti."},
{q:"Označte minimální oprávnění v nastavení sdílení složky umožňující spouštění programů a skriptů.",o:["Úplné řízení","Číst a spouštět","Změnit","Číst"],c:[3],a:"Číst",e:"Základní bezpečnostní parametr sdílení 'Číst' umožňuje vzdálenému klientovi vidět soubor na serveru a načíst jeho samotné tělo (spustitelný kód) k sobě do paměti k lokálnímu spuštění – nic silnějšího nutné není."},
{q:"Co je základním úkolem modulu Programy a funkce v Ovládacích panelech.",o:["Komprese nainstalovaných souborů.","Šifrování uživatelských programů.","Instalace aplikací.","Odinstalace aplikací."],c:[3],a:"Odinstalace aplikací.",e:"Jedná se o klasický základní komponent systému sloužící jako čisté, bezpečné a systémem podporované rozhraní výhradně k odebírání neboli pro odinstalaci počítačových softwarů a programů od uživatele."},
{q:"Jak se jmenujte technologie umožňující zašifrovat jednotlivé soubory nebo složky.",o:["DFS","EFS","CIFS","SMB"],c:[1],a:"EFS",e:"Encrypting File System (EFS) funguje jako doplňkový bezpečnostní podmodul nadstavby NTFS. Slouží k transparentnímu, rychlému a spolehlivému uzamčení šifrováním na úrovni jediného adresáře či souboru bez nutnosti kryptovat kompletní část disku."},
{q:"Rozhodl jsem se provádět zálohu pomocí modulu Historie. Která z následujících položek se nebude zálohovat.",o:["Dokumenty","Videa","Obrázky","Program Files (x86)"],c:[3],a:"Program Files (x86)",e:"Modul Historie souborů (File History) ve Windows je navržen k zálohování výhradně osobních uživatelských dat (Dokumenty, Obrázky, Videa, Plocha). Systémové složky a instalace (Program Files) nezálohuje."},
{q:"Který podregistr Windows ukládá informace týkající se všech uživatelských účtů na počítači?",o:["HKEY_USERS (HKU)","HKEY_CURRENT_USER (HKCU)","HKEY_CURRENT_CONFIG (HKCC)","HKEY_CLASSES_ROOT (HKCR)"],c:[0],a:"HKEY_USERS (HKU)",e:"Věttev HKEY_USERS (HKU) obsahuje všechny aktivní nahrané profily uživatelů v systému. Konkrétní aktuálně přihlášený uživatel má pak svůj profil zrcadlen v HKEY_CURRENT_USER."},
{q:"Chci vyřadit některé programy, které se automaticky spouštějí při startu systému. Chci se vyhnou úpravám přímo v registrech. Cíle dosáhnu spuštěním programu...",o:["msconfig.exe","taskmgr.exe","regedit.exe","jobs.exe"],c:[1],a:"taskmgr.exe",e:"V moderních verzích OS Windows (od Windows 8) se správa aplikací spouštěných po startu přesunula ze systémové konfigurace (msconfig) přímo na speciální záložku do Správce úloh (Task Manager - taskmgr.exe)."},
{q:"Označte nepravdivý výrok o zálohovaní OS Windows10.",o:["Bitová kopie systému umožňuje zálohovat a obnovovat jednotlivé soubory.","Zálohu pomocí bitové kopie můžeme provést do externího úložiště.","Zálohování pomocí Historie probíhá automaticky.","Systém zálohování v OS Windows 10/11 a serverových systémech Windows je odlišný."],c:[0],a:"Bitová kopie systému umožňuje zálohovat a obnovovat jednotlivé soubory.",e:"Bitová kopie (System Image) slouží k vytvoření otisku celého disku či oddílu najednou (např. pro obnovu po havárii disku). Neumožňuje selektivní zálohu a obnovu pouze vybraných jednotlivých souborů."},
{q:"Je následující výrok pravdivý? Systém zálohování pomocí interního zálohovacího programu je stejný u OS Windows 10/11 a serverových verzí Windows.",o:["Ano","Ne"],c:[1],a:"Ne",e:"Zálohovací nástroje se liší. Klientské verze Windows využívají Historii souborů a starší Zálohování Windows 7. Serverové verze využívají odlišný a robustní nástroj Windows Server Backup (WSB)."},
{q:"Označte typy záloh, které podporuje interní zálohovací programu Windows 2019.",o:["Normální (úplná)","Přírůstková","Rozdílová","Kopie","Denní"],c:[0,1],a:"Normální (úplná), Přírůstková",e:"Nástroj Windows Server Backup nativně podporuje tvorbu normální (úplné) zálohy a přírůstkových záloh (které šetří místo ukládáním pouze bloků změněných od poslední zálohy)."},
{q:"Označte typ souborového systému, který se nedá použít na discích SSD, HDD v prostředí OS Windows.",o:["FAT","NTFS","ReFS","XFS"],c:[3],a:"XFS",e:"XFS je vysoce výkonný souborový systém používaný výhradně ve světě Linuxu/Unixu. Windows nativně využívá NTFS, FAT/exFAT nebo ReFS a svazkům XFS bez softwaru třetích stran nerozumí."},
{q:"Označte chybné výroky, které se týkají diskových kvót v prostředí OS Windows 10 Professional.",o:["Diskové kvóty se nedají nastavit pomocí zásad skupiny.","Diskové kvóty se aplikují na všechny kategorie uživatelů, kromě členů skupiny Administrators.","Diskové kvóty se dají použít na všech souborových systémech, které se používají na SSD, HDD discích.","V případě výchozího nastavení diskových kvót je hodnota pro všechny uživatele stejná."],c:[0,2],a:"Diskové kvóty se nedají nastavit pomocí zásad skupiny., Diskové kvóty se dají použít na všech souborových systémech, které se používají na SSD, HDD discích.",e:"Diskové kvóty lze plně konfigurovat prostřednictvím GPO. Navíc vyžadují výhradně souborový systém NTFS, nelze je proto nasadit plošně na všechny formáty (např. na FAT32 to nefunguje)."},
{q:"Napište integrální příkaz příkazového řádku Windows, který umožní provést kontrolu/opravu disku.",o:["fsck","sigverif","chkdsk","sfc"],c:[2],a:"chkdsk",e:"Příkaz chkdsk (Check Disk) zkontroluje logickou integritu souborového systému na pevném disku a dokáže se pokusit o opravu případných logických chyb či poškozených sektorů."},
{q:"Označte chybné výroky.",o:["Na discích není možné při vytváření oddílu změnit velikost alokační jednotky (clusteru.)","Windows označuje jednotlivé disky (oddíly) písmeny abecedy. Pokud dojde k vyčerpání volných písmen, není možné připojení dalších disků (oddílů).","Ovladače v operačním systému Windows musí být ve výchozím nastavení digitálně podepsané, s platným certifikátem.","V dnešním době je paralelní rozhraní standardním rozhraním na připojení tiskárny."],c:[0,1,3],a:"Na discích není možné při vytváření oddílu změnit velikost alokační jednotky (clusteru.), Windows označuje jednotlivé disky (oddíly) písmeny abecedy. Pokud dojde k vyčerpání volných písmen, není možné připojení dalších disků (oddílů)., V dnešním době je paralelní rozhraní standardním rozhraním na připojení tiskárny.",e:"Při formátování lze změnit velikost clusteru. Windows umí kromě písmen abecedy připojit disk i jako NTFS složku, takže abeceda není limitující. A paralelní rozhraní je historický přežitek, dnes vládne tiskárnám USB a síťové zapojení."},
{q:"Označte správný výrok, který se týká maximálního počtu souběžných připojení pří sdílení složky v OS Windows 7/8/10.",o:["Pokud je stanice členem pracovní skupiny tak je počet souběžných připojení 10 v případě domény 20.","10 pro verzi Home, 20 pro verzi Enterprise a Professional.","20–hodnotu počtu souběžných připojení je možné snížit.","20–hodnotu počtu souběžných připojení není možné změnit."],c:[2],a:"20–hodnotu počtu souběžných připojení je možné snížit.",e:"Společnost Microsoft v klientských edicích Windows (7, 8, 10) tvrdě licenčně a technicky limituje sdílení (SMB) na maximálně 20 souběžných spojení. Pro více je vyžadován OS Windows Server. Lze je však i snížit pod 20 zářízení."},
{q:"Pokud se přihlásím lokálně k počítači a je ověřeno mé uživatelské jméno a heslo, stávám se členem skupiny…",o:["Administrators","Creator Owner","Dialup","Power Users","Interactive"],c:[4],a:"Interactive",e:"Skupina Interactive je speciální systémová skupina. Členství v ní získáte automaticky pouze v případě, že se k systému přihlásíte přímo (lokálně) přes klávesnici a monitor, nikoli vzdáleně přes síť."},
{q:"Pokud vytvořím soubor (nebo složku), stávám se u tohoto objektu členem skupiny…",o:["Administrators","Creator Owner","Dialup","Power Users","Interactive"],c:[1],a:"Creator Owner",e:"Systémová identita Creator Owner (Tvůrce vlastník) je dynamicky přiřazena uživateli, který daný objekt vytvořil. Typicky mu zaručuje administrátorská práva přímo k tomuto konkrétnímu souboru/složce."},
{q:"V prostředí OS Windows chci modifikovat obsah souboru navod.docx. Jaké je minimální oprávnění které umožní provedení této operace.",o:["Číst","Zapisovat","Měnit","Úplné řízení"],c:[2],a:"Měnit",e:"Oprávnění 'Zapisovat' sice umožňuje do souboru přidat data, ale pro smazání či modifikaci stávajícího obsahu a metadat je nutné vyšší oprávnění 'Měnit' (Modify)."},
{q:"Vyberte protokol, který využívá adresářová služba Active Directory.",o:["DAP","LDAP","X.500","OpenLDAP"],c:[1],a:"LDAP",e:"Active Directory používá k vyhledávání, dotazování a modifikaci objektů v adresáři aplikační protokol LDAP (Lightweight Directory Access Protocol)."},
{q:"Na svém PC s operačním systémem Windows 8/8.1 potřebuji zobrazit seznam nainstalovaných ovladačů. Který z následujících příkazů mi umožní splnění úkolu?",o:["Sigverif","Sfc","Driverquery","Winnt32.exe/checkupgradeonly"],c:[2],a:"Driverquery",e:"Nástroj příkazové řádky driverquery vypíše seznam všech instalovaných ovladačů zařízení a jejich vlastností, což usnadňuje diagnostiku problémů s hardwarem."},
{q:"U Windows 2008 se objevily zásady skupiny a předvolby zásad skupiny. Označte správný výrok popisující možnosti nastavení zásad a předvoleb.",o:["Nastavení zásad skupiny jsou vynucená.","Zásady skupiny a předvolby obsahují stejná nastavení.","Zásad skupiny nastavené v rámci domény je možné vždy uživatelem zmodifikovat.","Předvolby i zásady se automaticky aktualizují."],c:[0],a:"Nastavení zásad skupiny jsou vynucená.",e:"Klasické Zásady skupiny (Policies) nastavení trvale vynucují a zablokují uživateli možnost změny. Předvolby (Preferences) pouze navrhnou výchozí hodnotu, kterou si uživatel může později sám upravit."},
{q:"Sdíleli jste složku v počítači se systémem Windows 10 s jiným uživatelem. Co můžete dělat v počítači druhého uživatele, abyste mu usnadnili přístup ke sdílené složce?",o:["Vytvořte pracovní skupinu.","Vytvořte efektivní oprávnění.","Vytvořte oprávnění NTFS.","Namapujte diskovou jednotku."],c:[3],a:"Namapujte diskovou jednotku.",e:"Namapování síťové diskové jednotky přiřadí sdílené síťové složce lokální písmeno (např. Z:). Pro druhého uživatele pak složka vypadá a chová se jako běžný pevný disk v počítači."},
{q:"Označte nepravdivý výrok.",o:["Přidání nového počítače do domény mohou provést členové doménové skupiny Administrators a Domain Admins.","Organizační jednotky jsou ve výchozím nastavení chráněny proti náhodnému vymazání.","Uživatelským účtům v prostředí Windows 2019 není možné určit konkrétní stanice které budou moci používat.","Pokud je OS Windows 2019 povýšen na řadič domény, místní uživatelské účty a skupiny zůstanou zachovány."],c:[2,3],a:"Uživatelským účtům v prostředí Windows 2019 není možné určit konkrétní stanice které budou moci používat., Pokud je OS Windows 2019 povýšen na řadič domény, místní uživatelské účty a skupiny zůstanou zachovány.",e:"Uživatelským účtům v AD lze bez problému zakázat nebo naopak povolit přihlašování pouze na konkrétní určené stanice. Při povýšení stroje na řadič domény se lokální účty nesmažou, ale stanou se z nich účty doménové."},
{q:"Které z následujících účtů neexistuje v prostředí Windows 10/11?",o:["Administrator","Guest","Accout Operator","User"],c:[2],a:"Accout Operator",e:"Skupina Account Operators (Operátoři účtů) je doménová skupina specifická pouze pro Active Directory (na serverech). Lokální instalace klientských Windows 10/11 ji vůbec neobsahuje."},
{q:"Která z následujících přípon označuje dávkový soubor?",o:[".cmd",".bak",".bmp",".bkf"],c:[0],a:".cmd",e:"Přípona .cmd (případně starší .bat) se používá pro spustitelné textové soubory s dávkovými příkazy (skripty), které postupně interpretuje příkazový řádek Windows."},
{q:"Kterým z následujících nástrojů můžete ukončit běžící proces? Vyberte nejpřesnější odpověď.",o:["sledování systému","správce úloh","výstrahy a protokolování výkonu","správa počítače"],c:[1],a:"správce úloh",e:"Správce úloh (Task Manager) poskytuje grafické rozhraní pro monitoring a okamžité násilné ukončování běžících či zamrzlých procesů aplikací a služeb."},
{q:"Označte pravdivý výrok týkající se zásad skupiny (GPO).",o:["Aktualizace zásad mezi řadiči domény můžeme provést pomocí příkazu GPRESULT s příslušnými parametry. Příkaz je nutné spustit s právy administrátora.","Pokud některé části domény používají pomalé připojení, některé zásady se na ně nebudou aplikovat.","Organizační jednotka nemůže převzít zásady skupiny od jiné organizační jednotky.","GPO umožňují přidělování IPv4/IPv6 adres a dalších síťových parametrů počítačům v rámci lokality."],c:[1],a:"Pokud některé části domény používají pomalé připojení, některé zásady se na ně nebudou aplikovat.",e:"Systém GPO dokáže detekovat propustnost a rychlost sítě. Při pomalém (např. VPN) připojení automaticky vynechá instalace velkých softwarových balíků, aby nedošlo k úplnému ucpání linky."},

let currentMode = 'practice';
let currentIndex = 0;
let testQuestions = [];
let userAnswers = {};
let timerInterval;
let isReviewing = false;

function applyTheme(dark) {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    const btn = document.getElementById('theme-toggle');
    if (btn) btn.innerText = dark ? '☀️ Světlý mód' : '🌙 Tmavý mód';
    localStorage.setItem('theme', dark ? 'dark' : 'light');
}

function toggleTheme() {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    applyTheme(!isDark);
}

(function() {
    const saved = localStorage.getItem('theme');
    if (saved) {
        applyTheme(saved === 'dark');
    } else {
        applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
    }
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        if (!localStorage.getItem('theme')) applyTheme(e.matches);
    });
})();

function setMode(mode) {
    currentMode = mode;
    userAnswers = {};
    isReviewing = false;
    document.getElementById('nav-grid').innerHTML = '';

    document.getElementById('expl').classList.add('hidden');
    document.getElementById('results-card').classList.add('hidden');
    document.getElementById('quiz-card').classList.remove('hidden');

    const testBar = document.getElementById('test-bar');
    if(mode === 'test') {
        testBar.classList.remove('hidden');
        testBar.classList.add('d-flex');
    } else {
        testBar.classList.add('hidden');
        testBar.classList.remove('d-flex');
    }

    const badge = document.getElementById('mode-badge');
    badge.className = 'mode-badge';

    if (mode === 'practice') {
        testQuestions = database; 
        badge.innerText = 'Procvičování';
        badge.classList.add('badge-practice');
        renderNav();
        loadQ(0);
    } else {
        testQuestions = [...database].sort(() => 0.5 - Math.random()).slice(0, 20);
        badge.innerText = 'TEST';
        badge.classList.add('badge-test');
        renderNav();
        loadQ(0);
        startTimer();
    }
}

function reviewTest() {
    isReviewing = true;
    document.getElementById('results-card').classList.add('hidden');
    document.getElementById('quiz-card').classList.remove('hidden');

    const testBar = document.getElementById('test-bar');
    testBar.classList.add('hidden');
    testBar.classList.remove('d-flex');

    const badge = document.getElementById('mode-badge');
    badge.className = 'mode-badge badge-review';
    badge.innerText = 'KONTROLA CHYB';

    updateNavForReview();
    loadQ(0);
}

function renderNav() {
    const grid = document.getElementById('nav-grid');
    grid.innerHTML = '';
    testQuestions.forEach((_, i) => {
        const btn = document.createElement('div');
        btn.className = 'nav-btn';
        btn.innerText = i + 1;
        btn.onclick = () => loadQ(i);
        btn.id = 'nav-' + i;
        grid.appendChild(btn);
    });
}

function updateNavForReview() {
    testQuestions.forEach((q, i) => {
        const btn = document.getElementById('nav-' + i);
        if (!btn) return;

        const uIdx = userAnswers[i];
        
        // Odstraníme všechny stavové třídy, abychom začali s čistým štítem
        btn.classList.remove('answered-test', 'correct', 'wrong');

        if (uIdx !== undefined) {
            // Pokud uživatel odpověděl, porovnáme to se správnou odpovědí
            if (q.c.includes(uIdx)) {
                btn.classList.add('correct');
            } else {
                btn.classList.add('wrong');
            }
        } else {
            // Pokud neodpověděl vůbec, v testu je to automaticky chyba (červená)
            btn.classList.add('wrong');
        }
    });
}

function loadQ(index) {
    currentIndex = index;
    const q = testQuestions[index];

    document.getElementById('q-num').innerText = `Otázka ${index + 1} / ${testQuestions.length}`;
    document.getElementById('q-text').innerHTML = q.q;

    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('nav-' + index).classList.add('active');

    const optsDiv = document.getElementById('options');
    optsDiv.innerHTML = '';

    const explDiv = document.getElementById('expl');
    explDiv.classList.add('hidden');
    explDiv.innerHTML = "<strong>Správná odpověď:</strong><br>" + q.a + "<br><br><strong>Vysvětlení:</strong><br>" + q.e;

    const answered = userAnswers[index] !== undefined;

    if ((currentMode === 'practice' && answered) || isReviewing) {
        explDiv.classList.remove('hidden');
    }

    q.o.forEach((optText, i) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.innerHTML = optText;

        const isCorrect = q.c.includes(i);
        const wasSelected = (userAnswers[index] === i);

        // 1. Chování pro Procvičování (okamžitá zpětná vazba)
        if (currentMode === 'practice' && answered) {
            div.classList.add('disabled');
            if (isCorrect) div.classList.add('correct'); 
            if (wasSelected && !isCorrect) div.classList.add('wrong'); 
        } 
        // 2. Chování pro Ostrý test
        else if (currentMode === 'test') {
            if (isReviewing) {
                // Kontrola po testu
                div.classList.add('disabled');
                if (isCorrect) div.classList.add('correct'); 
                if (wasSelected && !isCorrect) div.classList.add('wrong'); 
            } else {
                // Zvýraznění volby během probíhajícího testu
                if (wasSelected) div.classList.add('selected-test');
            }
        }

        div.onclick = () => {
            if (!div.classList.contains('disabled')) selectAnswer(index, i);
        };
        optsDiv.appendChild(div);
    });
}

function selectAnswer(qIndex, optIndex) {
    if (currentMode === 'practice' && userAnswers[qIndex] !== undefined) return;
    if (isReviewing) return;

    userAnswers[qIndex] = optIndex;
    const q = testQuestions[qIndex];
    const navBtn = document.getElementById('nav-' + qIndex);

    if (currentMode === 'practice') {
        const isCorrect = q.c.includes(optIndex);
        navBtn.classList.add(isCorrect ? 'correct' : 'wrong');
        loadQ(qIndex); 
    } else {
        navBtn.classList.add('answered-test');
        loadQ(qIndex); 
    }
}

function nextQ() {
    if (currentIndex < testQuestions.length - 1) loadQ(currentIndex + 1);
}

function prevQ() {
    if (currentIndex > 0) loadQ(currentIndex - 1);
}

function startTimer() {
    let sec = 1200; 
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        sec--;
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        if (sec <= 0) finishTest();
    }, 1000);
}

function finishTest() {
    clearInterval(timerInterval);

    /* Nahrazení inline stylů za manipulaci s CSS třídami */
    document.getElementById('quiz-card').classList.add('hidden');
    document.getElementById('test-bar').classList.add('hidden');
    document.getElementById('test-bar').classList.remove('d-flex');
    document.getElementById('results-card').classList.remove('hidden');

    let score = 0;
    testQuestions.forEach((q, i) => {
        const uIdx = userAnswers[i];
        if (uIdx !== undefined && q.c.includes(uIdx)) {
            score++;
        }
    });

    const perc = Math.round((score / 20) * 100);
    document.getElementById('final-score').innerText = perc + "%";
    document.getElementById('final-text').innerText = `Získali jste ${score} bodů z 20.`;
}
// Start
setMode('practice');
</script>
